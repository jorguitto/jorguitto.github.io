
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipo Test — Redes (Trimestre 3)</title>
<style>
:root {
  --bg: #0f1419;
  --surface: #1a2332;
  --surface2: #243044;
  --text: #e7ecf3;
  --muted: #8b9cb3;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --ok: #22c55e;
  --ok-bg: rgba(34,197,94,.12);
  --bad: #ef4444;
  --bad-bg: rgba(239,68,68,.12);
  --warn: #f59e0b;
  --radius: 12px;
  --font: "Segoe UI", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1e3a5f 0%, #0f1419 100%);
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid #2d3f56;
}
header h1 { font-size: 1.35rem; font-weight: 600; }
header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.35rem; }
main { max-width: 820px; margin: 0 auto; padding: 1.25rem; }
.panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  border: 1px solid #2d3f56;
}
.panel h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #a8c4e8; }
.temas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.5rem;
}
.tema-chip {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0.65rem;
  background: var(--surface2);
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  font-size: 0.82rem;
  transition: border-color .15s, background .15s;
}
.tema-chip:hover { border-color: var(--accent); }
.tema-chip input { accent-color: var(--accent); }
.tema-chip label { cursor: pointer; flex: 1; }
.actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
button, .btn {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 0.6rem 1.1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  transition: transform .1s, background .15s;
}
button:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid #3d5270; }
.btn-secondary:hover { background: #2d4058; }
.btn-ok { background: var(--ok); color: #fff; }
.btn-warn { background: var(--warn); color: #111; }
.hidden { display: none !important; }
.progress-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width .3s;
}
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
  color: var(--muted);
}
.q-tema {
  display: inline-block;
  background: #2a4060;
  color: #93c5fd;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.75rem;
  margin-bottom: 0.5rem;
}
.q-text { font-size: 1.05rem; font-weight: 500; margin-bottom: 1rem; }
.options { display: flex; flex-direction: column; gap: 0.5rem; }
.option {
  display: block;
  padding: 0.75rem 1rem;
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.option:hover:not(.locked) { border-color: #4a6a8f; }
.option.selected { border-color: var(--accent); background: #1e3350; }
.option.correct { border-color: var(--ok); background: var(--ok-bg); }
.option.incorrect { border-color: var(--bad); background: var(--bad-bg); }
.option.locked { cursor: default; opacity: 0.95; }
.feedback {
  margin-top: 1rem;
  padding: 1rem;
  border-radius: 8px;
  font-size: 0.92rem;
}
.feedback.ok { background: var(--ok-bg); border-left: 4px solid var(--ok); }
.feedback.bad { background: var(--bad-bg); border-left: 4px solid var(--bad); }
.feedback strong { display: block; margin-bottom: 0.35rem; }
.feedback-section { margin-top: 0.75rem; }
.feedback-section:first-child { margin-top: 0; }
.feedback-section h4 {
  font-size: 0.82rem;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-bottom: 0.4rem;
}
.feedback-correcta { color: var(--ok); font-weight: 600; }
.feedback-opciones { list-style: none; display: flex; flex-direction: column; gap: 0.45rem; }
.feedback-opciones li {
  padding: 0.55rem 0.75rem;
  background: rgba(0,0,0,.18);
  border-radius: 6px;
  font-size: 0.88rem;
  border-left: 3px solid #3d5270;
}
.feedback-opciones li.op-correcta { border-left-color: var(--ok); }
.feedback-opciones li.op-elegida-incorrecta { border-left-color: var(--bad); }
.feedback-opciones li .op-letra { font-weight: 700; margin-right: 0.35rem; color: #93c5fd; }
.nav-quiz { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin: 1rem 0;
}
.stat-card {
  background: var(--surface2);
  padding: 1rem;
  border-radius: 8px;
  text-align: center;
}
.stat-card .num { font-size: 1.75rem; font-weight: 700; }
.stat-card .lbl { font-size: 0.8rem; color: var(--muted); }
.fail-list { margin-top: 1rem; }
.fail-item {
  padding: 0.75rem;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 0.5rem;
  font-size: 0.88rem;
  border-left: 3px solid var(--bad);
}
.options-inline { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
.options-inline label { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
select {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid #3d5270;
  padding: 0.45rem 0.65rem;
  border-radius: 6px;
  font-family: inherit;
}
</style>
</head>
<body>
<header>
  <h1>Tipo Test — Redes (Trimestre 3)</h1>
  <p>WAN · WLAN · ACL · CDP/LLDP/NTP · SNMP/Syslog</p>
</header>
<main>
  <section id="pantalla-inicio" class="panel">
    <h2>Selecciona los temas</h2>
    <div class="temas-grid" id="temas-container"></div>
    <div class="options-inline" style="margin-top:1rem">
      <label><input type="checkbox" id="mezclar-preguntas" checked> Mezclar preguntas</label>
      <label><input type="checkbox" id="mezclar-opciones" checked> Mezclar opciones</label>
    </div>
    <div class="actions">
      <button type="button" class="btn-primary" id="btn-todos">Todos los temas</button>
      <button type="button" class="btn-secondary" id="btn-ninguno">Ninguno</button>
      <button type="button" class="btn-primary" id="btn-empezar">Empezar test</button>
    </div>
    <p style="margin-top:0.75rem;font-size:0.85rem;color:var(--muted)" id="contador-preguntas"></p>
  </section>

  <section id="pantalla-quiz" class="panel hidden">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="quiz-meta">
      <span id="quiz-contador">Pregunta 1 de 1</span>
      <span id="quiz-puntuacion">Aciertos: 0</span>
    </div>
    <span class="q-tema" id="q-tema-label"></span>
    <p class="q-text" id="q-text"></p>
    <div class="options" id="q-options"></div>
    <div class="feedback hidden" id="q-feedback"></div>
    <div class="nav-quiz">
      <button type="button" class="btn-secondary hidden" id="btn-anterior">← Pregunta anterior</button>
      <button type="button" class="btn-primary hidden" id="btn-siguiente">Siguiente</button>
      <button type="button" class="btn-secondary" id="btn-abandonar">Volver al inicio</button>
    </div>
  </section>

  <section id="pantalla-resultados" class="panel hidden">
    <h2>Resultados</h2>
    <div class="results-grid" id="results-stats"></div>
    <div class="fail-list hidden" id="fail-summary"></div>
    <div class="actions">
      <button type="button" class="btn-warn hidden" id="btn-repetir-fallos">Repetir solo las falladas</button>
      <button type="button" class="btn-secondary" id="btn-nuevo-test">Nuevo test</button>
      <button type="button" class="btn-secondary" id="btn-inicio-res">Cambiar temas</button>
    </div>
  </section>
</main>
<script>
const TEMAS = {
  wan: "8.6 Conceptos WAN",
  wifi1: "9.1 Conceptos redes inalámbricas",
  wifi2: "9.2 Configuración WLAN",
  wifi3: "9.3 Resumen WLAN (router/WLC)",
  acl1: "10.1 Conceptos ACL",
  acl2: "10.2 ACL estándar IPv4",
  acl3: "10.3 ACL extendidas IPv4",
  proto: "10.4 CDP, LLDP y NTP",
  snmp: "10.5 SNMP, Syslog y mantenimiento"
};

const PREGUNTAS = [
/* ========== WAN ========== */
{t:"wan",q:"¿Qué define correctamente una WAN?",o:["Red de área local de alta velocidad en un edificio","Red de telecomunicaciones de gran extensión geográfica para conectar más allá de la LAN","Red exclusivamente inalámbrica doméstica","Red propiedad siempre de la organización del usuario"],c:1,explicacion_detallada:{acierto:"Una WAN abarca áreas geográficas amplias y conecta sitios, usuarios o redes remotas fuera del alcance de una LAN. Suele ser propiedad y administrada por proveedores (ISP, cable, satélite). Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué define correctamente una WAN?",opciones:["Red de área local (LAN) opera en un sitio único de alta velocidad; una WAN supera ese perímetro y conecta sedes remotas. No responde a «¿Qué define correctamente una WAN?»; la opción válida es «Red de telecomunicaciones de gran extensión geográfica para conectar más allá de la LAN».","Respuesta correcta. Una WAN abarca áreas geográficas amplias y conecta sitios, usuarios o redes remotas fuera del alcance de una LAN. La opción «Red de telecomunicaciones de gran extensión geográfica para conectar más allá de la LAN» es la única que satisface el criterio del enunciado.","Acceso inalámbrico doméstico es WLAN; no define por sí sola una WAN de operador. No responde a «¿Qué define correctamente una WAN?»; la opción válida es «Red de telecomunicaciones de gran extensión geográfica para conectar más allá de la LAN».","En WAN el operador suele poseer el enlace troncal; el cliente arrienda servicio aunque tenga CPE propio. No responde a «¿Qué define correctamente una WAN?»; la opción válida es «Red de telecomunicaciones de gran extensión geográfica para conectar más allá de la LAN»."]}},
{t:"wan",q:"¿Cuál es una característica típica de una WAN privada dedicada?",o:["Ancho de banda variable sin garantías","Conexión compartida con otros clientes en Internet","Nivel de servicio garantizado y ancho de banda consistente","Sin coste adicional respecto a la LAN"],c:2,explicacion_detallada:{acierto:"Las WAN privadas dedicadas ofrecen SLA, ancho de banda predecible y mayor seguridad al ser exclusivas del cliente. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Cuál es una característica típica de una WAN privada dedicada?",opciones:["«Ancho de banda variable sin garantías» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cuál es una característica típica de una WAN privada dedicada?»; la opción válida es «Nivel de servicio garantizado y ancho de banda consistente».","Una conexión compartida en Internet no garantiza SLA ni ancho de banda reservado; es típica de WAN pública, no dedicada. No responde a «¿Cuál es una característica típica de una WAN privada dedicada?»; la opción válida es «Nivel de servicio garantizado y ancho de banda consistente».","Respuesta correcta. Las WAN privadas dedicadas ofrecen SLA, ancho de banda predecible y mayor seguridad al ser exclusivas del cliente. La opción «Nivel de servicio garantizado y ancho de banda consistente» es la única que satisface el criterio del enunciado.","Una LAN (Local Area Network) cubre un edificio o campus con switches y VLANs; no abarca ciudades ni depende de carriers externos entre sedes lejanas. No responde a «¿Cuál es una característica típica de una WAN privada dedicada?»; la opción válida es «Nivel de servicio garantizado y ancho de banda consistente»."]}},
{t:"wan",q:"En topología hub-and-spoke (estrella), ¿qué ocurre si falla el router concentrador?",o:["Solo falla un enlace punto a punto","Los sitios radiales pueden comunicarse directamente","La comunicación entre sitios radiales también falla","Se activa automáticamente malla completa"],c:2,explicacion_detallada:{acierto:"En hub-and-spoke los radios solo se comunican entre sí pasando por el hub; es un punto único de falla. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: En topología hub-and-spoke (estrella), ¿qué ocurre si falla el router concentrador?",opciones:["«Solo falla un enlace punto a punto» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «En topología hub-and-spoke (estrella), ¿qué ocurre si falla el rout...»; la opción válida es «La comunicación entre sitios radiales también falla».","«Los sitios radiales pueden comunicarse directamente» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «En topología hub-and-spoke (estrella), ¿qué ocurre si falla el rout...»; la opción válida es «La comunicación entre sitios radiales también falla».","Respuesta correcta. En hub-and-spoke los radios solo se comunican entre sí pasando por el hub; es un punto único de falla. La opción «La comunicación entre sitios radiales también falla» es la única que satisface el criterio del enunciado.","«Se activa automáticamente malla completa» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «En topología hub-and-spoke (estrella), ¿qué ocurre si falla el rout...»; la opción válida es «La comunicación entre sitios radiales también falla»."]}},
{t:"wan",q:"¿Qué ventaja principal ofrece la topología de doble conexión (dual-homed)?",o:["Menor coste que una sola conexión","Redundancia, equilibrio de carga y respaldo del proveedor","Eliminación de la necesidad de routers","Solo sirve en LAN"],c:1,explicacion_detallada:{acierto:"Dual-homed añade redundancia y puede permitir balanceo, pero es más cara y compleja de configurar. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué ventaja principal ofrece la topología de doble conexión (dual-homed)?",opciones:["«Menor coste que una sola conexión» confunde modelo económico o de propiedad con la característica técnica solicitada. No responde a «¿Qué ventaja principal ofrece la topología de doble conexión (dual-...»; la opción válida es «Redundancia, equilibrio de carga y respaldo del proveedor».","Respuesta correcta. Dual-homed añade redundancia y puede permitir balanceo, pero es más cara y compleja de configurar. La opción «Redundancia, equilibrio de carga y respaldo del proveedor» es la única que satisface el criterio del enunciado.","«Eliminación de la necesidad de routers» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué ventaja principal ofrece la topología de doble conexión (dual-...»; la opción válida es «Redundancia, equilibrio de carga y respaldo del proveedor».","Una LAN (Local Area Network) cubre un edificio o campus con switches y VLANs; no abarca ciudades ni depende de carriers externos entre sedes lejanas. No responde a «¿Qué ventaja principal ofrece la topología de doble conexión (dual-...»; la opción válida es «Redundancia, equilibrio de carga y respaldo del proveedor»."]}},
{t:"wan",q:"¿Qué dispositivo del suscriptor conecta la LAN al equipo de comunicación WAN?",o:["DCE","DTE","POP","CO"],c:1,explicacion_detallada:{acierto:"El DTE (Data Terminal Equipment) es el equipo del cliente (router) que conecta la LAN al WAN. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué dispositivo del suscriptor conecta la LAN al equipo de comunicación WAN?",opciones:["El DCE pertenece al proveedor: adapta la señal del canal WAN (reloj, nivel eléctrico). El cliente conecta su router (DTE) al DCE en el demarc. No responde a «¿Qué dispositivo del suscriptor conecta la LAN al equipo de comunic...»; la opción válida es «DTE».","Respuesta correcta. El DTE (Data Terminal Equipment) es el equipo del cliente (router) que conecta la LAN al WAN. La opción «DTE» es la única que satisface el criterio del enunciado.","POP (Point of Presence) es presencia del ISP donde concentra servicios; no es el equipo del suscriptor en su sede. No responde a «¿Qué dispositivo del suscriptor conecta la LAN al equipo de comunic...»; la opción válida es «DTE».","CO (Central Office) es la central telefónica del operador; distinta del CPE del cliente o del punto de demarcación. No responde a «¿Qué dispositivo del suscriptor conecta la LAN al equipo de comunic...»; la opción válida es «DTE»."]}},
{t:"wan",q:"¿Qué es el punto de demarcación en una WAN?",o:["Oficina central del proveedor","Ubicación que separa CPE del equipo del proveedor","Red troncal entre operadores","Última milla de fibra óptica únicamente"],c:1,explicacion_detallada:{acierto:"El punto de demarcación marca la frontera física/legal entre instalación del cliente (CPE) y red del proveedor. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué es el punto de demarcación en una WAN?",opciones:["«Oficina central del proveedor» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué es el punto de demarcación en una WAN?»; la opción válida es «Ubicación que separa CPE del equipo del proveedor».","Respuesta correcta. El punto de demarcación marca la frontera física/legal entre instalación del cliente (CPE) y red del proveedor. La opción «Ubicación que separa CPE del equipo del proveedor» es la única que satisface el criterio del enunciado.","«Red troncal entre operadores» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué es el punto de demarcación en una WAN?»; la opción válida es «Ubicación que separa CPE del equipo del proveedor».","«Última milla de fibra óptica únicamente» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué es el punto de demarcación en una WAN?»; la opción válida es «Ubicación que separa CPE del equipo del proveedor»."]}},
{t:"wan",q:"¿Qué describe el loop local (última milla)?",o:["Cable entre routers de backbone","Enlace del CPE a la central del proveedor (CO)","Red VPN sitio a sitio","Conexión entre dos sedes corporativas sin operador"],c:1,explicacion_detallada:{acierto:"La última milla es el medio (cobre/fibra) que une el CPE con la oficina central del ISP. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué describe el loop local (última milla)?",opciones:["«Cable entre routers de backbone» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué describe el loop local (última milla)?»; la opción válida es «Enlace del CPE a la central del proveedor (CO)».","Respuesta correcta. La última milla es el medio (cobre/fibra) que une el CPE con la oficina central del ISP. La opción «Enlace del CPE a la central del proveedor (CO)» es la única que satisface el criterio del enunciado.","VPN cifra tráfico sobre Internet u otra red; no elimina la necesidad de cifrado, lo implementa. No responde a «¿Qué describe el loop local (última milla)?»; la opción válida es «Enlace del CPE a la central del proveedor (CO)».","«Conexión entre dos sedes corporativas sin operador» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué describe el loop local (última milla)?»; la opción válida es «Enlace del CPE a la central del proveedor (CO)»."]}},
{t:"wan",q:"¿Por qué la comunicación serie es habitual en WAN y la paralela se limita a distancias cortas?",o:["La serie es más barata siempre","La sincronización de varios hilos en paralelo empeora con la distancia","El paralelo no existe en redes","La serie solo funciona en fibra"],c:1,explicacion_detallada:{acierto:"En paralelo varios bits viajan por cables distintos; a más distancia, sincronizar canales es difícil. La serie envía bits secuencialmente por un canal. .. .. .. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Por qué la comunicación serie es habitual en WAN y la paralela se limita a distancias ...",opciones:["«La serie es más barata siempre» confunde modelo económico o de propiedad con la característica técnica solicitada. No responde a «¿Por qué la comunicación serie es habitual en WAN y la paralela se ...»; la opción válida es «La sincronización de varios hilos en paralelo empeora con la distancia».","Respuesta correcta. En paralelo varios bits viajan por cables distintos; a más distancia, sincronizar canales es difícil. La opción «La sincronización de varios hilos en paralelo empeora con la distancia» es la única que satisface el criterio del enunciado.","Bus paralelo alinea varios bits a la vez; a más metros, mantener la alineación es inviable en WAN. No responde a «¿Por qué la comunicación serie es habitual en WAN y la paralela se ...»; la opción válida es «La sincronización de varios hilos en paralelo empeora con la distancia».","«La serie solo funciona en fibra» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Por qué la comunicación serie es habitual en WAN y la paralela se ...»; la opción válida es «La sincronización de varios hilos en paralelo empeora con la distancia»."]}},
{t:"wan",q:"¿Qué tecnología WAN de capa 2 está en desuso según el material?",o:["Metro Ethernet","MPLS","Frame Relay","PPP sobre DSL"],c:2,explicacion_detallada:{acierto:"Frame Relay y ATM son heredados y han sido sustituidos en gran medida por Metro Ethernet e Internet. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué tecnología WAN de capa 2 está en desuso según el material?",opciones:["Metro Ethernet es servicio WAN moderno del operador; no está en desuso. No responde a «¿Qué tecnología WAN de capa 2 está en desuso según el material?»; la opción válida es «Frame Relay».","MPLS etiqueta paquetes en la red del operador; sigue siendo tecnología activa, no legado como Frame Relay. No responde a «¿Qué tecnología WAN de capa 2 está en desuso según el material?»; la opción válida es «Frame Relay».","Respuesta correcta. Frame Relay y ATM son heredados y han sido sustituidos en gran medida por Metro Ethernet e Internet. La opción «Frame Relay» es la única que satisface el criterio del enunciado.","PPP es protocolo capa 2 de enlace punto a punto; no es jerarquía óptica SDH/SONET. No responde a «¿Qué tecnología WAN de capa 2 está en desuso según el material?»; la opción válida es «Frame Relay»."]}},
{t:"wan",q:"¿Qué estándar de fibra está siendo sustituido en parte por WDM?",o:["PPP","HDLC","SDH/SONET","DOCSIS"],c:2,explicacion_detallada:{acierto:"WDM multiplexa varias longitudes de onda sobre fibra, aumentando capacidad respecto a SDH/SONET clásicos. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué estándar de fibra está siendo sustituido en parte por WDM?",opciones:["PPP es protocolo capa 2 de enlace punto a punto; no es jerarquía óptica SDH/SONET. No responde a «¿Qué estándar de fibra está siendo sustituido en parte por WDM?»; la opción válida es «SDH/SONET».","HDLC encapsula tramas serie; SDH/SONET es jerarquía síncrona de transporte óptico. No responde a «¿Qué estándar de fibra está siendo sustituido en parte por WDM?»; la opción válida es «SDH/SONET».","Respuesta correcta. WDM multiplexa varias longitudes de onda sobre fibra, aumentando capacidad respecto a SDH/SONET clásicos. La opción «SDH/SONET» es la única que satisface el criterio del enunciado.","DOCSIS estandariza datos sobre coaxial de TV por cable; no es jerarquía SDH. No responde a «¿Qué estándar de fibra está siendo sustituido en parte por WDM?»; la opción válida es «SDH/SONET»."]}},

{t:"wan",q:"¿Qué identificador usa Frame Relay para los circuitos virtuales?",o:["VLAN ID","DLCI","SSID","OID"],c:1,explicacion_detallada:{acierto:"Frame Relay crea PVC identificados por DLCI (Data Link Connection Identifier). Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué identificador usa Frame Relay para los circuitos virtuales?",opciones:["VLAN ID segmenta tráfico Ethernet en switches; Frame Relay usa DLCI, no VLAN. No responde a «¿Qué identificador usa Frame Relay para los circuitos virtuales?»; la opción válida es «DLCI».","Respuesta correcta. Frame Relay crea PVC identificados por DLCI (Data Link Connection Identifier). La opción «DLCI» es la única que satisface el criterio del enunciado.","SSID identifica una WLAN; no tiene relación con circuitos Frame Relay. No responde a «¿Qué identificador usa Frame Relay para los circuitos virtuales?»; la opción válida es «DLCI».","OID identifica objetos SNMP en una MIB; no es identificador de Frame Relay. No responde a «¿Qué identificador usa Frame Relay para los circuitos virtuales?»; la opción válida es «DLCI»."]}},

{t:"wan",q:"¿Qué rol cumple un router PE en MPLS?",o:["Solo cliente sin etiquetas","Router de borde del proveedor que adjunta etiquetas","Dispositivo solo capa 2 del usuario","Servidor NTP"],c:1,explicacion_detallada:{acierto:"PE (Provider Edge) es borde del ISP en MPLS; CE es borde del cliente; P es router interno. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué rol cumple un router PE en MPLS?",opciones:["«Solo cliente sin etiquetas» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué rol cumple un router PE en MPLS?»; la opción válida es «Router de borde del proveedor que adjunta etiquetas».","Respuesta correcta. PE (Provider Edge) es borde del ISP en MPLS; CE es borde del cliente; P es router interno. La opción «Router de borde del proveedor que adjunta etiquetas» es la única que satisface el criterio del enunciado.","«Dispositivo solo capa 2 del usuario» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué rol cumple un router PE en MPLS?»; la opción válida es «Router de borde del proveedor que adjunta etiquetas».","NTP sincroniza relojes vía UDP 123; no configura MTU ni sustituye DNS. No responde a «¿Qué rol cumple un router PE en MPLS?»; la opción válida es «Router de borde del proveedor que adjunta etiquetas»."]}},
{t:"wan",q:"¿Qué característica tiene DSL respecto al medio compartido del cable?",o:["Comparte ancho de banda con todos los vecinos en el coaxial","Cada usuario tiene conexión directa al DSLAM sin degradar a otros por más usuarios","Usa solo fibra hasta el hogar siempre","No necesita módem"],c:1,explicacion_detallada:{acierto:"DSL no es medio compartido como el cable: cada abonado tiene su par hasta el DSLAM. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué característica tiene DSL respecto al medio compartido del cable?",opciones:["«Comparte ancho de banda con todos los vecinos en el coaxial» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué característica tiene DSL respecto al medio compartido del cable?»; la opción válida es «Cada usuario tiene conexión directa al DSLAM sin degradar a otros por más usuarios».","Respuesta correcta. DSL no es medio compartido como el cable: cada abonado tiene su par hasta el DSLAM. La opción «Cada usuario tiene conexión directa al DSLAM sin degradar a otros por más usuarios» es la única que satisface el criterio del enunciado.","«Usa solo fibra hasta el hogar siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué característica tiene DSL respecto al medio compartido del cable?»; la opción válida es «Cada usuario tiene conexión directa al DSLAM sin degradar a otros por más usuarios».","«No necesita módem» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué característica tiene DSL respecto al medio compartido del cable?»; la opción válida es «Cada usuario tiene conexión directa al DSLAM sin degradar a otros por más usuarios»."]}},

{t:"wan",q:"¿Qué capas del modelo OSI cubren principalmente los estándares WAN citados?",o:["Solo capa 7","Capa 1 y capa 2","Solo capa 3","Capas 5 a 7 únicamente"],c:1,explicacion_detallada:{acierto:"Físico (fibra, cobre, WDM) y enlace (Ethernet WAN, PPP, MPLS, etc.) son el foco WAN tradicional. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué capas del modelo OSI cubren principalmente los estándares WAN citados?",opciones:["«Solo capa 7» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué capas del modelo OSI cubren principalmente los estándares WAN ...»; la opción válida es «Capa 1 y capa 2».","Respuesta correcta. Físico (fibra, cobre, WDM) y enlace (Ethernet WAN, PPP, MPLS, etc.) son el foco WAN tradicional. La opción «Capa 1 y capa 2» es la única que satisface el criterio del enunciado.","«Solo capa 3» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué capas del modelo OSI cubren principalmente los estándares WAN ...»; la opción válida es «Capa 1 y capa 2».","«Capas 5 a 7 únicamente» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué capas del modelo OSI cubren principalmente los estándares WAN ...»; la opción válida es «Capa 1 y capa 2»."]}},
{t:"wan",q:"¿Qué es un DSLAM?",o:["Módem del usuario final","Multiplexor en la CO que concentra líneas DSL","Router CE de MPLS","Switch de capa 3 en la LAN"],c:1,explicacion_detallada:{acierto:"El DSLAM está en la central del proveedor y agrupa conexiones DSL de abonados. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Qué es un DSLAM?",opciones:["«Módem del usuario final» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué es un DSLAM?»; la opción válida es «Multiplexor en la CO que concentra líneas DSL».","Respuesta correcta. El DSLAM está en la central del proveedor y agrupa conexiones DSL de abonados. La opción «Multiplexor en la CO que concentra líneas DSL» es la única que satisface el criterio del enunciado.","MPLS etiqueta paquetes en la red del operador; sigue siendo tecnología activa, no legado como Frame Relay. Router CE (Customer Edge) está en la red del cliente conectado al PE. No responde a «¿Qué es un DSLAM?»; la opción válida es «Multiplexor en la CO que concentra líneas DSL».","Una LAN (Local Area Network) cubre un edificio o campus con switches y VLANs; no abarca ciudades ni depende de carriers externos entre sedes lejanas. No responde a «¿Qué es un DSLAM?»; la opción válida es «Multiplexor en la CO que concentra líneas DSL»."]}},
{t:"wan",q:"¿Por qué el cable coaxial puede bajar la velocidad en horas punta?",o:["Porque cada usuario tiene fibra dedicada","Porque el ancho de banda del coaxial es compartido entre suscriptores","Porque no usa DOCSIS","Porque prohibe IPv4"],c:1,explicacion_detallada:{acierto:"Todos los vecinos comparten el mismo medio; más usuarios implican menos Mbps efectivos. Ejemplo: una sucursal se conecta al datacenter mediante MPLS o VPN IPsec del ISP. Esto aplica en enlaces WAN y acceso del operador cuando el enunciado pregunta: ¿Por qué el cable coaxial puede bajar la velocidad en horas punta?",opciones:["Línea dedicada reserva capacidad para un cliente con SLA; distinta de best-effort en Internet. No responde a «¿Por qué el cable coaxial puede bajar la velocidad en horas punta?»; la opción válida es «Porque el ancho de banda del coaxial es compartido entre suscriptores».","Respuesta correcta. Todos los vecinos comparten el mismo medio; más usuarios implican menos Mbps efectivos. La opción «Porque el ancho de banda del coaxial es compartido entre suscriptores» es la única que satisface el criterio del enunciado.","DOCSIS estandariza datos sobre coaxial de TV por cable; no es jerarquía SDH. No responde a «¿Por qué el cable coaxial puede bajar la velocidad en horas punta?»; la opción válida es «Porque el ancho de banda del coaxial es compartido entre suscriptores».","«Porque prohibe IPv4» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Por qué el cable coaxial puede bajar la velocidad en horas punta?»; la opción válida es «Porque el ancho de banda del coaxial es compartido entre suscriptores»."]}},

{t:"wifi2",q:"¿Qué debes cambiar primero en un router SOHO por seguridad?",o:["Solo el SSID","IP, usuario y contraseña por defecto","Canal siempre a 13","Desactivar DHCP siempre"],c:1,explicacion_detallada:{acierto:"Credenciales e IP por defecto están publicadas; cambiarlas es la prioridad. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Qué debes cambiar primero en un router SOHO por seguridad?",opciones:["SSID identifica una WLAN; no tiene relación con circuitos Frame Relay. No responde a «¿Qué debes cambiar primero en un router SOHO por seguridad?»; la opción válida es «IP, usuario y contraseña por defecto».","Respuesta correcta. Credenciales e IP por defecto están publicadas; cambiarlas es la prioridad. La opción «IP, usuario y contraseña por defecto» es la única que satisface el criterio del enunciado.","«Canal siempre a 13» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué debes cambiar primero en un router SOHO por seguridad?»; la opción válida es «IP, usuario y contraseña por defecto».","«Desactivar DHCP siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué debes cambiar primero en un router SOHO por seguridad?»; la opción válida es «IP, usuario y contraseña por defecto»."]}},
{t:"wifi2",q:"¿Qué hace NAT en el router doméstico?",o:["Traduce direcciones privadas LAN a pública y rastrea puertos","Asigna nombres DNS solo","Cifra WPA3","Sustituye al switch"],c:0,explicacion_detallada:{acierto:"NAT traduce origen privado a global usando la IP pública del ISP y números de puerto. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Qué hace NAT en el router doméstico?",opciones:["Respuesta correcta. NAT traduce origen privado a global usando la IP pública del ISP y números de puerto. La opción «Traduce direcciones privadas LAN a pública y rastrea puertos» es la única que satisface el criterio del enunciado.","«Asigna nombres DNS solo» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué hace NAT en el router doméstico?»; la opción válida es «Traduce direcciones privadas LAN a pública y rastrea puertos».","WPA3-Personal usa SAE; mejora intercambio de claves frente a PSK débil. No responde a «¿Qué hace NAT en el router doméstico?»; la opción válida es «Traduce direcciones privadas LAN a pública y rastrea puertos».","«Sustituye al switch» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué hace NAT en el router doméstico?»; la opción válida es «Traduce direcciones privadas LAN a pública y rastrea puertos»."]}},
{t:"wifi2",q:"¿Para qué sirve QoS en un router inalámbrico?",o:["Aumentar potencia legal de la radio","Priorizar tráfico sensible al tiempo (voz/vídeo)","Desactivar NAT","Configurar VLAN troncal"],c:1,explicacion_detallada:{acierto:"QoS da prioridad a flujos críticos frente a tráfico best-effort. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Para qué sirve QoS en un router inalámbrico?",opciones:["«Aumentar potencia legal de la radio» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Para qué sirve QoS en un router inalámbrico?»; la opción válida es «Priorizar tráfico sensible al tiempo (voz/vídeo)».","Respuesta correcta. QoS da prioridad a flujos críticos frente a tráfico best-effort. La opción «Priorizar tráfico sensible al tiempo (voz/vídeo)» es la única que satisface el criterio del enunciado.","NAT traduce direcciones/puertos IPv4 privados a una pública; no asigna nombres DNS. No responde a «¿Para qué sirve QoS en un router inalámbrico?»; la opción válida es «Priorizar tráfico sensible al tiempo (voz/vídeo)».","VLAN ID segmenta tráfico Ethernet en switches; Frame Relay usa DLCI, no VLAN. No responde a «¿Para qué sirve QoS en un router inalámbrico?»; la opción válida es «Priorizar tráfico sensible al tiempo (voz/vídeo)»."]}},
{t:"wifi2",q:"¿Diferencia entre reenvío de puertos y activación de puertos?",o:["Son idénticos","Reenvío dirige tráfico entrante a un host; activación abre temporalmente tras tráfico saliente","Solo activación existe en Cisco IOS","Reenvío solo UDP"],c:1,explicacion_detallada:{acierto:"Port forwarding es estático; port triggering abre puertos tras solicitud saliente del interior. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Diferencia entre reenvío de puertos y activación de puertos?",opciones:["«Son idénticos» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Diferencia entre reenvío de puertos y activación de puertos?»; la opción válida es «Reenvío dirige tráfico entrante a un host; activación abre temporalmente tras tráfico saliente».","Respuesta correcta. Port forwarding es estático; port triggering abre puertos tras solicitud saliente del interior. La opción «Reenvío dirige tráfico entrante a un host; activación abre temporalmente tras tráfico saliente» es la única que satisface el criterio del enunciado.","«Solo activación existe en Cisco IOS» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Diferencia entre reenvío de puertos y activación de puertos?»; la opción válida es «Reenvío dirige tráfico entrante a un host; activación abre temporalmente tras tráfico saliente».","«Reenvío solo UDP» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Diferencia entre reenvío de puertos y activación de puertos?»; la opción válida es «Reenvío dirige tráfico entrante a un host; activación abre temporalmente tras tráfico saliente»."]}},
{t:"wifi2",q:"¿Qué protocolo usan los LAP para hablar con el WLC?",o:["SNMP","LWAPP (base de CAPWAP)","BGP","LLDP solo"],c:1,explicacion_detallada:{acierto:"LAPs ligeros usan LWAPP/CAPWAP hacia el controlador. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Qué protocolo usan los LAP para hablar con el WLC?",opciones:["SNMP gestiona dispositivos (UDP 161/162); no es protocolo AP-WLC. No responde a «¿Qué protocolo usan los LAP para hablar con el WLC?»; la opción válida es «LWAPP (base de CAPWAP)».","Respuesta correcta. LAPs ligeros usan LWAPP/CAPWAP hacia el controlador. La opción «LWAPP (base de CAPWAP)» es la única que satisface el criterio del enunciado.","«BGP» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué protocolo usan los LAP para hablar con el WLC?»; la opción válida es «LWAPP (base de CAPWAP)».","LLDP es estándar IEEE 802.1AB multi-vendor para descubrimiento de vecinos. No responde a «¿Qué protocolo usan los LAP para hablar con el WLC?»; la opción válida es «LWAPP (base de CAPWAP)»."]}},
{t:"wifi2",q:"¿Qué muestra CDP en el WLC sobre el AP?",o:["Solo temperatura","Puerto del switch al que está conectado el AP","Contraseña WPA","Versión de Java"],c:1,explicacion_detallada:{acierto:"CDP indica interfaz vecina (ej. Fa0/1 del switch conectado al AP). Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Qué muestra CDP en el WLC sobre el AP?",opciones:["«Solo temperatura» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué muestra CDP en el WLC sobre el AP?»; la opción válida es «Puerto del switch al que está conectado el AP».","Respuesta correcta. CDP indica interfaz vecina (ej. La opción «Puerto del switch al que está conectado el AP» es la única que satisface el criterio del enunciado.","«Contraseña WPA» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué muestra CDP en el WLC sobre el AP?»; la opción válida es «Puerto del switch al que está conectado el AP».","«Versión de Java» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué muestra CDP en el WLC sobre el AP?»; la opción válida es «Puerto del switch al que está conectado el AP»."]}},
{t:"wifi2",q:"Pasos para crear WLAN en WLC (orden lógico):",o:["Solo monitorear","Crear, habilitar, elegir interfaz, asegurar, verificar","Borrar interfaz virtual primero","Desactivar CAPWAP"],c:1,explicacion_detallada:{acierto:"Flujo: crear WLAN → apply/enable → interfaz → seguridad → verificar clientes. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: Pasos para crear WLAN en WLC (orden lógico):",opciones:["«Solo monitorear» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «Pasos para crear WLAN en WLC (orden lógico):»; la opción válida es «Crear, habilitar, elegir interfaz, asegurar, verificar».","Respuesta correcta. Flujo: crear WLAN → apply/enable → interfaz → seguridad → verificar clientes. La opción «Crear, habilitar, elegir interfaz, asegurar, verificar» es la única que satisface el criterio del enunciado.","«Borrar interfaz virtual primero» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Pasos para crear WLAN en WLC (orden lógico):»; la opción válida es «Crear, habilitar, elegir interfaz, asegurar, verificar».","CAPWAP tuneliza control/datos entre LAP y WLC (UDP 5246/5247). No responde a «Pasos para crear WLAN en WLC (orden lógico):»; la opción válida es «Crear, habilitar, elegir interfaz, asegurar, verificar»."]}},
{t:"wifi2",q:"¿Qué necesita WPA2 Enterprise en el WLC?",o:["Solo PSK de 8 caracteres","Servidor RADIUS (AAA) y 802.1X","Desactivar AES","SSID oculto únicamente"],c:1,explicacion_detallada:{acierto:"Enterprise usa RADIUS para credenciales por usuario; 802.1X gestiona autenticación. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Qué necesita WPA2 Enterprise en el WLC?",opciones:["«Solo PSK de 8 caracteres» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué necesita WPA2 Enterprise en el WLC?»; la opción válida es «Servidor RADIUS (AAA) y 802.1X».","Respuesta correcta. Enterprise usa RADIUS para credenciales por usuario; 802.1X gestiona autenticación. La opción «Servidor RADIUS (AAA) y 802.1X» es la única que satisface el criterio del enunciado.","AES con CCMP es cifrado robusto de WPA2/WPA3. No responde a «¿Qué necesita WPA2 Enterprise en el WLC?»; la opción válida es «Servidor RADIUS (AAA) y 802.1X».","SSID identifica una WLAN; no tiene relación con circuitos Frame Relay. No responde a «¿Qué necesita WPA2 Enterprise en el WLC?»; la opción válida es «Servidor RADIUS (AAA) y 802.1X»."]}},
{t:"wifi2",q:"¿Dónde se configuran los trap receivers SNMP en WLC?",o:["WLAN > Security","MANAGEMENT > SNMP > Trap Receivers","Controller > NAT","AP > FlexConnect"],c:1,explicacion_detallada:{acierto:"Ruta típica: MANAGEMENT, SNMP, Trap Receivers, New. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Dónde se configuran los trap receivers SNMP en WLC?",opciones:["Una WLAN (802.11) es acceso inalámbrico local mediante AP; no define por sí sola la infraestructura WAN del operador. No responde a «¿Dónde se configuran los trap receivers SNMP en WLC?»; la opción válida es «MANAGEMENT > SNMP > Trap Receivers».","Respuesta correcta. Ruta típica: MANAGEMENT, SNMP, Trap Receivers, New. La opción «MANAGEMENT > SNMP > Trap Receivers» es la única que satisface el criterio del enunciado.","NAT traduce direcciones/puertos IPv4 privados a una pública; no asigna nombres DNS. No responde a «¿Dónde se configuran los trap receivers SNMP en WLC?»; la opción válida es «MANAGEMENT > SNMP > Trap Receivers».","FlexConnect local switching mantiene servicio en sucursal si se pierde el WLC. No responde a «¿Dónde se configuran los trap receivers SNMP en WLC?»; la opción válida es «MANAGEMENT > SNMP > Trap Receivers»."]}},
{t:"wifi2",q:"¿Qué interfaz virtual usa una WLAN en VLAN 5 según la práctica del tema?",o:["management por defecto siempre","Interfaz asociada a VLAN 5 (ej. vlan5)","Solo loopback 0","No hace falta interfaz"],c:1,explicacion_detallada:{acierto:"Cada WLAN suele mapearse a una interfaz/VLAN virtual en el WLC. Ejemplo: al desplegar LAP, el WLC recibe CAPWAP y empuja SSID, VLAN y políticas de seguridad. Esto aplica en configuración SOHO o WLC cuando el enunciado pregunta: ¿Qué interfaz virtual usa una WLAN en VLAN 5 según la práctica del tema?",opciones:["«management por defecto siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué interfaz virtual usa una WLAN en VLAN 5 según la práctica del ...»; la opción válida es «Interfaz asociada a VLAN 5 (ej. vlan5)».","Respuesta correcta. Cada WLAN suele mapearse a una interfaz/VLAN virtual en el WLC. La opción «Interfaz asociada a VLAN 5 (ej. vlan5)» es la única que satisface el criterio del enunciado.","«Solo loopback 0» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué interfaz virtual usa una WLAN en VLAN 5 según la práctica del ...»; la opción válida es «Interfaz asociada a VLAN 5 (ej. vlan5)».","«No hace falta interfaz» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué interfaz virtual usa una WLAN en VLAN 5 según la práctica del ...»; la opción válida es «Interfaz asociada a VLAN 5 (ej. vlan5)»."]}},
{t:"wifi3",q:"¿Hasta qué distancia aproximada puede bastar un router SOHO sin malla?",o:["5 m interior","~45 m interior / ~90 m exterior","1 km","Sin límite"],c:1,explicacion_detallada:{acierto:"Más allá conviene malla con APs en canales no solapados. Ejemplo: si un cliente no obtiene IP, se ejecuta ipconfig en Windows antes de revisar DHCP en el WLC. Esto aplica en operación y troubleshooting WLAN cuando el enunciado pregunta: ¿Hasta qué distancia aproximada puede bastar un router SOHO sin malla?",opciones:["«5 m interior» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Hasta qué distancia aproximada puede bastar un router SOHO sin malla?»; la opción válida es «~45 m interior / ~90 m exterior».","Respuesta correcta. Más allá conviene malla con APs en canales no solapados. La opción «~45 m interior / ~90 m exterior» es la única que satisface el criterio del enunciado.","«1 km» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Hasta qué distancia aproximada puede bastar un router SOHO sin malla?»; la opción válida es «~45 m interior / ~90 m exterior».","«Sin límite» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Hasta qué distancia aproximada puede bastar un router SOHO sin malla?»; la opción válida es «~45 m interior / ~90 m exterior»."]}},
{t:"wifi3",q:"Metodología de troubleshooting: ¿cuántos pasos principales?",o:["3","6","10","2"],c:1,explicacion_detallada:{acierto:"Identificar, teoría, probar, plan, verificar, documentar (6 pasos). Ejemplo: si un cliente no obtiene IP, se ejecuta ipconfig en Windows antes de revisar DHCP en el WLC. Esto aplica en operación y troubleshooting WLAN cuando el enunciado pregunta: Metodología de troubleshooting: ¿cuántos pasos principales?",opciones:["«3» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Metodología de troubleshooting: ¿cuántos pasos principales?»; la opción válida es «6».","Respuesta correcta. Identificar, teoría, probar, plan, verificar, documentar (6 pasos). La opción «6» es la única que satisface el criterio del enunciado.","«10» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Metodología de troubleshooting: ¿cuántos pasos principales?»; la opción válida es «6».","«2» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Metodología de troubleshooting: ¿cuántos pasos principales?»; la opción válida es «6»."]}},
{t:"wifi3",q:"Si la WLAN es lenta, ¿qué banda suele usarse para multimedia con menos interferencia?",o:["2,4 GHz siempre","5 GHz","AM radio","Solo Bluetooth"],c:1,explicacion_detallada:{acierto:"5 GHz está menos congestionada y tiene más canales. Ejemplo: si un cliente no obtiene IP, se ejecuta ipconfig en Windows antes de revisar DHCP en el WLC. Esto aplica en operación y troubleshooting WLAN cuando el enunciado pregunta: Si la WLAN es lenta, ¿qué banda suele usarse para multimedia con menos interferencia?",opciones:["«2,4 GHz siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «Si la WLAN es lenta, ¿qué banda suele usarse para multimedia con me...»; la opción válida es «5 GHz».","Respuesta correcta. 5 GHz está menos congestionada y tiene más canales. La opción «5 GHz» es la única que satisface el criterio del enunciado.","«AM radio» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Si la WLAN es lenta, ¿qué banda suele usarse para multimedia con me...»; la opción válida es «5 GHz».","«Solo Bluetooth» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «Si la WLAN es lenta, ¿qué banda suele usarse para multimedia con me...»; la opción válida es «5 GHz»."]}},
{t:"wifi3",q:"¿Cómo actualizar firmware de todos los AP desde WLC 3504?",o:["Uno a uno solo por consola","WIRELESS > Access Points > Global Configuration (predescarga)","Solo por TFTP del PC del alumno","No es posible"],c:1,explicacion_detallada:{acierto:"Global Configuration permite imagen de firmware para todos los LAP. Ejemplo: si un cliente no obtiene IP, se ejecuta ipconfig en Windows antes de revisar DHCP en el WLC. Esto aplica en operación y troubleshooting WLAN cuando el enunciado pregunta: ¿Cómo actualizar firmware de todos los AP desde WLC 3504?",opciones:["«Uno a uno solo por consola» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Cómo actualizar firmware de todos los AP desde WLC 3504?»; la opción válida es «WIRELESS > Access Points > Global Configuration (predescarga)».","Respuesta correcta. Global Configuration permite imagen de firmware para todos los LAP. La opción «WIRELESS > Access Points > Global Configuration (predescarga)» es la única que satisface el criterio del enunciado.","TFTP copia archivos sin autenticación; copy running-config tftp sube la config al servidor. No responde a «¿Cómo actualizar firmware de todos los AP desde WLC 3504?»; la opción válida es «WIRELESS > Access Points > Global Configuration (predescarga)».","«No es posible» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cómo actualizar firmware de todos los AP desde WLC 3504?»; la opción válida es «WIRELESS > Access Points > Global Configuration (predescarga)»."]}},
{t:"wifi3",q:"Cliente no conecta: ¿qué comando verifica IP en Windows?",o:["show ip interface brief","ipconfig","ntp server","access-list"],c:1,explicacion_detallada:{acierto:"ipconfig muestra configuración IP del host. Ejemplo: si un cliente no obtiene IP, se ejecuta ipconfig en Windows antes de revisar DHCP en el WLC. Esto aplica en operación y troubleshooting WLAN cuando el enunciado pregunta: Cliente no conecta: ¿qué comando verifica IP en Windows?",opciones:["«show ip interface brief» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Cliente no conecta: ¿qué comando verifica IP en Windows?»; la opción válida es «ipconfig».","Respuesta correcta. ipconfig muestra configuración IP del host. La opción «ipconfig» es la única que satisface el criterio del enunciado.","NTP sincroniza relojes vía UDP 123; no configura MTU ni sustituye DNS. No responde a «Cliente no conecta: ¿qué comando verifica IP en Windows?»; la opción válida es «ipconfig».","«access-list» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Cliente no conecta: ¿qué comando verifica IP en Windows?»; la opción válida es «ipconfig»."]}},

{t:"acl1",q:"¿Qué es una ACE en una ACL?",o:["Tipo de cable","Entrada permit o deny del ACL","Protocolo NTP","Interfaz virtual WLC"],c:1,explicacion_detallada:{acierto:"ACE = Access Control Entry; cada línea permit/deny del ACL. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Qué es una ACE en una ACL?",opciones:["«Tipo de cable» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué es una ACE en una ACL?»; la opción válida es «Entrada permit o deny del ACL».","Respuesta correcta. ACE = Access Control Entry; cada línea permit/deny del ACL. La opción «Entrada permit o deny del ACL» es la única que satisface el criterio del enunciado.","NTP sincroniza relojes vía UDP 123; no configura MTU ni sustituye DNS. No responde a «¿Qué es una ACE en una ACL?»; la opción válida es «Entrada permit o deny del ACL».","«Interfaz virtual WLC» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué es una ACE en una ACL?»; la opción válida es «Entrada permit o deny del ACL»."]}},
{t:"acl1",q:"¿Qué ocurre si un paquete no coincide con ninguna ACE explícita?",o:["Se permite siempre","Se deniega por deny implícito al final","Se envía al CPU del router","Se convierte en broadcast"],c:1,explicacion_detallada:{acierto:"Todas las ACL terminan con deny implícito (oculto) que bloquea el resto. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Qué ocurre si un paquete no coincide con ninguna ACE explícita?",opciones:["«Se permite siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué ocurre si un paquete no coincide con ninguna ACE explícita?»; la opción válida es «Se deniega por deny implícito al final».","Respuesta correcta. Todas las ACL terminan con deny implícito (oculto) que bloquea el resto. La opción «Se deniega por deny implícito al final» es la única que satisface el criterio del enunciado.","«Se envía al CPU del router» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué ocurre si un paquete no coincide con ninguna ACE explícita?»; la opción válida es «Se deniega por deny implícito al final».","«Se convierte en broadcast» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué ocurre si un paquete no coincide con ninguna ACE explícita?»; la opción válida es «Se deniega por deny implícito al final»."]}},
{t:"acl1",q:"¿Las ACL filtran paquetes originados en el propio router?",o:["Sí, siempre","No operan sobre tráfico originado en el router","Solo en switches","Solo IPv6"],c:1,explicacion_detallada:{acierto:"ACL en interfaz filtra tránsito; tráfico del router (origen local) no se evalúa igual. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Las ACL filtran paquetes originados en el propio router?",opciones:["«Sí, siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Las ACL filtran paquetes originados en el propio router?»; la opción válida es «No operan sobre tráfico originado en el router».","Respuesta correcta. ACL en interfaz filtra tránsito; tráfico del router (origen local) no se evalúa igual. La opción «No operan sobre tráfico originado en el router» es la única que satisface el criterio del enunciado.","«Solo en switches» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Las ACL filtran paquetes originados en el propio router?»; la opción válida es «No operan sobre tráfico originado en el router».","«Solo IPv6» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Las ACL filtran paquetes originados en el propio router?»; la opción válida es «No operan sobre tráfico originado en el router»."]}},
{t:"acl1",q:"¿Dónde son más eficientes las ACL de entrada?",o:["Después de enrutar, en salida","Antes de enrutar, descartando pronto","Solo en switches capa 2","En el servidor syslog"],c:1,explicacion_detallada:{acierto:"Entrada filtra antes del routing lookup, ahorrando procesamiento si se descarta. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Dónde son más eficientes las ACL de entrada?",opciones:["«Después de enrutar, en salida» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Dónde son más eficientes las ACL de entrada?»; la opción válida es «Antes de enrutar, descartando pronto».","Respuesta correcta. Entrada filtra antes del routing lookup, ahorrando procesamiento si se descarta. La opción «Antes de enrutar, descartando pronto» es la única que satisface el criterio del enunciado.","«Solo en switches capa 2» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Dónde son más eficientes las ACL de entrada?»; la opción válida es «Antes de enrutar, descartando pronto».","Syslog envía eventos (UDP 514) con severidad 0-7; 0 es emergencia (sistema inutilizable). No responde a «¿Dónde son más eficientes las ACL de entrada?»; la opción válida es «Antes de enrutar, descartando pronto»."]}},
{t:"acl1",q:"En wildcard mask, ¿qué significa bit 0?",o:["Ignorar ese bit","Debe coincidir ese bit","Siempre deny","Host any"],c:1,explicacion_detallada:{acierto:"En wildcard: 0 = match, 1 = ignore (inverso intuitivo de máscara de subred). Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: En wildcard mask, ¿qué significa bit 0?",opciones:["«Ignorar ese bit» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «En wildcard mask, ¿qué significa bit 0?»; la opción válida es «Debe coincidir ese bit».","Respuesta correcta. En wildcard: 0 = match, 1 = ignore (inverso intuitivo de máscara de subred). La opción «Debe coincidir ese bit» es la única que satisface el criterio del enunciado.","Toda ACL IPv4 termina con deny implícito; sin permit explícito, el tráfico se descarta. No responde a «En wildcard mask, ¿qué significa bit 0?»; la opción válida es «Debe coincidir ese bit».","«Host any» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «En wildcard mask, ¿qué significa bit 0?»; la opción válida es «Debe coincidir ese bit»."]}},
{t:"acl1",q:"¿Qué wildcard equivale a un host específico?",o:["255.255.255.255","0.0.0.0","0.0.0.255","0.0.15.255"],c:1,explicacion_detallada:{acierto:"0.0.0.0 exige coincidencia de todos los bits = un solo host. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Qué wildcard equivale a un host específico?",opciones:["«255.255.255.255» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué wildcard equivale a un host específico?»; la opción válida es «0.0.0.0».","Respuesta correcta. 0.0.0.0 exige coincidencia de todos los bits = un solo host. La opción «0.0.0.0» es la única que satisface el criterio del enunciado.","«0.0.0.255» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué wildcard equivale a un host específico?»; la opción válida es «0.0.0.0».","«0.0.15.255» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué wildcard equivale a un host específico?»; la opción válida es «0.0.0.0»."]}},
{t:"acl1",q:"¿Cómo calcular wildcard de subred 255.255.255.0?",o:["Restar máscara de 255.255.255.255 → 0.0.0.255","Sumar a la IP","Usar /24 directamente","Siempre 255.0.0.0"],c:0,explicacion_detallada:{acierto:"Wildcard = 255.255.255.255 - máscara de subred. 255.255.0? 255.255.0? 255.255.0? Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Cómo calcular wildcard de subred 255.255.255.0?",opciones:["Respuesta correcta. Wildcard = 255.255.255.255 - máscara de subred. La opción «Restar máscara de 255.255.255.255 → 0.0.0.255» es la única que satisface el criterio del enunciado.","«Sumar a la IP» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cómo calcular wildcard de subred 255.255.255.0?»; la opción válida es «Restar máscara de 255.255.255.255 → 0.0.0.255».","«Usar /24 directamente» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cómo calcular wildcard de subred 255.255.255.0?»; la opción válida es «Restar máscara de 255.255.255.255 → 0.0.0.255».","«Siempre 255.0.0.0» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Cómo calcular wildcard de subred 255.255.255.0?»; la opción válida es «Restar máscara de 255.255.255.255 → 0.0.0.255»."]}},
{t:"acl1",q:"Palabra clave IOS host en ACL significa:",o:["Wildcard 255.255.255.255","Wildcard 0.0.0.0","Deny todo","Log únicamente"],c:1,explicacion_detallada:{acierto:"host x.x.x.x = máscara 0.0.0.0 (un host). Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: Palabra clave IOS host en ACL significa:",opciones:["En wildcard mask: bit 0 = debe coincidir, bit 1 = ignorar (inverso a máscara de subred). No responde a «Palabra clave IOS host en ACL significa:»; la opción válida es «Wildcard 0.0.0.0».","Respuesta correcta. host x.x.x.x = máscara 0.0.0.0 (un host). La opción «Wildcard 0.0.0.0» es la única que satisface el criterio del enunciado.","Toda ACL IPv4 termina con deny implícito; sin permit explícito, el tráfico se descarta. No responde a «Palabra clave IOS host en ACL significa:»; la opción válida es «Wildcard 0.0.0.0».","«Log únicamente» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «Palabra clave IOS host en ACL significa:»; la opción válida es «Wildcard 0.0.0.0»."]}},
{t:"acl1",q:"Rango de números para ACL estándar IPv4:",o:["100-199","1-99 y 1300-1999","2000-2699","700-799"],c:1,explicacion_detallada:{acierto:"Estándar: 1-99 y 1300-1999; extendida: 100-199 y 2000-2699. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: Rango de números para ACL estándar IPv4:",opciones:["«100-199» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Rango de números para ACL estándar IPv4:»; la opción válida es «1-99 y 1300-1999».","Respuesta correcta. Estándar: 1-99 y 1300-1999; extendida: 100-199 y 2000-2699. La opción «1-99 y 1300-1999» es la única que satisface el criterio del enunciado.","«2000-2699» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Rango de números para ACL estándar IPv4:»; la opción válida es «1-99 y 1300-1999».","«700-799» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Rango de números para ACL estándar IPv4:»; la opción válida es «1-99 y 1300-1999»."]}},
{t:"acl1",q:"¿Dónde colocar ACL estándar según buenas prácticas?",o:["Lo más cerca del origen","Lo más cerca del destino","Solo en servidor RADIUS","En consola vty siempre"],c:1,explicacion_detallada:{acierto:"Estándar solo filtra por origen; cerca del destino evita bloquear tráfico legítimo intermedio. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Dónde colocar ACL estándar según buenas prácticas?",opciones:["«Lo más cerca del origen» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Dónde colocar ACL estándar según buenas prácticas?»; la opción válida es «Lo más cerca del destino».","Respuesta correcta. Estándar solo filtra por origen; cerca del destino evita bloquear tráfico legítimo intermedio. La opción «Lo más cerca del destino» es la única que satisface el criterio del enunciado.","RADIUS autentica usuarios (1812/1813); distinto de CAPWAP (5246/5247). No responde a «¿Dónde colocar ACL estándar según buenas prácticas?»; la opción válida es «Lo más cerca del destino».","Líneas vty gestionan acceso remoto Telnet/SSH; access-class filtra quién entra. No responde a «¿Dónde colocar ACL estándar según buenas prácticas?»; la opción válida es «Lo más cerca del destino»."]}},
{t:"acl1",q:"¿Dónde colocar ACL extendida?",o:["Siempre en destino lejano","Lo más cerca del origen del tráfico a filtrar","Solo en loopback","En NVRAM"],c:1,explicacion_detallada:{acierto:"Extendida puede filtrar origen/destino/puertos; filtrar al origen ahorra ancho de banda. Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Dónde colocar ACL extendida?",opciones:["«Siempre en destino lejano» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Dónde colocar ACL extendida?»; la opción válida es «Lo más cerca del origen del tráfico a filtrar».","Respuesta correcta. Extendida puede filtrar origen/destino/puertos; filtrar al origen ahorra ancho de banda. La opción «Lo más cerca del origen del tráfico a filtrar» es la única que satisface el criterio del enunciado.","«Solo en loopback» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Dónde colocar ACL extendida?»; la opción válida es «Lo más cerca del origen del tráfico a filtrar».","«En NVRAM» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Dónde colocar ACL extendida?»; la opción válida es «Lo más cerca del origen del tráfico a filtrar»."]}},
{t:"acl1",q:"¿Cuántas ACL IPv4 pueden aplicarse por interfaz (dual-stack máx.)?",o:["Una sola","Hasta una entrada y una salida IPv4 (y análogo IPv6)","Ilimitadas","Ninguna"],c:1,explicacion_detallada:{acierto:"Por protocolo: una ACL in y una out por interfaz. )? )? )? Ejemplo: colocar ACL estándar cerca del destino evita bloquear tráfico legítimo intermedio. Esto aplica en listas de control de acceso IPv4 cuando el enunciado pregunta: ¿Cuántas ACL IPv4 pueden aplicarse por interfaz (dual-stack máx.)?",opciones:["«Una sola» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cuántas ACL IPv4 pueden aplicarse por interfaz (dual-stack máx.)?»; la opción válida es «Hasta una entrada y una salida IPv4 (y análogo IPv6)».","Respuesta correcta. Por protocolo: una ACL in y una out por interfaz. La opción «Hasta una entrada y una salida IPv4 (y análogo IPv6)» es la única que satisface el criterio del enunciado.","«Ilimitadas» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cuántas ACL IPv4 pueden aplicarse por interfaz (dual-stack máx.)?»; la opción válida es «Hasta una entrada y una salida IPv4 (y análogo IPv6)».","«Ninguna» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cuántas ACL IPv4 pueden aplicarse por interfaz (dual-stack máx.)?»; la opción válida es «Hasta una entrada y una salida IPv4 (y análogo IPv6)»."]}},

{t:"acl2",q:"Comando para aplicar ACL estándar a interfaz:",o:["access-class","ip access-group número in|out","ntp server","lldp run"],c:1,explicacion_detallada:{acierto:"ip access-group enlaza ACL numerada o nombrada a la interfaz. Ejemplo: access-class 10 in en vty 0 4 limita SSH solo a la subred de gestión. Esto aplica en ACL estándar y su aplicación cuando el enunciado pregunta: Comando para aplicar ACL estándar a interfaz:",opciones:["access-class aplica ACL a líneas vty (Telnet/SSH); ip access-group va en interfaces. No responde a «Comando para aplicar ACL estándar a interfaz:»; la opción válida es «ip access-group número in|out».","Respuesta correcta. ip access-group enlaza ACL numerada o nombrada a la interfaz. La opción «ip access-group número in|out» es la única que satisface el criterio del enunciado.","NTP sincroniza relojes vía UDP 123; no configura MTU ni sustituye DNS. No responde a «Comando para aplicar ACL estándar a interfaz:»; la opción válida es «ip access-group número in|out».","LLDP es estándar IEEE 802.1AB multi-vendor para descubrimiento de vecinos. No responde a «Comando para aplicar ACL estándar a interfaz:»; la opción válida es «ip access-group número in|out»."]}},
{t:"acl2",q:"Comando para crear ACL estándar nombrada:",o:["access-list 50","ip access-list standard NOMBRE","ip access-list extended NOMBRE","route-map"],c:1,explicacion_detallada:{acierto:"ip access-list standard crea ACL con nombre en submodo. Ejemplo: access-class 10 in en vty 0 4 limita SSH solo a la subred de gestión. Esto aplica en ACL estándar y su aplicación cuando el enunciado pregunta: Comando para crear ACL estándar nombrada:",opciones:["«access-list 50» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Comando para crear ACL estándar nombrada:»; la opción válida es «ip access-list standard NOMBRE».","Respuesta correcta. ip access-list standard crea ACL con nombre en submodo. La opción «ip access-list standard NOMBRE» es la única que satisface el criterio del enunciado.","«ip access-list extended NOMBRE» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Comando para crear ACL estándar nombrada:»; la opción válida es «ip access-list standard NOMBRE».","«route-map» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Comando para crear ACL estándar nombrada:»; la opción válida es «ip access-list standard NOMBRE»."]}},
{t:"acl2",q:"¿Cómo proteger acceso Telnet/SSH con ACL estándar?",o:["ip access-group en interfaz WAN únicamente","access-class ACL en líneas vty","no cdp run","syslog on"],c:1,explicacion_detallada:{acierto:"access-class aplica ACL al tráfico entrante en vty. Ejemplo: access-class 10 in en vty 0 4 limita SSH solo a la subred de gestión. Esto aplica en ACL estándar y su aplicación cuando el enunciado pregunta: ¿Cómo proteger acceso Telnet/SSH con ACL estándar?",opciones:["Una WAN conecta redes geográficamente distantes mediante enlaces del operador (MPLS, fibra, VPN). No responde a «¿Cómo proteger acceso Telnet/SSH con ACL estándar?»; la opción válida es «access-class ACL en líneas vty».","Respuesta correcta. access-class aplica ACL al tráfico entrante en vty. La opción «access-class ACL en líneas vty» es la única que satisface el criterio del enunciado.","CDP descubre vecinos Cisco capa 2; no muestra contraseñas WPA ni gestiona Wi-Fi. No responde a «¿Cómo proteger acceso Telnet/SSH con ACL estándar?»; la opción válida es «access-class ACL en líneas vty».","Syslog envía eventos (UDP 514) con severidad 0-7; 0 es emergencia (sistema inutilizable). No responde a «¿Cómo proteger acceso Telnet/SSH con ACL estándar?»; la opción válida es «access-class ACL en líneas vty»."]}},
{t:"acl2",q:"Para ver coincidencias de deny implícito debes:",o:["Es imposible","Configurar explícitamente deny any con log","Usar solo IPv6","Borrar la ACL"],c:1,explicacion_detallada:{acierto:"La deny implícita no cuenta estadísticas; añade deny any explícita si necesitas verla. Ejemplo: access-class 10 in en vty 0 4 limita SSH solo a la subred de gestión. Esto aplica en ACL estándar y su aplicación cuando el enunciado pregunta: Para ver coincidencias de deny implícito debes:",opciones:["«Es imposible» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Para ver coincidencias de deny implícito debes:»; la opción válida es «Configurar explícitamente deny any con log».","Respuesta correcta. La deny implícita no cuenta estadísticas; añade deny any explícita si necesitas verla. La opción «Configurar explícitamente deny any con log» es la única que satisface el criterio del enunciado.","«Usar solo IPv6» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «Para ver coincidencias de deny implícito debes:»; la opción válida es «Configurar explícitamente deny any con log».","ACL filtra tráfico IP; ACE es cada línea permit/deny dentro de la lista. No responde a «Para ver coincidencias de deny implícito debes:»; la opción válida es «Configurar explícitamente deny any con log»."]}},
{t:"acl2",q:"¿Cómo modificar una ACE sin reescribir toda la ACL numerada?",o:["Solo reiniciar router","Usar números de secuencia en ACL nombrada/estándar con ip access-list","edit access-list en ROMmon","copy run tftp"],c:1,explicacion_detallada:{acierto:"no 10 y luego nueva línea 10 en modo ip access-list standard/extended. Ejemplo: access-class 10 in en vty 0 4 limita SSH solo a la subred de gestión. Esto aplica en ACL estándar y su aplicación cuando el enunciado pregunta: ¿Cómo modificar una ACE sin reescribir toda la ACL numerada?",opciones:["«Solo reiniciar router» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Cómo modificar una ACE sin reescribir toda la ACL numerada?»; la opción válida es «Usar números de secuencia en ACL nombrada/estándar con ip access-list».","Respuesta correcta. no 10 y luego nueva línea 10 en modo ip access-list standard/extended. La opción «Usar números de secuencia en ACL nombrada/estándar con ip access-list» es la única que satisface el criterio del enunciado.","«edit access-list en ROMmon» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Cómo modificar una ACE sin reescribir toda la ACL numerada?»; la opción válida es «Usar números de secuencia en ACL nombrada/estándar con ip access-list».","TFTP copia archivos sin autenticación; copy running-config tftp sube la config al servidor. copy running-config startup-config guarda config actual; hacerlo antes de cambiar pass borra credenciales nuevas en recuperación. No responde a «¿Cómo modificar una ACE sin reescribir toda la ACL numerada?»; la opción válida es «Usar números de secuencia en ACL nombrada/estándar con ip access-list»."]}},
