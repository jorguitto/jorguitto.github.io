<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipo Test — Redes (Trimestre 3)</title>
<style>
:root {
  --bg: #0f1419;
  --surface: #1a2332;
  --surface2: #243044;
  --text: #e7ecf3;
  --muted: #8b9cb3;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --ok: #22c55e;
  --ok-bg: rgba(34,197,94,.12);
  --bad: #ef4444;
  --bad-bg: rgba(239,68,68,.12);
  --warn: #f59e0b;
  --radius: 12px;
  --font: "Segoe UI", system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  min-height: 100vh;
}
header {
  background: linear-gradient(135deg, #1e3a5f 0%, #0f1419 100%);
  padding: 1.5rem 1.25rem;
  border-bottom: 1px solid #2d3f56;
}
header h1 { font-size: 1.35rem; font-weight: 600; }
header p { color: var(--muted); font-size: 0.9rem; margin-top: 0.35rem; }
main { max-width: 820px; margin: 0 auto; padding: 1.25rem; }
.panel {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-bottom: 1rem;
  border: 1px solid #2d3f56;
}
.panel h2 { font-size: 1rem; margin-bottom: 0.75rem; color: #a8c4e8; }
.temas-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 0.5rem;
}
.tema-chip {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.5rem 0.65rem;
  background: var(--surface2);
  border-radius: 8px;
  cursor: pointer;
  border: 1px solid transparent;
  font-size: 0.82rem;
  transition: border-color .15s, background .15s;
}
.tema-chip:hover { border-color: var(--accent); }
.tema-chip input { accent-color: var(--accent); }
.tema-chip label { cursor: pointer; flex: 1; }
.actions { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
button, .btn {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 0.6rem 1.1rem;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  transition: transform .1s, background .15s;
}
button:active { transform: scale(0.98); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid #3d5270; }
.btn-secondary:hover { background: #2d4058; }
.btn-ok { background: var(--ok); color: #fff; }
.btn-warn { background: var(--warn); color: #111; }
.hidden { display: none !important; }
.progress-bar {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
  margin-bottom: 1rem;
}
.progress-fill {
  height: 100%;
  background: var(--accent);
  transition: width .3s;
}
.quiz-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 0.5rem;
  margin-bottom: 0.75rem;
  font-size: 0.85rem;
  color: var(--muted);
}
.q-tema {
  display: inline-block;
  background: #2a4060;
  color: #93c5fd;
  padding: 0.15rem 0.5rem;
  border-radius: 4px;
  font-size: 0.75rem;
  margin-bottom: 0.5rem;
}
.q-text { font-size: 1.05rem; font-weight: 500; margin-bottom: 1rem; }
.options { display: flex; flex-direction: column; gap: 0.5rem; }
.option {
  display: block;
  padding: 0.75rem 1rem;
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: border-color .15s, background .15s;
}
.option:hover:not(.locked) { border-color: #4a6a8f; }
.option.selected { border-color: var(--accent); background: #1e3350; }
.option.correct { border-color: var(--ok); background: var(--ok-bg); }
.option.incorrect { border-color: var(--bad); background: var(--bad-bg); }
.option.locked { cursor: default; opacity: 0.95; }
.feedback {
  margin-top: 1rem;
  padding: 1rem;
  border-radius: 8px;
  font-size: 0.92rem;
}
.feedback.ok { background: var(--ok-bg); border-left: 4px solid var(--ok); }
.feedback.bad { background: var(--bad-bg); border-left: 4px solid var(--bad); }
.feedback strong { display: block; margin-bottom: 0.35rem; }
.nav-quiz { display: flex; gap: 0.5rem; margin-top: 1rem; flex-wrap: wrap; }
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 0.75rem;
  margin: 1rem 0;
}
.stat-card {
  background: var(--surface2);
  padding: 1rem;
  border-radius: 8px;
  text-align: center;
}
.stat-card .num { font-size: 1.75rem; font-weight: 700; }
.stat-card .lbl { font-size: 0.8rem; color: var(--muted); }
.fail-list { margin-top: 1rem; }
.fail-item {
  padding: 0.75rem;
  background: var(--surface2);
  border-radius: 8px;
  margin-bottom: 0.5rem;
  font-size: 0.88rem;
  border-left: 3px solid var(--bad);
}
.options-inline { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
.options-inline label { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
select {
  background: var(--surface2);
  color: var(--text);
  border: 1px solid #3d5270;
  padding: 0.45rem 0.65rem;
  border-radius: 6px;
  font-family: inherit;
}
</style>
</head>
<body>
<header>
  <h1>Tipo Test — Redes (Trimestre 3)</h1>
  <p>WAN · WLAN · ACL · CDP/LLDP/NTP · SNMP/Syslog · Amazon VPC</p>
</header>
<main>
  <section id="pantalla-inicio" class="panel">
    <h2>Selecciona los temas</h2>
    <div class="temas-grid" id="temas-container"></div>
    <div class="options-inline" style="margin-top:1rem">
      <label><input type="checkbox" id="mezclar-preguntas" checked> Mezclar preguntas</label>
      <label><input type="checkbox" id="mezclar-opciones" checked> Mezclar opciones</label>
    </div>
    <div class="actions">
      <button type="button" class="btn-primary" id="btn-todos">Todos los temas</button>
      <button type="button" class="btn-secondary" id="btn-ninguno">Ninguno</button>
      <button type="button" class="btn-primary" id="btn-empezar">Empezar test</button>
    </div>
    <p style="margin-top:0.75rem;font-size:0.85rem;color:var(--muted)" id="contador-preguntas"></p>
  </section>

  <section id="pantalla-quiz" class="panel hidden">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="quiz-meta">
      <span id="quiz-contador">Pregunta 1 de 1</span>
      <span id="quiz-puntuacion">Aciertos: 0</span>
    </div>
    <span class="q-tema" id="q-tema-label"></span>
    <p class="q-text" id="q-text"></p>
    <div class="options" id="q-options"></div>
    <div class="feedback hidden" id="q-feedback"></div>
    <div class="nav-quiz">
      <button type="button" class="btn-primary hidden" id="btn-siguiente">Siguiente</button>
      <button type="button" class="btn-secondary" id="btn-abandonar">Volver al inicio</button>
    </div>
  </section>

  <section id="pantalla-resultados" class="panel hidden">
    <h2>Resultados</h2>
    <div class="results-grid" id="results-stats"></div>
    <div class="fail-list hidden" id="fail-summary"></div>
    <div class="actions">
      <button type="button" class="btn-warn hidden" id="btn-repetir-fallos">Repetir solo las falladas</button>
      <button type="button" class="btn-secondary" id="btn-nuevo-test">Nuevo test</button>
      <button type="button" class="btn-secondary" id="btn-inicio-res">Cambiar temas</button>
    </div>
  </section>
</main>
<script>
const TEMAS = {
  wan: "8.6 Conceptos WAN",
  wifi1: "9.1 Conceptos redes inalámbricas",
  wifi2: "9.2 Configuración WLAN",
  wifi3: "9.3 Resumen WLAN (router/WLC)",
  acl1: "10.1 Conceptos ACL",
  acl2: "10.2 ACL estándar IPv4",
  acl3: "10.3 ACL extendidas IPv4",
  proto: "10.4 CDP, LLDP y NTP",
  snmp: "10.5 SNMP, Syslog y mantenimiento",
  vpc: "10.6 Práctica Amazon VPC"
};

const PREGUNTAS = [
/* ========== WAN ========== */
{t:"wan",q:"¿Qué define correctamente una WAN?",o:["Red de área local de alta velocidad en un edificio","Red de telecomunicaciones de gran extensión geográfica para conectar más allá de la LAN","Red exclusivamente inalámbrica doméstica","Red propiedad siempre de la organización del usuario"],c:1,ok:"Una WAN abarca áreas geográficas amplias y conecta sitios, usuarios o redes remotas fuera del alcance de una LAN. Suele ser propiedad y administrada por proveedores (ISP, cable, satélite).",ko:"La WAN no es una LAN ni una red solo doméstica: es la infraestructura de larga distancia que enlaza sedes o usuarios remotos, normalmente con coste de servicio adicional."},
{t:"wan",q:"¿Cuál es una característica típica de una WAN privada dedicada?",o:["Ancho de banda variable sin garantías","Conexión compartida con otros clientes en Internet","Nivel de servicio garantizado y ancho de banda consistente","Sin coste adicional respecto a la LAN"],c:2,ok:"Las WAN privadas dedicadas ofrecen SLA, ancho de banda predecible y mayor seguridad al ser exclusivas del cliente.",ko:"Las WAN públicas basadas en Internet comparten infraestructura; las privadas dedicadas priorizan calidad y consistencia del servicio."},
{t:"wan",q:"En topología hub-and-spoke (estrella), ¿qué ocurre si falla el router concentrador?",o:["Solo falla un enlace punto a punto","Los sitios radiales pueden comunicarse directamente","La comunicación entre sitios radiales también falla","Se activa automáticamente malla completa"],c:2,ok:"En hub-and-spoke los radios solo se comunican entre sí pasando por el hub; es un punto único de falla.",ko:"El hub concentra el tráfico; sin él, los spokes no tienen ruta entre ellos salvo otra topología redundante."},
{t:"wan",q:"¿Qué ventaja principal ofrece la topología de doble conexión (dual-homed)?",o:["Menor coste que una sola conexión","Redundancia, equilibrio de carga y respaldo del proveedor","Eliminación de la necesidad de routers","Solo sirve en LAN"],c:1,ok:"Dual-homed añade redundancia y puede permitir balanceo, pero es más cara y compleja de configurar.",ko:"La doble conexión mejora disponibilidad; no reduce costes ni sustituye el enrutamiento."},
{t:"wan",q:"¿Qué dispositivo del suscriptor conecta la LAN al equipo de comunicación WAN?",o:["DCE","DTE","POP","CO"],c:1,ok:"El DTE (Data Terminal Equipment) es el equipo del cliente (router) que conecta la LAN al WAN.",ko:"El DCE es del proveedor; POP y CO son puntos de la red del operador."},
{t:"wan",q:"¿Qué es el punto de demarcación en una WAN?",o:["Oficina central del proveedor","Ubicación que separa CPE del equipo del proveedor","Red troncal entre operadores","Última milla de fibra óptica únicamente"],c:1,ok:"El punto de demarcación marca la frontera física/legal entre instalación del cliente (CPE) y red del proveedor.",ko:"No es la CO ni la red troncal: es el límite del edificio/complejo donde termina la responsabilidad del cliente."},
{t:"wan",q:"¿Qué describe el loop local (última milla)?",o:["Cable entre routers de backbone","Enlace del CPE a la central del proveedor (CO)","Red VPN sitio a sitio","Conexión entre dos sedes corporativas sin operador"],c:1,ok:"La última milla es el medio (cobre/fibra) que une el CPE con la oficina central del ISP.",ko:"Backbone y VPN son otros conceptos; el loop local es el acceso del abonado al proveedor."},
{t:"wan",q:"¿Por qué la comunicación serie es habitual en WAN y la paralela se limita a distancias cortas?",o:["La serie es más barata siempre","La sincronización de varios hilos en paralelo empeora con la distancia","El paralelo no existe en redes","La serie solo funciona en fibra"],c:1,ok:"En paralelo varios bits viajan por cables distintos; a más distancia, sincronizar canales es difícil. La serie envía bits secuencialmente por un canal.",ko:"No es cuestión de precio únicamente: es limitación física de sincronización en enlaces largos."},
{t:"wan",q:"¿Qué tecnología WAN de capa 2 está en desuso según el material?",o:["Metro Ethernet","MPLS","Frame Relay","PPP sobre DSL"],c:2,ok:"Frame Relay y ATM son heredados y han sido sustituidos en gran medida por Metro Ethernet e Internet.",ko:"Metro Ethernet y MPLS son opciones modernas; Frame Relay es legado NBMA."},
{t:"wan",q:"¿Qué estándar de fibra está siendo sustituido en parte por WDM?",o:["PPP","HDLC","SDH/SONET","DOCSIS"],c:2,ok:"WDM multiplexa varias longitudes de onda sobre fibra, aumentando capacidad respecto a SDH/SONET clásicos.",ko:"PPP/HDLC son capa 2; DOCSIS es cable; SDH/SONET son jerarquías síncronas en desplazamiento."},
{t:"wan",q:"En América del Norte, ¿qué ancho de banda máximo aproximado ofrece un enlace T3?",o:["1,544 Mbps","2,048 Mbps","43,7 Mbps","34,368 Mbps"],c:2,ok:"T-carrier: T1 ≈ 1,544 Mbps, T3 ≈ 43,7 Mbps. E-carrier usa E1/E3 en Europa.",ko:"2,048 Mbps es E1; 34,368 Mbps es E3; 1,544 Mbps es T1."},
{t:"wan",q:"¿Cuál es una desventaja principal de las líneas arrendadas punto a punto?",o:["Baja calidad de servicio","Alto coste al conectar muchos sitios","No permiten voz sobre IP","Imposibilitan uso de VPN"],c:1,ok:"Cada enlace dedicado se paga por distancia y capacidad; conectar muchas sedes encarece mucho la solución.",ko:"Suelen ofrecer buena calidad; el problema principal es coste y capacidad fija poco flexible."},
{t:"wan",q:"¿Qué velocidad máxima típica tenía el acceso telefónico analógico (PSTN) con módem?",o:["2,048 Mbps","Menos de 56 kbps","100 Mbps","1 Gbps"],c:1,ok:"Las limitaciones del bucle local PSTN restringían la señal a menos de 56 kbps.",ko:"ISDN y DSL superaban eso; 56 kbps era el techo práctico del módem voz."},
{t:"wan",q:"¿Qué identificador usa Frame Relay para los circuitos virtuales?",o:["VLAN ID","DLCI","SSID","OID"],c:1,ok:"Frame Relay crea PVC identificados por DLCI (Data Link Connection Identifier).",ko:"VLAN es Ethernet; SSID es Wi-Fi; OID es SNMP."},
{t:"wan",q:"¿Qué tamaño fijo tienen las celdas ATM?",o:["53 bytes","1500 bytes","64 bytes","128 bytes"],c:0,ok:"ATM usa celdas de 53 bytes (arquitectura basada en celdas, no en tramas Ethernet).",ko:"1500 bytes es MTU Ethernet típico; ATM siempre usa 53 bytes."},
{t:"wan",q:"¿Qué rol cumple un router PE en MPLS?",o:["Solo cliente sin etiquetas","Router de borde del proveedor que adjunta etiquetas","Dispositivo solo capa 2 del usuario","Servidor NTP"],c:1,ok:"PE (Provider Edge) es borde del ISP en MPLS; CE es borde del cliente; P es router interno.",ko:"PE trabaja con etiquetas MPLS en la red del proveedor; el CE está en la red del cliente."},
{t:"wan",q:"¿Qué característica tiene DSL respecto al medio compartido del cable?",o:["Comparte ancho de banda con todos los vecinos en el coaxial","Cada usuario tiene conexión directa al DSLAM sin degradar a otros por más usuarios","Usa solo fibra hasta el hogar siempre","No necesita módem"],c:1,ok:"DSL no es medio compartido como el cable: cada abonado tiene su par hasta el DSLAM.",ko:"En cable todos los suscriptores comparten el mismo coaxial; en DSL la línea es dedicada al abonado."},
{t:"wan",q:"¿Para qué usa el ISP habitualmente PPP sobre banda ancha?",o:["Sustituir DNS","Autenticar al suscriptor y asignar IPv4 pública","Cifrar Wi-Fi","Reemplazar MPLS en el backbone"],c:1,ok:"PPPoE/PPPoA permiten autenticación, asignación de IP y gestión de calidad del enlace.",ko:"PPP en acceso no sustituye MPLS ni Wi-Fi; gestiona sesión del abonado."},
{t:"wan",q:"¿Qué significa FTTH?",o:["Fiber to the Home — fibra hasta la vivienda","Frame Transfer Telephony Host","Fast Token Tunneling Header","Fiber trunk telehouse"],c:0,ok:"FTTx incluye FTTH, FTTB, FTTN según hasta dónde llega la fibra.",ko:"FTTH es fibra hasta el hogar, no protocolos de capa 2 ni nombres ficticios."},
{t:"wan",q:"¿Qué topología de conexión a ISP ofrece mayor redundancia entre varios proveedores?",o:["Conexión única","Dual-homed (mismo ISP, dos enlaces)","Multihomed (dos ISP distintos)","Dual-multihomed (enlaces redundantes a varios ISP)"],c:3,ok:"Dual-multihomed combina varios ISP y enlaces redundantes; es la opción más resistente y costosa.",ko:"Multihomed ya mejora; dual-multihomed es el máximo nivel de redundancia descrito."},
{t:"wan",q:"¿Qué beneficio principal aporta una VPN sobre Internet para teletrabajo?",o:["Elimina la necesidad de cifrado","Conexión cifrada sin enlaces WAN dedicados caros","Aumenta el ancho de banda del DSL","Sustituye al firewall físico siempre"],c:1,ok:"Las VPN cifran tráfico sobre Internet, ahorrando coste de líneas dedicadas y manteniendo seguridad.",ko:"La VPN no elimina cifrado ni sustituye siempre un firewall; ahorra coste y protege el túnel."},
{t:"wan",q:"En la evolución SPAN Engineering, ¿qué usa la empresa global para conectar sedes?",o:["Solo una LAN con un router Wi-Fi","VPN sitio a sitio y acceso remoto sobre Internet","Solo líneas Frame Relay","MAN sin proveedor"],c:1,ok:"En la fase global, VPN sitio a sitio y acceso remoto permiten conectividad segura mundial.",ko:"La empresa pequeña usa banda ancha simple; la global añade VPN sobre Internet."},
{t:"wan",q:"¿Qué capas del modelo OSI cubren principalmente los estándares WAN citados?",o:["Solo capa 7","Capa 1 y capa 2","Solo capa 3","Capas 5 a 7 únicamente"],c:1,ok:"Físico (fibra, cobre, WDM) y enlace (Ethernet WAN, PPP, MPLS, etc.) son el foco WAN tradicional.",ko:"Aunque IP viaja por WAN, los estándares de acceso WAN se centran en capas 1-2."},
{t:"wan",q:"¿Qué es un DSLAM?",o:["Módem del usuario final","Multiplexor en la CO que concentra líneas DSL","Router CE de MPLS","Switch de capa 3 en la LAN"],c:1,ok:"El DSLAM está en la central del proveedor y agrupa conexiones DSL de abonados.",ko:"El módem DSL está en el cliente; DSLAM es del lado del operador."},
{t:"wan",q:"¿Por qué el cable coaxial puede bajar la velocidad en horas punta?",o:["Porque cada usuario tiene fibra dedicada","Porque el ancho de banda del coaxial es compartido entre suscriptores","Porque no usa DOCSIS","Porque prohibe IPv4"],c:1,ok:"Todos los vecinos comparten el mismo medio; más usuarios implican menos Mbps efectivos.",ko:"DSL no comparte el par del abonado; el cable sí comparte el segmento coaxial."},

/* ========== WIFI 9.1 ========== */
{t:"wifi1",q:"¿Qué estándar IEEE define principalmente las WLAN?",o:["802.15","802.11","802.3","802.1X solo en switches"],c:1,ok:"La familia 802.11 (Wi-Fi) define WLAN; 802.15 es WPAN (Bluetooth/Zigbee).",ko:"802.3 es Ethernet cableada; 802.11 es la base de Wi-Fi."},
{t:"wifi1",q:"¿Qué alcance típico tiene una WPAN?",o:["Ciudad completa","20-30 pies (6-9 m) aproximadamente","300 pies como máximo siempre","Global con satélite"],c:1,ok:"WPAN (802.15) es corto alcance y baja potencia: Bluetooth, Zigbee.",ko:"WLAN llega a ~300 pies; WMAN/WWAN son mayores."},
{t:"wifi1",q:"¿En qué bandas trabaja habitualmente Wi-Fi (802.11)?",o:["Solo 900 MHz","2,4 GHz y 5 GHz","Solo 60 GHz obligatorio","Solo bandas con licencia de operador"],c:1,ok:"802.11 usa principalmente 2,4 y 5 GHz; Wi-Fi 6 también puede usar 6 GHz según región.",ko:"Wi-Fi usa bandas ISM/no licenciadas en 2,4/5 GHz, no solo bandas celulares."},
{t:"wifi1",q:"¿Qué estándar 802.11 opera solo en 5 GHz y no es compatible con 802.11b?",o:["802.11a","802.11b","802.11g","802.11n solo 2,4"],c:0,ok:"802.11a usa 5 GHz hasta ~54 Mbps y no interoperaba con b/g de 2,4 GHz.",ko:"802.11b/g son 2,4 GHz; 802.11a es 5 GHz exclusivo."},
{t:"wifi1",q:"¿Qué nombre comercial corresponde a 802.11n?",o:["Wi-Fi 4","Wi-Fi 5","Wi-Fi 6","Wi-Fi 7"],c:0,ok:"Wi-Fi 4 = 802.11n; Wi-Fi 5 = ac; Wi-Fi 6 = ax.",ko:"La numeración Wi-Fi Alliance: n→4, ac→5, ax→6."},
{t:"wifi1",q:"¿Qué tecnología usa 802.11n para aumentar rendimiento con varias antenas?",o:["CSMA/CD","MIMO","FHSS solo","WEP"],c:1,ok:"MIMO (Multiple Input Multiple Output) usa varias antenas para más throughput.",ko:"CSMA/CA es acceso al medio en Wi-Fi; MIMO es técnica de antenas."},
{t:"wifi1",q:"¿Qué organización regula el espectro radioeléctrico a nivel internacional?",o:["IEEE","Wi-Fi Alliance","UIT (ITU)","IETF"],c:2,ok:"La UIT/ITU regula espectro y órbitas; IEEE define estándares técnicos 802.",ko:"IEEE define modulación 802.11; UIT asigna espectro globalmente."},
{t:"wifi1",q:"¿Qué función cumple un AP en modo infraestructura?",o:["Solo conectar dos PCs sin servidor","Permite que clientes se asocien y accedan a la red","Sustituye al switch troncal obligatoriamente","Elimina la necesidad de SSID"],c:1,ok:"En infraestructura los clientes se asocian al AP para alcanzar recursos de red.",ko:"Modo ad hoc no usa AP; el AP es punto de acceso a la infraestructura."},
{t:"wifi1",q:"¿Qué diferencia hay entre AP autónomo y LAP?",o:["El LAP se configura manualmente en cada sitio sin WLC","El LAP usa LWAPP/CAPWAP y es gestionado por un WLC","El autónomo no tiene antenas","El LAP no soporta 802.11"],c:1,ok:"LAP (ligero) depende del Wireless LAN Controller; el autónomo se administra individualmente.",ko:"Autónomo = independiente; LAP = centralizado con WLC."},
{t:"wifi1",q:"¿Qué es un BSS?",o:["Varias BSS unidas por distribución cableada","Un AP y todos los clientes asociados a él","Solo modo ad hoc","Protocolo de capa 3"],c:1,ok:"BSS (Basic Service Set) es un AP con sus clientes; clientes de distintos BSS no se comunican sin ESS.",ko:"ESS une varios BSS; BSS es la célula básica con un AP."},
{t:"wifi1",q:"¿Por qué las WLAN usan CSMA/CA en lugar de CSMA/CD?",o:["Porque detectan colisiones mejor que Ethernet","Porque en semidúplex no pueden escuchar mientras transmiten y no detectan colisión","Porque no hay interferencia","Porque usan fibra"],c:1,ok:"En wireless no se puede 'escuchar' durante TX; se evitan colisiones con RTS/CTS y backoff.",ko:"CSMA/CD detecta colisiones en cable; en Wi-Fi se previene (CA)."},

/* ========== WIFI 9.2 / 9.3 ========== */

/* ========== ACL 10.1 ========== */
{t:"acl1",q:"¿Qué es una ACE en una ACL?",o:["Tipo de cable","Entrada permit o deny del ACL","Protocolo NTP","Interfaz virtual WLC"],c:1,ok:"ACE = Access Control Entry; cada línea permit/deny del ACL.",ko:"No es medio físico ni protocolo de tiempo."},

const state = {
  pantalla: "inicio",
  preguntas: [],
  indice: 0,
  aciertos: 0,
  fallos: [],
  respondida: false,
  seleccion: null,
  modoRepaso: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTemas() {
  const cont = document.getElementById("temas-container");
  cont.innerHTML = "";
  Object.entries(TEMAS).forEach(([id, nombre]) => {
    const n = PREGUNTAS.filter(p => p.t === id).length;
    const div = document.createElement("div");
    div.className = "tema-chip";
    div.innerHTML = `<input type="checkbox" id="tema-${id}" value="${id}" checked>
      <label for="tema-${id}">${nombre} (${n})</label>`;
    cont.appendChild(div);
  });
  actualizarContador();
}

function getTemasSeleccionados() {
  return [...document.querySelectorAll("#temas-container input:checked")].map(el => el.value);
}

function actualizarContador() {
  const sel = getTemasSeleccionados();
  const n = PREGUNTAS.filter(p => sel.includes(p.t)).length;
  document.getElementById("contador-preguntas").textContent =
    n ? `${n} preguntas disponibles con la selección actual.` : "Selecciona al menos un tema.";
}

function prepararPreguntas(soloFallos = false) {
  let lista;
  if (soloFallos && state.fallos.length) {
    lista = state.fallos.map(f => ({ ...f.pregunta, _ordenOpciones: f.ordenOpciones }));
  } else {
    const temas = getTemasSeleccionados();
    lista = PREGUNTAS.filter(p => temas.includes(p.t)).map(p => ({ ...p }));
    if (document.getElementById("mezclar-preguntas").checked) lista = shuffle(lista);
  }
  if (!lista.length) return false;
  state.preguntas = lista.map(p => {
    const item = { ...p };
    if (p._ordenOpciones) {
      item.opcionesMezcladas = p._ordenOpciones.map(i => p.o[i]);
      item.indiceCorrecto = p._ordenOpciones.indexOf(p.c);
    } else if (document.getElementById("mezclar-opciones").checked) {
      const indices = p.o.map((_, i) => i);
      const ord = shuffle(indices);
      item.opcionesMezcladas = ord.map(i => p.o[i]);
      item.indiceCorrecto = ord.indexOf(p.c);
      item._ordenOpciones = ord;
    } else {
      item.opcionesMezcladas = [...p.o];
      item.indiceCorrecto = p.c;
      item._ordenOpciones = p.o.map((_, i) => i);
    }
    return item;
  });
  state.indice = 0;
  state.aciertos = 0;
  state.respondida = false;
  state.seleccion = null;
  return true;
}

function mostrarPantalla(id) {
  ["pantalla-inicio", "pantalla-quiz", "pantalla-resultados"].forEach(pid => {
    document.getElementById(pid).classList.toggle("hidden", pid !== id);
  });
  state.pantalla = id;
}

function renderPregunta() {
  const p = state.preguntas[state.indice];
  const total = state.preguntas.length;
  document.getElementById("progress-fill").style.width = ((state.indice) / total * 100) + "%";
  document.getElementById("quiz-contador").textContent = `Pregunta ${state.indice + 1} de ${total}`;
  document.getElementById("quiz-puntuacion").textContent = `Aciertos: ${state.aciertos}`;
  document.getElementById("q-tema-label").textContent = TEMAS[p.t] || p.t;
  document.getElementById("q-text").textContent = p.q;
  const opts = document.getElementById("q-options");
  opts.innerHTML = "";
  p.opcionesMezcladas.forEach((texto, i) => {
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = texto;
    div.dataset.idx = i;
    div.addEventListener("click", () => seleccionarOpcion(i));
    opts.appendChild(div);
  });
  const fb = document.getElementById("q-feedback");
  fb.className = "feedback hidden";
  fb.innerHTML = "";
  document.getElementById("btn-siguiente").classList.add("hidden");
  state.respondida = false;
  state.seleccion = null;
}

function seleccionarOpcion(idx) {
  if (state.respondida) return;
  state.seleccion = idx;
  document.querySelectorAll(".option").forEach(el => {
    el.classList.toggle("selected", +el.dataset.idx === idx);
  });
  confirmarRespuesta();
}

function confirmarRespuesta() {
  const p = state.preguntas[state.indice];
  state.respondida = true;
  const correcto = state.seleccion === p.indiceCorrecto;
  const opts = document.querySelectorAll(".option");
  opts.forEach(el => {
    el.classList.add("locked");
    const i = +el.dataset.idx;
    if (i === p.indiceCorrecto) el.classList.add("correct");
    else if (i === state.seleccion && !correcto) el.classList.add("incorrect");
  });
  const fb = document.getElementById("q-feedback");
  fb.classList.remove("hidden");
  if (correcto) {
    state.aciertos++;
    fb.className = "feedback ok";
    fb.innerHTML = `<strong>Correcto</strong>${p.ok}`;
  } else {
    const letra = String.fromCharCode(65 + p.indiceCorrecto);
    const textoCorrecta = p.opcionesMezcladas[p.indiceCorrecto];
    fb.className = "feedback bad";
    fb.innerHTML = `<strong>Incorrecto</strong>${p.ko}<br><br><strong>La respuesta correcta es:</strong> ${textoCorrecta}<br><br>${p.ok}`;
    if (!state.modoRepaso) {
      state.fallos.push({
        pregunta: {
          t: p.t, q: p.q, o: [...p.o], c: p.c, ok: p.ok, ko: p.ko
        },
        ordenOpciones: p._ordenOpciones
      });
    }
  }
  document.getElementById("quiz-puntuacion").textContent = `Aciertos: ${state.aciertos}`;
  document.getElementById("btn-siguiente").classList.remove("hidden");
  document.getElementById("btn-siguiente").textContent =
    state.indice < state.preguntas.length - 1 ? "Siguiente" : "Ver resultados";
}

function siguiente() {
  if (state.indice < state.preguntas.length - 1) {
    state.indice++;
    renderPregunta();
  } else {
    mostrarResultados();
  }
}

function mostrarResultados() {
  mostrarPantalla("pantalla-resultados");
  const total = state.preguntas.length;
  const fallidas = total - state.aciertos;
  const pct = total ? Math.round(state.aciertos / total * 100) : 0;
  document.getElementById("results-stats").innerHTML = `
    <div class="stat-card"><div class="num">${state.aciertos}</div><div class="lbl">Aciertos</div></div>
    <div class="stat-card"><div class="num">${fallidas}</div><div class="lbl">Fallos</div></div>
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num">${pct}%</div><div class="lbl">Porcentaje</div></div>`;
  const failDiv = document.getElementById("fail-summary");
  const btnRep = document.getElementById("btn-repetir-fallos");
  if (!state.modoRepaso && state.fallos.length) {
    failDiv.classList.remove("hidden");
    failDiv.innerHTML = "<h3 style='margin-bottom:0.5rem;font-size:0.95rem'>Preguntas falladas</h3>" +
      state.fallos.map((f, i) =>
        `<div class="fail-item"><strong>${i + 1}.</strong> [${TEMAS[f.pregunta.t]}] ${f.pregunta.q}</div>`
      ).join("");
    btnRep.classList.remove("hidden");
  } else {
    failDiv.classList.add("hidden");
    btnRep.classList.add("hidden");
  }
}

function empezarTest(repaso = false) {
  state.modoRepaso = repaso;
  if (!repaso) state.fallos = [];
  if (!prepararPreguntas(repaso)) {
    alert(repaso ? "No hay preguntas falladas para repetir." : "Selecciona al menos un tema con preguntas.");
    return;
  }
  mostrarPantalla("pantalla-quiz");
  renderPregunta();
}

document.getElementById("temas-container").addEventListener("change", actualizarContador);
document.getElementById("btn-todos").onclick = () => {
  document.querySelectorAll("#temas-container input").forEach(i => { i.checked = true; });
  actualizarContador();
};
document.getElementById("btn-ninguno").onclick = () => {
  document.querySelectorAll("#temas-container input").forEach(i => { i.checked = false; });
  actualizarContador();
};
document.getElementById("btn-empezar").onclick = () => empezarTest(false);
document.getElementById("btn-siguiente").onclick = siguiente;
document.getElementById("btn-abandonar").onclick = () => { mostrarPantalla("pantalla-inicio"); };
document.getElementById("btn-repetir-fallos").onclick = () => empezarTest(true);
document.getElementById("btn-nuevo-test").onclick = () => { state.fallos = []; empezarTest(false); };
document.getElementById("btn-inicio-res").onclick = () => mostrarPantalla("pantalla-inicio");
