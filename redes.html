{t:"acl3",q:"¿Qué puede filtrar una ACL extendida que la estándar no?",o:["Solo MAC","Destino, protocolo, puertos TCP/UDP","Solo hora NTP","SSID"],c:1,explicacion_detallada:{acierto:"Extendida: origen, destino, protocolo, puertos, opciones L4. Ejemplo: permit tcp any any eq www establece salida HTTP y established filtra retorno. Esto aplica en ACL extendidas y filtrado L4 cuando el enunciado pregunta: ¿Qué puede filtrar una ACL extendida que la estándar no?",opciones:["«Solo MAC» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué puede filtrar una ACL extendida que la estándar no?»; la opción válida es «Destino, protocolo, puertos TCP/UDP».","Respuesta correcta. Extendida: origen, destino, protocolo, puertos, opciones L4. La opción «Destino, protocolo, puertos TCP/UDP» es la única que satisface el criterio del enunciado.","NTP sincroniza relojes vía UDP 123; no configura MTU ni sustituye DNS. No responde a «¿Qué puede filtrar una ACL extendida que la estándar no?»; la opción válida es «Destino, protocolo, puertos TCP/UDP».","SSID identifica una WLAN; no tiene relación con circuitos Frame Relay. No responde a «¿Qué puede filtrar una ACL extendida que la estándar no?»; la opción válida es «Destino, protocolo, puertos TCP/UDP»."]}},
{t:"acl3",q:"Puerto HTTPS en ACL cuando no hay nombre eq:",o:["80","443","22","179"],c:1,explicacion_detallada:{acierto:"HTTPS = TCP 443; HTTP = 80. Ejemplo: permit tcp any any eq www establece salida HTTP y established filtra retorno. Esto aplica en ACL extendidas y filtrado L4 cuando el enunciado pregunta: Puerto HTTPS en ACL cuando no hay nombre eq:",opciones:["«80» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Puerto HTTPS en ACL cuando no hay nombre eq:»; la opción válida es «443».","Respuesta correcta. HTTPS = TCP 443; HTTP = 80. La opción «443» es la única que satisface el criterio del enunciado.","«22» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Puerto HTTPS en ACL cuando no hay nombre eq:»; la opción válida es «443».","«179» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Puerto HTTPS en ACL cuando no hay nombre eq:»; la opción válida es «443»."]}},
{t:"acl3",q:"¿Qué hace la palabra clave established en TCP?",o:["Permite cualquier TCP entrante","Permite respuestas con ACK/RST de conexión existente","Bloquea todo saliente","Solo UDP"],c:1,explicacion_detallada:{acierto:"Filtra tráfico de retorno de sesiones iniciadas desde dentro (firewall básico con estado). Ejemplo: permit tcp any any eq www establece salida HTTP y established filtra retorno. Esto aplica en ACL extendidas y filtrado L4 cuando el enunciado pregunta: ¿Qué hace la palabra clave established en TCP?",opciones:["«Permite cualquier TCP entrante» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué hace la palabra clave established en TCP?»; la opción válida es «Permite respuestas con ACK/RST de conexión existente».","Respuesta correcta. Filtra tráfico de retorno de sesiones iniciadas desde dentro (firewall básico con estado). La opción «Permite respuestas con ACK/RST de conexión existente» es la única que satisface el criterio del enunciado.","«Bloquea todo saliente» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué hace la palabra clave established en TCP?»; la opción válida es «Permite respuestas con ACK/RST de conexión existente».","«Solo UDP» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué hace la palabra clave established en TCP?»; la opción válida es «Permite respuestas con ACK/RST de conexión existente»."]}},
{t:"acl3",q:"ACL SURFING y BROWSING en el ejemplo: ¿cómo se aplican en R1 G0/0?",o:["Ambas entrantes","SURFING in, BROWSING out","Solo en vty","En serial 0/0/1"],c:1,explicacion_detallada:{acierto:"SURFING filtra salida web hacia Internet (in en G0/0 hacia fuera); BROWSING retorno (out). Ejemplo: permit tcp any any eq www establece salida HTTP y established filtra retorno. Esto aplica en ACL extendidas y filtrado L4 cuando el enunciado pregunta: ACL SURFING y BROWSING en el ejemplo: ¿cómo se aplican en R1 G0/0?",opciones:["«Ambas entrantes» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «ACL SURFING y BROWSING en el ejemplo: ¿cómo se aplican en R1 G0/0?»; la opción válida es «SURFING in, BROWSING out».","Respuesta correcta. SURFING filtra salida web hacia Internet (in en G0/0 hacia fuera); BROWSING retorno (out). La opción «SURFING in, BROWSING out» es la única que satisface el criterio del enunciado.","Líneas vty gestionan acceso remoto Telnet/SSH; access-class filtra quién entra. No responde a «ACL SURFING y BROWSING en el ejemplo: ¿cómo se aplican en R1 G0/0?»; la opción válida es «SURFING in, BROWSING out».","Enlace serie transmite bits secuencialmente; el paralelo sufre deriva de sincronización en largas distancias. No responde a «ACL SURFING y BROWSING en el ejemplo: ¿cómo se aplican en R1 G0/0?»; la opción válida es «SURFING in, BROWSING out»."]}},
{t:"acl3",q:"Para verificar ACL en interfaz y dirección:",o:["show cdp","show ip interface","show flash","show vlan"],c:1,explicacion_detallada:{acierto:"show ip interface indica ACL aplicada in/out. Ejemplo: permit tcp any any eq www establece salida HTTP y established filtra retorno. Esto aplica en ACL extendidas y filtrado L4 cuando el enunciado pregunta: Para verificar ACL en interfaz y dirección:",opciones:["CDP descubre vecinos Cisco capa 2; no muestra contraseñas WPA ni gestiona Wi-Fi. No responde a «Para verificar ACL en interfaz y dirección:»; la opción válida es «show ip interface».","Respuesta correcta. show ip interface indica ACL aplicada in/out. La opción «show ip interface» es la única que satisface el criterio del enunciado.","copy flash: tftp: respalda imagen IOS; copy run start guarda configuración. No responde a «Para verificar ACL en interfaz y dirección:»; la opción válida es «show ip interface».","VLAN ID segmenta tráfico Ethernet en switches; Frame Relay usa DLCI, no VLAN. No responde a «Para verificar ACL en interfaz y dirección:»; la opción válida es «show ip interface»."]}},

{t:"proto",q:"¿Qué capa usa CDP?",o:["Capa 3","Capa 2, protocolo propietario Cisco","Capa 7 solo","Capa 1 únicamente"],c:1,explicacion_detallada:{acierto:"CDP es L2 entre dispositivos Cisco en el mismo enlace. Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: ¿Qué capa usa CDP?",opciones:["«Capa 3» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Qué capa usa CDP?»; la opción válida es «Capa 2, protocolo propietario Cisco».","Respuesta correcta. CDP es L2 entre dispositivos Cisco en el mismo enlace. La opción «Capa 2, protocolo propietario Cisco» es la única que satisface el criterio del enunciado.","«Capa 7 solo» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué capa usa CDP?»; la opción válida es «Capa 2, protocolo propietario Cisco».","«Capa 1 únicamente» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿Qué capa usa CDP?»; la opción válida es «Capa 2, protocolo propietario Cisco»."]}},
{t:"proto",q:"¿CDP viene habilitado por defecto en Cisco?",o:["No, hay que activarlo siempre","Sí en dispositivos Cisco","Solo en routers ISP","Solo si hay LLDP"],c:1,explicacion_detallada:{acierto:"CDP enabled por defecto; se desactiva con no cdp run o no cdp enable en interfaz. Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: ¿CDP viene habilitado por defecto en Cisco?",opciones:["«No, hay que activarlo siempre» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿CDP viene habilitado por defecto en Cisco?»; la opción válida es «Sí en dispositivos Cisco».","Respuesta correcta. CDP enabled por defecto; se desactiva con no cdp run o no cdp enable en interfaz. La opción «Sí en dispositivos Cisco» es la única que satisface el criterio del enunciado.","«Solo en routers ISP» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿CDP viene habilitado por defecto en Cisco?»; la opción válida es «Sí en dispositivos Cisco».","LLDP es estándar IEEE 802.1AB multi-vendor para descubrimiento de vecinos. No responde a «¿CDP viene habilitado por defecto en Cisco?»; la opción válida es «Sí en dispositivos Cisco»."]}},
{t:"proto",q:"Comando para ver vecinos CDP:",o:["show lldp","show cdp neighbors","show ip route","show arp"],c:1,explicacion_detallada:{acierto:"show cdp neighbors [detail] lista dispositivos Cisco adyacentes. Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: Comando para ver vecinos CDP:",opciones:["LLDP es estándar IEEE 802.1AB multi-vendor para descubrimiento de vecinos. No responde a «Comando para ver vecinos CDP:»; la opción válida es «show cdp neighbors».","Respuesta correcta. show cdp neighbors [detail] lista dispositivos Cisco adyacentes. La opción «show cdp neighbors» es la única que satisface el criterio del enunciado.","«show ip route» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Comando para ver vecinos CDP:»; la opción válida es «show cdp neighbors».","«show arp» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Comando para ver vecinos CDP:»; la opción válida es «show cdp neighbors»."]}},
{t:"proto",q:"¿LLDP respecto a CDP?",o:["Solo Cisco","Independiente del proveedor, estándar","Solo capa 3","Usa puerto 123"],c:1,explicacion_detallada:{acierto:"LLDP es estándar multi-vendor; CDP es Cisco. Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: ¿LLDP respecto a CDP?",opciones:["«Solo Cisco» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿LLDP respecto a CDP?»; la opción válida es «Independiente del proveedor, estándar».","Respuesta correcta. LLDP es estándar multi-vendor; CDP es Cisco. La opción «Independiente del proveedor, estándar» es la única que satisface el criterio del enunciado.","«Solo capa 3» absolutiza un supuesto que el temario no sostiene para este escenario. No responde a «¿LLDP respecto a CDP?»; la opción válida es «Independiente del proveedor, estándar».","«Usa puerto 123» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿LLDP respecto a CDP?»; la opción válida es «Independiente del proveedor, estándar»."]}},
{t:"proto",q:"Para habilitar LLDP en interfaz Cisco necesitas:",o:["Solo lldp run global","lldp transmit y lldp receive en la interfaz","ntp server","snmp-server"],c:1,explicacion_detallada:{acierto:"Global lldp run más transmit/receive por interfaz. Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: Para habilitar LLDP en interfaz Cisco necesitas:",opciones:["LLDP es estándar IEEE 802.1AB multi-vendor para descubrimiento de vecinos. No responde a «Para habilitar LLDP en interfaz Cisco necesitas:»; la opción válida es «lldp transmit y lldp receive en la interfaz».","Respuesta correcta. Global lldp run más transmit/receive por interfaz. La opción «lldp transmit y lldp receive en la interfaz» es la única que satisface el criterio del enunciado.","NTP sincroniza relojes vía UDP 123; no configura MTU ni sustituye DNS. No responde a «Para habilitar LLDP en interfaz Cisco necesitas:»; la opción válida es «lldp transmit y lldp receive en la interfaz».","SNMP gestiona dispositivos (UDP 161/162); no es protocolo AP-WLC. No responde a «Para habilitar LLDP en interfaz Cisco necesitas:»; la opción válida es «lldp transmit y lldp receive en la interfaz»."]}},
{t:"proto",q:"¿Por qué sincronizar hora con NTP?",o:["Para aumentar MTU","Ordenar eventos y correlacionar logs","Obligatorio para DHCP","Sustituir DNS"],c:1,explicacion_detallada:{acierto:"Sin tiempo común no se puede correlacionar syslog, certificados, etc. Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: ¿Por qué sincronizar hora con NTP?",opciones:["«Para aumentar MTU» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Por qué sincronizar hora con NTP?»; la opción válida es «Ordenar eventos y correlacionar logs».","Respuesta correcta. Sin tiempo común no se puede correlacionar syslog, certificados, etc. La opción «Ordenar eventos y correlacionar logs» es la única que satisface el criterio del enunciado.","«Obligatorio para DHCP» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Por qué sincronizar hora con NTP?»; la opción válida es «Ordenar eventos y correlacionar logs».","«Sustituir DNS» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «¿Por qué sincronizar hora con NTP?»; la opción válida es «Ordenar eventos y correlacionar logs»."]}},

{t:"proto",q:"Stratum 16 en NTP indica:",o:["Mejor precisión posible","Dispositivo no sincronizado","Servidor GPS directo","Cliente stratum 0"],c:1,explicacion_detallada:{acierto:"Stratum 16 = no synced; 0 es referencia; 1-15 saltos válidos (máx 15). Ejemplo: show cdp neighbors detail documenta el puerto exacto del switch conectado al router. Esto aplica en CDP, LLDP o NTP cuando el enunciado pregunta: Stratum 16 en NTP indica:",opciones:["«Mejor precisión posible» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Stratum 16 en NTP indica:»; la opción válida es «Dispositivo no sincronizado».","Respuesta correcta. Stratum 16 = no synced; 0 es referencia; 1-15 saltos válidos (máx 15). La opción «Dispositivo no sincronizado» es la única que satisface el criterio del enunciado.","«Servidor GPS directo» corresponde a otro concepto del temario distinto al criterio de esta pregunta. No responde a «Stratum 16 en NTP indica:»; la opción válida es «Dispositivo no sincronizado».","Stratum NTP mide distancia a fuente autoritativa; 16 = no sincronizado; 0 es referencia GPS. No responde a «Stratum 16 en NTP indica:»; la opción válida es «Dispositivo no sincronizado»."]}},

];

const state = {
  pantalla: "inicio",
  preguntas: [],
  indice: 0,
  aciertos: 0,
  fallos: [],
  respuestas: [],
  respondida: false,
  seleccion: null,
  modoRepaso: false
};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function initTemas() {
  const cont = document.getElementById("temas-container");
  cont.innerHTML = "";
  Object.entries(TEMAS).forEach(([id, nombre]) => {
    const n = PREGUNTAS.filter(p => p.t === id).length;
    const div = document.createElement("div");
    div.className = "tema-chip";
    div.innerHTML = `<input type="checkbox" id="tema-${id}" value="${id}" checked>
      <label for="tema-${id}">${nombre} (${n})</label>`;
    cont.appendChild(div);
  });
  actualizarContador();
}

function getTemasSeleccionados() {
  return [...document.querySelectorAll("#temas-container input:checked")].map(el => el.value);
}

function actualizarContador() {
  const sel = getTemasSeleccionados();
  const n = PREGUNTAS.filter(p => sel.includes(p.t)).length;
  document.getElementById("contador-preguntas").textContent =
    n ? `${n} preguntas disponibles con la selección actual.` : "Selecciona al menos un tema.";
}

function prepararPreguntas(soloFallos = false) {
  let lista;
  if (soloFallos && state.fallos.length) {
    lista = state.fallos.map(f => ({ ...f.pregunta, _ordenOpciones: f.ordenOpciones }));
  } else {
    const temas = getTemasSeleccionados();
    lista = PREGUNTAS.filter(p => temas.includes(p.t)).map(p => ({ ...p }));
    if (document.getElementById("mezclar-preguntas").checked) lista = shuffle(lista);
  }
  if (!lista.length) return false;
  state.preguntas = lista.map(p => {
    const item = { ...p };
    if (p._ordenOpciones) {
      item.opcionesMezcladas = p._ordenOpciones.map(i => p.o[i]);
      item.indiceCorrecto = p._ordenOpciones.indexOf(p.c);
    } else if (document.getElementById("mezclar-opciones").checked) {
      const indices = p.o.map((_, i) => i);
      const ord = shuffle(indices);
      item.opcionesMezcladas = ord.map(i => p.o[i]);
      item.indiceCorrecto = ord.indexOf(p.c);
      item._ordenOpciones = ord;
    } else {
      item.opcionesMezcladas = [...p.o];
      item.indiceCorrecto = p.c;
      item._ordenOpciones = p.o.map((_, i) => i);
    }
    return item;
  });
  state.indice = 0;
  state.aciertos = 0;
  state.respondida = false;
  state.seleccion = null;
  state.respuestas = [];
  return true;
}

function mostrarPantalla(id) {
  ["pantalla-inicio", "pantalla-quiz", "pantalla-resultados"].forEach(pid => {
    document.getElementById(pid).classList.toggle("hidden", pid !== id);
  });
  state.pantalla = id;
}

function recalcularAciertos() {
  state.aciertos = state.respuestas.filter(r => r && r.correcto).length;
}

function actualizarNavQuiz() {
  document.getElementById("btn-anterior").classList.toggle("hidden", state.indice === 0);
}

function renderFeedback(p, correcto, seleccion) {
  const fb = document.getElementById("q-feedback");
  const exp = p.explicacion_detallada;
  fb.classList.remove("hidden");
  fb.className = correcto ? "feedback ok" : "feedback bad";

  let html = correcto
    ? `<strong>¡Correcto!</strong>`
    : `<strong>Incorrecto</strong><span class="feedback-correcta">La respuesta correcta es: ${p.opcionesMezcladas[p.indiceCorrecto]}</span>`;

  html += `<div class="feedback-section"><h4>Por qué es la respuesta correcta</h4><p>${exp.acierto}</p></div>`;
  html += `<div class="feedback-section"><h4>Análisis de cada opción</h4><ul class="feedback-opciones">`;

  p.opcionesMezcladas.forEach((texto, i) => {
    const origIdx = p._ordenOpciones ? p._ordenOpciones[i] : i;
    const letra = String.fromCharCode(65 + i);
    const esCorrecta = i === p.indiceCorrecto;
    const esElegidaIncorrecta = !correcto && i === seleccion;
    let cls = esCorrecta ? "op-correcta" : esElegidaIncorrecta ? "op-elegida-incorrecta" : "";
    const explicacion = exp.opciones[origIdx];
    html += `<li class="${cls}"><span class="op-letra">${letra}.</span><strong>${texto}</strong> — ${explicacion}</li>`;
  });

  html += `</ul></div>`;
  fb.innerHTML = html;
}

function aplicarRespuestaGuardada(guardada) {
  state.respondida = true;
  state.seleccion = guardada.seleccion;
  const p = state.preguntas[state.indice];
  const opts = document.querySelectorAll(".option");
  opts.forEach(el => {
    el.classList.add("locked");
    const i = +el.dataset.idx;
    el.classList.toggle("selected", i === guardada.seleccion);
    if (i === p.indiceCorrecto) el.classList.add("correct");
    else if (i === guardada.seleccion && !guardada.correcto) el.classList.add("incorrect");
  });
  renderFeedback(p, guardada.correcto, guardada.seleccion);
  document.getElementById("btn-siguiente").classList.remove("hidden");
  document.getElementById("btn-siguiente").textContent =
    state.indice < state.preguntas.length - 1 ? "Siguiente →" : "Ver resultados";
}

function renderPregunta() {
  const p = state.preguntas[state.indice];
  const total = state.preguntas.length;
  document.getElementById("progress-fill").style.width = ((state.indice + 1) / total * 100) + "%";
  document.getElementById("quiz-contador").textContent = `Pregunta ${state.indice + 1} de ${total}`;
  document.getElementById("quiz-puntuacion").textContent = `Aciertos: ${state.aciertos}`;
  document.getElementById("q-tema-label").textContent = TEMAS[p.t] || p.t;
  document.getElementById("q-text").textContent = p.q;
  const opts = document.getElementById("q-options");
  opts.innerHTML = "";
  p.opcionesMezcladas.forEach((texto, i) => {
    const div = document.createElement("div");
    div.className = "option";
    div.textContent = texto;
    div.dataset.idx = i;
    div.addEventListener("click", () => seleccionarOpcion(i));
    opts.appendChild(div);
  });
  const fb = document.getElementById("q-feedback");
  fb.className = "feedback hidden";
  fb.innerHTML = "";
  document.getElementById("btn-siguiente").classList.add("hidden");
  state.respondida = false;
  state.seleccion = null;
  actualizarNavQuiz();

  const guardada = state.respuestas[state.indice];
  if (guardada) aplicarRespuestaGuardada(guardada);
}

function seleccionarOpcion(idx) {
  if (state.respondida) {
    if (!state.respuestas[state.indice]) return;
    state.respondida = false;
    document.querySelectorAll(".option").forEach(el => {
      el.classList.remove("locked", "correct", "incorrect", "selected");
    });
    const fb = document.getElementById("q-feedback");
    fb.className = "feedback hidden";
    fb.innerHTML = "";
    document.getElementById("btn-siguiente").classList.add("hidden");
  }
  state.seleccion = idx;
  document.querySelectorAll(".option").forEach(el => {
    el.classList.toggle("selected", +el.dataset.idx === idx);
  });
  confirmarRespuesta();
}

function confirmarRespuesta() {
  const p = state.preguntas[state.indice];
  state.respondida = true;
  const correcto = state.seleccion === p.indiceCorrecto;
  const opts = document.querySelectorAll(".option");
  opts.forEach(el => {
    el.classList.add("locked");
    const i = +el.dataset.idx;
    if (i === p.indiceCorrecto) el.classList.add("correct");
    else if (i === state.seleccion && !correcto) el.classList.add("incorrect");
  });

  state.respuestas[state.indice] = {
    seleccion: state.seleccion,
    correcto
  };
  recalcularAciertos();
  renderFeedback(p, correcto, state.seleccion);

  document.getElementById("quiz-puntuacion").textContent = `Aciertos: ${state.aciertos}`;
  document.getElementById("btn-siguiente").classList.remove("hidden");
  document.getElementById("btn-siguiente").textContent =
    state.indice < state.preguntas.length - 1 ? "Siguiente →" : "Ver resultados";
}

function anterior() {
  if (state.indice > 0) {
    state.indice--;
    renderPregunta();
  }
}

function reconstruirFallos() {
  state.fallos = [];
  state.respuestas.forEach((r, idx) => {
    if (r && !r.correcto) {
      const p = state.preguntas[idx];
      state.fallos.push({
        pregunta: {
          t: p.t, q: p.q, o: [...p.o], c: p.c,
          explicacion_detallada: p.explicacion_detallada
        },
        ordenOpciones: p._ordenOpciones
      });
    }
  });
}

function siguiente() {
  if (state.indice < state.preguntas.length - 1) {
    state.indice++;
    renderPregunta();
  } else {
    mostrarResultados();
  }
}

function mostrarResultados() {
  if (!state.modoRepaso) reconstruirFallos();
  mostrarPantalla("pantalla-resultados");
  const total = state.preguntas.length;
  const fallidas = total - state.aciertos;
  const pct = total ? Math.round(state.aciertos / total * 100) : 0;
  document.getElementById("results-stats").innerHTML = `
    <div class="stat-card"><div class="num">${state.aciertos}</div><div class="lbl">Aciertos</div></div>
    <div class="stat-card"><div class="num">${fallidas}</div><div class="lbl">Fallos</div></div>
    <div class="stat-card"><div class="num">${total}</div><div class="lbl">Total</div></div>
    <div class="stat-card"><div class="num">${pct}%</div><div class="lbl">Porcentaje</div></div>`;
  const failDiv = document.getElementById("fail-summary");
  const btnRep = document.getElementById("btn-repetir-fallos");
  if (!state.modoRepaso && state.fallos.length) {
    failDiv.classList.remove("hidden");
    failDiv.innerHTML = "<h3 style='margin-bottom:0.5rem;font-size:0.95rem'>Preguntas falladas</h3>" +
      state.fallos.map((f, i) =>
        `<div class="fail-item"><strong>${i + 1}.</strong> [${TEMAS[f.pregunta.t]}] ${f.pregunta.q}</div>`
      ).join("");
    btnRep.classList.remove("hidden");
  } else {
    failDiv.classList.add("hidden");
    btnRep.classList.add("hidden");
  }
}

function empezarTest(repaso = false) {
  state.modoRepaso = repaso;
  if (!repaso) state.fallos = [];
  if (!prepararPreguntas(repaso)) {
    alert(repaso ? "No hay preguntas falladas para repetir." : "Selecciona al menos un tema con preguntas.");
    return;
  }
  mostrarPantalla("pantalla-quiz");
  renderPregunta();
}

document.getElementById("temas-container").addEventListener("change", actualizarContador);
document.getElementById("btn-todos").onclick = () => {
  document.querySelectorAll("#temas-container input").forEach(i => { i.checked = true; });
  actualizarContador();
};
document.getElementById("btn-ninguno").onclick = () => {
  document.querySelectorAll("#temas-container input").forEach(i => { i.checked = false; });
  actualizarContador();
};
document.getElementById("btn-empezar").onclick = () => empezarTest(false);
document.getElementById("btn-anterior").onclick = anterior;
document.getElementById("btn-siguiente").onclick = siguiente;
document.getElementById("btn-abandonar").onclick = () => { mostrarPantalla("pantalla-inicio"); };
document.getElementById("btn-repetir-fallos").onclick = () => empezarTest(true);
document.getElementById("btn-nuevo-test").onclick = () => { state.fallos = []; empezarTest(false); };
document.getElementById("btn-inicio-res").onclick = () => mostrarPantalla("pantalla-inicio");

initTemas();
</script>
