<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #c0392b;
            --light: #ecf0f1;
            --warning-bg: #fff3cd;
            --warning-text: #856404;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary);
            color: var(--light);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #34495e;
            padding: 40px;

            box-shadow: 0 10px 30px rgba(0,0,0,0.5);

            text-align: center;

            justify-content: space-between;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 10px;
        }
        .question-card {
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 8px;
            border-left: 6px solid var(--accent);
        }
        .question-text {
            font-size: 1.2em;
            font-weight: 700;
            margin-bottom: 15px;
        }
        .code-block {
            background: #2d2d2d;

            padding: 15px;

            border-radius: 4px;
            margin: 10px 0;
            white-space: pre-wrap;
            border: 1px solid #444;
        }
        .options-grid {
            display: grid;
            gap: 10px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: white;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.05em;
        }
        .option-label:hover {
            background: #eef2f3;
            border-color: var(--accent);
        }
        .option-label input {
            margin-right: 15px;
            transform: scale(1.3);
        }
        .blank-option {
            border-style: dashed;
            color: #7f8c8d;
            font-style: italic;
        }
        
        /* Estilos de corrección */
        .correct-answer {
            background-color: #d4edda !important;
            border-color: var(--success) !important;

            font-weight: bold;
        }
        .wrong-answer {
            background-color: #f8d7da !important;
            border-color: var(--danger) !important;
            color: #721c24;
            opacity: 0.8;
        }
        
        /* Explicaciones súper detalladas */
        .explanation {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: var(--warning-bg);
            color: var(--warning-text);

            font-size: 1em;
            border-left: 5px solid #ffeeba;

        }
        .explanation b {
            color: #5d4037;
        }
        
        button#submitBtn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.3em;
            font-weight: bold;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s, transform 0.1s;
        }
        button#submitBtn:hover {
            background: #219150;
            transform: scale(1.01);
        }

        #results {
            display: none;
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #7f8c8d;
        }
        .score-circle {

            height: 150px;
            background: var(--primary);

            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2.5em;
            font-weight: bold;
        }
        
        #timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.4em;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
            z-index: 1000;
            border: 2px solid white;
        }
    </style>
</head>

<div class="container">

<script>
    // --- BASE DE DATOS DE PREGUNTAS CON EXPLICACIONES EXTENDIDAS ---
    const questions = [
        // --- TEMA 4: DDL ---
        {
            cat: "T4",
            q: "Si queremos almacenar un DNI (8 números + 1 letra), ¿qué tipo de dato es el más eficiente según los apuntes?",
            code: "",
            opts: ["VARCHAR(9)", "CHAR(9)", "TEXT", "NVARCHAR(9)"],
            ans: 1,
            exp: "<b>¿Por qué CHAR y no VARCHAR?</b><br>Imagina que tienes cajas para guardar zapatos.<br><br>1. <b>VARCHAR</b> es una caja 'mágica' que se encoge o agranda según el zapato. Si metes una sandalia, se hace pequeña. Si metes una bota, se hace grande. ¡Suena genial! Pero esa 'magia' consume recursos: el ordenador tiene que medir cada dato antes de guardarlo.<br><br>2. <b>CHAR</b> es una caja de madera rígida, siempre del mismo tamaño. Si sabes SEGURO que todos tus datos miden lo mismo (como un DNI, que siempre son 9 caracteres), usas CHAR.<br><br><b>Conclusión:</b> Al usar CHAR(9), el ordenador no pierde tiempo midiendo. Sabe que son 9 huecos y entra directo. Es más rápido (eficiente) y para un DNI es perfecto porque nunca variará de tamaño."
        },
        {
            cat: "T4",
            q: "En la creación de tablas, ¿qué restricción permite valores NULL pero no permite valores repetidos?",
            code: "",
            opts: ["PRIMARY KEY", "FOREIGN KEY", "UNIQUE", "CHECK"],
            ans: 2,
            exp: "<b>Diferencia vital entre UNIQUE y PRIMARY KEY:</b><br><br>Piénsalo como una fiesta VIP (tu tabla):<br>1. <b>PRIMARY KEY (Tu DNI):</b> Es obligatorio para entrar (NOT NULL) y no puede haber dos personas con el mismo DNI (Único). Identifica la fila.<br><br>2. <b>UNIQUE (Tu número de teléfono):</b> No puede repetirse (si Pepito tiene el 666-555, nadie más puede tenerlo). PERO... ¿y si alguien no tiene teléfono? La restricción UNIQUE permite que alguien entre sin dato (NULL).<br><br><b>Resumen:</b> Si necesitas que no se repita pero admites que a veces el campo esté vacío -> UNIQUE."
        },
        {
            cat: "T4",
            q: "¿Qué ocurre si intentamos crear la tabla 'Visitas' antes que la tabla 'Pacientes', teniendo Visitas una FK hacia Pacientes?",
            code: "",
            opts: ["Se crea pero la FK queda inactiva", "Se crean ambas si están en el mismo script", "Da error porque la tabla referenciada no existe", "SQL Server crea una tabla Pacientes temporal"],
            ans: 2,
            exp: "<b>La analogía de la construcción de la casa:</b><br><br>Imagina que 'Pacientes' es la casa y 'Visitas' son los muebles que van dentro de la casa.<br><br>Tú intentas decirle al sistema: 'Oye, mete este sofá (Visita) dentro de la Casa de Juan'.<br>El sistema te mira y dice: '¿Qué casa? Si todavía no has puesto ni los ladrillos'.<br><br><b>Integridad Referencial:</b> No puedes crear un enlace (Foreign Key) apuntando a una tabla que todavía no ha nacido. Primero creas al Padre (Pacientes) y luego creas al Hijo (Visitas) que referencia al padre."
        },
        {
            cat: "T4",
            q: "¿Cuál es la sintaxis correcta en SQL Server para definir un campo autoincremental?",
            code: "",
            opts: ["AUTO_INCREMENT", "IDENTITY(1,1)", "SEQUENCE", "SERIAL"],
            ans: 1,
            exp: "<b>Ojo con el 'dialecto' SQL:</b><br><br>Aunque todos hablan SQL, cada base de datos tiene su acento:<br>- En MySQL se usa AUTO_INCREMENT.<br>- En Oracle se usaban SEQUENCEs.<br>- En PostgreSQL se usa SERIAL.<br><br><b>En SQL Server</b> (que es lo que estudiamos), la palabra mágica es <b>IDENTITY(semilla, incremento)</b>. <br>IDENTITY(1,1) significa: 'Empieza en el 1, y suma de 1 en 1'. Es decir: 1, 2, 3, 4..."
        },
        {
            cat: "T4",
            q: "Si queremos borrar la columna 'Edad' de la tabla 'Pacientes', usamos:",
            code: "",
            opts: ["DELETE COLUMN Edad FROM Pacientes", "ALTER TABLE Pacientes DROP COLUMN Edad", "DROP COLUMN Edad FROM Pacientes", "ALTER TABLE Pacientes DELETE Edad"],
            ans: 1,
            exp: "<b>Diferencia entre cambiar la ESTRUCTURA y cambiar los DATOS:</b><br><br>1. <b>DELETE</b> es para borrar DATOS (filas, personas, registros). Es como echar a gente de una habitación.<br>2. <b>DROP</b> es para destruir OBJETOS o ESTRUCTURAS. Es como tirar un tabique de la habitación.<br><br>Como quieres eliminar una columna entera (modificar los planos de la tabla), necesitas el comando de estructura: <b>ALTER TABLE</b>. Y dentro de esa modificación, la acción es destruir la columna: <b>DROP COLUMN</b>."
        },
        {
            cat: "T4",
            q: "¿Qué tipo de dato usarías para almacenar el precio de una consulta (ej: 50.50) con exactitud monetaria?",
            code: "",
            opts: ["FLOAT", "REAL", "DECIMAL(10,2) o MONEY", "INT"],
            ans: 2,
            exp: "<b>El problema de los céntimos perdidos:</b><br><br>Los tipos <b>FLOAT</b> y <b>REAL</b> son 'aproximados'. El ordenador los guarda en notación científica. A veces guardas 50.50 y el ordenador guarda 50.49999999. Si haces contabilidad con esto, al final del año te falta dinero y vas a la cárcel.<br><br>Para dinero, SIEMPRE usamos tipos <b>EXACTOS</b>:<br>- <b>DECIMAL(10,2):</b> Quiero 10 dígitos en total, y 2 de ellos son decimales.<br>- <b>MONEY:</b> Un tipo especial de SQL Server optimizado para moneda.<br><br>¡Nunca uses FLOAT para dinero!"
        },
        {
            cat: "T4",
            q: "La restricción `CHECK (Importe > 0)` sirve para:",
            code: "",
            opts: ["Comprobar que la tabla existe", "Asegurar que no se introduzcan importes negativos o cero", "Verificar la integridad referencial", "Indexar el campo Importe"],
            ans: 1,
            exp: "<b>El portero de discoteca:</b><br><br>La restricción <b>CHECK</b> funciona como un portero en la puerta de la tabla. Tú le das una norma: 'Solo entra quien tenga Importe mayor que 0'.<br><br>Cuando intentas hacer un INSERT con un importe negativo (-50€), el portero CHECK mira el dato, ve que no cumple la norma y te da un portazo (Error). Sirve para validar lógica de negocio (edad > 18, precio > 0, etc.) directamente en la base de datos."
        },
        {
            cat: "T4",
            q: "¿Qué efecto tiene `ON DELETE CASCADE` en una Foreign Key?",
            code: "",
            opts: ["Si borras al hijo, se borra al padre", "Si borras al padre, se borran automáticamente los hijos asociados", "Impide borrar al padre si tiene hijos", "Pone a NULL la clave ajena de los hijos"],
            ans: 1,
            exp: "<b>El efecto Dominó (o La Mafia):</b><br><br>Normalmente, la base de datos protege los datos. Si intentas borrar a un Paciente (Padre) que tiene Visitas (Hijos), el sistema te dice: '¡ERROR! No puedes borrar a este paciente, hay visitas que dependen de él'.<br><br>Pero si activas <b>ON DELETE CASCADE</b>, te vuelves despiadado. Cuando borras al Paciente, la base de datos dice: 'A sus órdenes'. Mata al paciente, busca todas sus visitas y las mata también automáticamente. Es útil pero peligroso."
        },
        {
            cat: "T4",
            q: "¿Cuál es la diferencia principal entre `VARCHAR` y `NVARCHAR`?",
            code: "",
            opts: ["NVARCHAR almacena números", "NVARCHAR permite caracteres Unicode (2 bytes/carácter)", "VARCHAR es para textos largos y NVARCHAR para cortos", "No hay diferencia"],
            ans: 1,
            exp: "<b>La 'N' es de 'National' (Unicode):</b><br><br>- <b>VARCHAR:</b> Usa 1 byte por letra. Solo entiende caracteres estándar (inglés, español básico). Si intentas meter un carácter chino o un emoji raro, puede salirte basura (¿?).<br><br>- <b>NVARCHAR:</b> Usa 2 bytes por letra. Entiende CUALQUIER carácter del mundo (Japonés, Árabe, Emojis...).<br><br><b>Coste:</b> NVARCHAR ocupa el doble de espacio en disco, pero te asegura que no tendrás problemas de idiomas."
        },
        {
            cat: "T4",
            q: "¿Qué comando elimina TOTALMENTE una tabla (datos y estructura) de la base de datos?",
            code: "",
            opts: ["DELETE TABLE", "TRUNCATE TABLE", "DROP TABLE", "REMOVE TABLE"],
            ans: 2,
            exp: "<b>La demolición total:</b><br><br>- <b>DELETE:</b> Borra los datos fila a fila, pero la tabla (la estructura vacía) se queda ahí.<br>- <b>TRUNCATE:</b> Borra todos los datos de golpe (vacía la tabla), pero la estructura se queda.<br>- <b>DROP TABLE:</b> Es la bomba atómica. Borra los datos, borra la estructura, borra los índices... Desaparece todo. Si haces un SELECT después de un DROP, te dirá 'El objeto no existe'."
        },
        {
            cat: "T4",
            q: "Si definimos un campo `bit`, ¿qué valores puede almacenar?",
            code: "",
            opts: ["0 y 1 (y NULL)", "Cualquier número entero pequeño", "Un carácter", "Verdadero/Falso como texto"],
            ans: 0,
            exp: "<b>El interruptor de la luz:</b><br><br>El tipo de dato <b>BIT</b> es lo más pequeño que hay. Solo entiende dos estados:<br>- 0 (Falso / Apagado)<br>- 1 (Verdadero / Encendido)<br><br>Es ideal para campos de 'Sí/No', como '¿Está casado?', '¿Es VIP?', etc. (Y como casi todos los campos, también admite NULL si no se especifica lo contrario)."
        },
        {
            cat: "T4",
            q: "¿Puede una tabla tener más de una Clave Primaria (PRIMARY KEY)?",
            code: "",
            opts: ["Sí, tantas como quiera", "No, solo una (aunque puede ser compuesta)", "Sí, si son de tipos diferentes", "Depende del SGBD"],
            ans: 1,
            exp: "<b>Solo puede quedar uno (Highlander):</b><br><br>Por definición, una tabla SOLO puede tener <b>UNA</b> Primary Key. Es el identificador principal.<br><br><b>¡OJO!</b> Esa clave primaria puede estar formada por DOS columnas (ej: DNI + CodigoCurso). Eso se llama 'Clave Primaria Compuesta', pero sigue siendo UN SOLO objeto Primary Key. No puedes tener dos PKs independientes."
        },
        {
            cat: "T4",
            q: "Para añadir una nueva columna 'Email' a una tabla existente:",
            code: "",
            opts: ["ADD COLUMN Email VARCHAR(50)", "ALTER TABLE Pacientes ADD Email VARCHAR(50)", "INSERT COLUMN Email", "UPDATE Pacientes SET Email"],
            ans: 1,
            exp: "<b>Modificando los planos:</b><br><br>Estás tocando la estructura (DDL), así que el comando siempre empieza por <b>ALTER TABLE [NombreTabla]</b>.<br>Luego dices qué quieres hacer: <b>ADD</b> (añadir), <b>DROP</b> (borrar) o <b>ALTER/MODIFY</b> (cambiar columna).<br><br>La sintaxis completa es: `ALTER TABLE Pacientes ADD Email VARCHAR(50)`."
        },
        {
            cat: "T4",
            q: "¿Qué implica definir una columna como `NOT NULL`?",
            code: "",
            opts: ["Que es Clave Primaria", "Que es Única", "Que es obligatorio introducir un valor", "Que se rellena automáticamente"],
            ans: 2,
            exp: "<b>Campo Obligatorio:</b><br><br>Simplemente significa que esa celda no se puede dejar vacía. Si intentas hacer un INSERT y te saltas ese campo, la base de datos te dará error. Es la forma de hacer campos obligatorios (como el DNI o el Nombre) en un formulario."
        },
        {
            cat: "T4",
            q: "El tipo de dato `smalldatetime` almacena:",
            code: "",
            opts: ["Fecha y hora con precisión de segundos", "Solo fecha", "Fecha y hora con precisión de minutos", "Hora solamente"],
            ans: 2,
            exp: "<b>El hermano pequeño de DateTime:</b><br><br>- <b>DATETIME:</b> Guarda fecha, hora, minutos, segundos y milisegundos. Muy preciso, ocupa 8 bytes.<br>- <b>SMALLDATETIME:</b> Para ahorrar espacio (4 bytes), guarda fecha y hora pero <b>TRUNCA los segundos</b>. Siempre pone los segundos a 00. Si guardas '14:30:25', él guarda '14:30:00'. Su precisión llega solo hasta el minuto."
        },

        // --- TEMA 5: CONSULTAS (SELECT) ---
        {
            cat: "T5",
            q: "¿Cuál es el orden LÓGICO de procesamiento de una consulta SQL (no el de escritura)?",
            code: "",
            opts: ["SELECT > FROM > WHERE", "FROM > WHERE > GROUP BY > SELECT", "WHERE > SELECT > ORDER BY", "SELECT > GROUP BY > HAVING"],
            ans: 1,
            exp: "<b>La cocina del SQL:</b><br>Tú escribes la receta en un orden, pero el cocinero (SQL) trabaja en otro:<br><br>1. <b>FROM:</b> Primero va a la despensa y coge los ingredientes (Tablas).<br>2. <b>WHERE:</b> Tira a la basura los ingredientes pochos (Filtra filas).<br>3. <b>GROUP BY:</b> Corta y agrupa los ingredientes (Agrupa datos).<br>4. <b>HAVING:</b> Si algún grupo ha quedado mal, lo tira (Filtra grupos).<br>5. <b>SELECT:</b> Emplata el resultado final para servírtelo.<br><br>Por eso no puedes usar un Alias creado en el SELECT dentro del WHERE, ¡porque el WHERE ocurre antes!"
        },
        {
            cat: "T5",
            q: "Si queremos filtrar grupos después de hacer un `GROUP BY`, ¿qué cláusula usamos?",
            code: "",
            opts: ["WHERE", "HAVING", "ORDER BY", "FILTER"],
            ans: 1,
            exp: "<b>WHERE vs HAVING (La gran batalla):</b><br><br>- <b>WHERE:</b> Filtra filas individuales ANTES de agrupar. (Ej: 'Solo pacientes de Madrid').<br>- <b>HAVING:</b> Filtra los grupos RESUMIDOS DESPUÉS de agrupar. (Ej: 'Solo ciudades con más de 10 pacientes').<br><br>Si usas una función de agregado como COUNT, SUM, AVG en la condición... obligatoriamente es HAVING."
        },
        {
            cat: "T5",
            q: "¿Qué hace la consulta `SELECT * INTO CopiaPacientes FROM Pacientes`?",
            code: "",
            opts: ["Copia los datos a una tabla que ya existe", "Crea una tabla nueva 'CopiaPacientes' y vuelca los datos", "Solo copia la estructura, no los datos", "Da error de sintaxis"],
            ans: 1,
            exp: "<b>Magia potagia (Crear y Copiar):</b><br><br>El comando <b>SELECT ... INTO</b> es especial. No necesita que la tabla destino exista.<br>1. Lee la tabla 'Pacientes'.<br>2. <b>CREA</b> automáticamente una tabla nueva llamada 'CopiaPacientes' con la misma estructura (columnas y tipos).<br>3. <b>INSERTA</b> todos los datos de golpe.<br><br>Es la forma más rápida de hacer una copia de seguridad o una tabla temporal."
        },
        {
            cat: "T5",
            q: "¿Cuál de las siguientes condiciones `WHERE` es INVÁLIDA?",
            code: "",
            opts: ["WHERE Ciudad = 'Madrid'", "WHERE Precio BETWEEN 10 AND 20", "WHERE SUM(Importe) > 100", "WHERE Nombre LIKE 'A%'"],
            ans: 2,
            exp: "<b>¡Trampa Clásica! El error del SUM en el WHERE:</b><br><br>Recuerda el orden de procesamiento: El <b>WHERE</b> se ejecuta antes de agrupar. En ese momento, la base de datos va fila por fila y todavía no sabe cuánto suman los importes en total.<br><br>No puedes filtrar por una suma (SUM) o un conteo (COUNT) en el WHERE. Tienes que dejar que agrupe primero y usar <b>HAVING SUM(Importe) > 100</b>."
        },
        {
            cat: "T5",
            q: "¿Qué devuelve la función `LEN('Hola')` en SQL Server?",
            code: "",
            opts: ["4", "5", "Hola", "Error"],
            ans: 0,
            exp: "<b>Contando letras:</b><br><br><b>LEN</b> es la función en SQL Server para obtener la longitud (Length) de una cadena. 'Hola' tiene 4 letras. Simple.<br><br><i>Nota curiosa:</i> En Oracle o MySQL esta función suele llamarse LENGTH, pero en SQL Server es LEN."
        },
        {
            cat: "T5",
            q: "Si ejecutamos `SELECT DISTINCT Ciudad FROM Pacientes`:",
            code: "",
            opts: ["Nos muestra todas las ciudades, incluyendo repetidas", "Nos muestra las ciudades sin repetir duplicados", "Nos cuenta cuántas ciudades hay", "Nos muestra las ciudades ordenadas alfabéticamente"],
            ans: 1,
            exp: "<b>El filtro de repetidos:</b><br><br>Imagina que tienes 100 pacientes de 'Madrid'. Si haces un SELECT normal, te sale 'Madrid' 100 veces.<br><br>La palabra clave <b>DISTINCT</b> elimina los duplicados del resultado final. Solo te mostrará 'Madrid' una vez. Te da la lista de ciudades <i>únicas</i> que tienes en la base de datos."
        },
        {
            cat: "T5",
            q: "Para buscar pacientes cuyo nombre empiece por 'J', usamos:",
            code: "",
            opts: ["WHERE Nombre = 'J*'", "WHERE Nombre LIKE 'J%'", "WHERE Nombre IS 'J%'", "WHERE Nombre CONTAINS 'J'"],
            ans: 1,
            exp: "<b>El operador LIKE y sus comodines:</b><br><br>Cuando no buscas algo exacto, sino un patrón, usas <b>LIKE</b>.<br>- El símbolo <b>%</b> significa 'Cualquier cosa, de cualquier longitud'.<br><br>Por tanto, <b>'J%'</b> significa: 'Empieza por J, y luego que venga lo que sea'.<br>Si fuera '%J%', significaría 'Contiene una J en cualquier parte'."
        },
        {
            cat: "T5",
            q: "¿Qué devuelve un `LEFT JOIN` si no encuentra coincidencia en la tabla de la derecha?",
            code: "",

    // Lógica del Examen
    function initExam() {
        const container = document.getElementById('questionsContainer');
        document.getElementById('qTotal').innerText = questions.length;

        questions.forEach((item, index) => {
            let html = `
            <div class="question-card" id="card_${index}">
                <div style="font-size:0.8em; color:#7f8c8d; text-transform:uppercase; margin-bottom:5px;">${item.cat}</div>
                <div class="question-text">${index + 1}. ${item.q}</div>
                ${item.code ? `<div class="code-block">${item.code}</div>` : ''}
                
                <div class="options-grid">`;
            
            item.opts.forEach((opt, optIndex) => {
                html += `
                <label class="option-label" id="lbl_${index}_${optIndex}">
                    <input type="radio" name="q_${index}" value="${optIndex}">
                    ${opt}
                </label>`;
            });

            // Opción en blanco
            html += `
                <label class="option-label blank-option" id="lbl_${index}_blank">
                    <input type="radio" name="q_${index}" value="blank">
                    ⚪ Dejar en blanco (No resta)
                </label>
                </div>
                <div class="explanation" id="exp_${index}">
                    💡 <b>EXPLICACIÓN:</b><br>
                    ${item.exp}
                </div>
            </div>`;
            
            container.insertAdjacentHTML('beforeend', html);
        });
    }

    function finishExam() {
        if(!confirm("¿Estás seguro de entregar el examen? No podrás cambiar las respuestas.")) return;

        let score = 0;
        let correct = 0;
        let wrong = 0;
        let blank = 0;

        questions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q_${index}"]:checked`);
            const expDiv = document.getElementById(`exp_${index}`);
            expDiv.style.display = 'block'; // Mostrar explicación

            // Deshabilitar inputs
            document.querySelectorAll(`input[name="q_${index}"]`).forEach(i => i.disabled = true);

            if (!selected || selected.value === 'blank') {
                blank++;
                // Marcar la correcta visualmente de forma suave
                document.getElementById(`lbl_${index}_${item.ans}`).style.border = "2px dashed #3498db";
            } else {
                const val = parseInt(selected.value);
                if (val === item.ans) {
                    correct++;
                    score += 0.33;
                    document.getElementById(`lbl_${index}_${val}`).classList.add('correct-answer');
                } else {
                    wrong++;
                    score -= 0.11;
                    document.getElementById(`lbl_${index}_${val}`).classList.add('wrong-answer');
                    // Marcar la correcta
                    document.getElementById(`lbl_${index}_${item.ans}`).classList.add('correct-answer');
                }
            }
        });

        // Cálculos finales
        if (score < 0) score = 0;
        const maxScore = questions.length * 0.33;
        const finalGrade = (score / maxScore) * 10;

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        
        let color = finalGrade >= 5 ? '#27ae60' : '#c0392b';
        let msg = finalGrade >= 5 ? '¡APROBADO!' : 'SUSPENSO';

        resultsDiv.innerHTML = `
            <div class="score-circle" style="color: ${color}; border-color: ${color}">
                ${finalGrade.toFixed(2)}
            </div>
            <h2 style="color: ${color}">${msg}</h2>
            <p>✅ Aciertos: ${correct} | ❌ Fallos: ${wrong} | ⚪ Blancos: ${blank}</p>
            <p style="font-size:0.9em; color:#aaa">Puntos brutos: ${score.toFixed(2)} / ${maxScore.toFixed(2)}</p>
        `;

        document.getElementById('submitBtn').style.display = 'none';
        
        // Scroll suave al resultado
        resultsDiv.scrollIntoView({ behavior: 'smooth' });
    }

    // Cronómetro
    let timeLeft = 50 * 60; // 50 minutos
    const timerDisplay = document.getElementById('timer');
    
    const timerInterval = setInterval(() => {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${m}:${s}`;
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("¡TIEMPO AGOTADO!");
            finishExam();
        }
        timeLeft--;
    }, 1000);

    // Iniciar
    initExam();

</script>
