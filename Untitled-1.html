<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Gestión BD - Temas 4, 5 y 6</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --danger: #c0392b;
            --light: #ecf0f1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary);
            color: var(--light);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: #34495e;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
            padding-bottom: 15px;
        }
        .info-panel {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }
        .question-card {
            background-color: #ecf0f1;
            color: #2c3e50;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--accent);
        }
        .question-text {
            font-size: 1.1em;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .code-block {
            background: #2d2d2d;
            color: #f1c40f;
            padding: 10px;
            font-family: 'Consolas', monospace;
            border-radius: 4px;
            margin: 10px 0;
            white-space: pre-wrap;
        }
        .options-grid {
            display: grid;
            gap: 10px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-label:hover {
            background: #eef2f3;
            border-color: var(--accent);
        }
        .option-label input {
            margin-right: 15px;
            transform: scale(1.2);
        }
        .blank-option {
            border-style: dashed;
            color: #7f8c8d;
        }
        
        /* Estilos de corrección */
        .correct-answer {
            background-color: #d4edda !important;
            border-color: var(--success) !important;
            color: #155724;
        }
        .wrong-answer {
            background-color: #f8d7da !important;
            border-color: var(--danger) !important;
            color: #721c24;
        }
        .explanation {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: #fff3cd;
            color: #856404;
            border-radius: 5px;
            font-size: 0.9em;
        }
        
        button#submitBtn {
            display: block;
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.3s;
        }
        button#submitBtn:hover {
            background: #219150;
        }

        #results {
            display: none;
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #7f8c8d;
        }
        .score-circle {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border: 5px solid var(--light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 2em;
            font-weight: bold;
        }
        
        #timer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--danger);
            color: white;
            padding: 15px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2em;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }
    </style>
</head>

<div class="container">

</div>

<script>
    // BASE DE DATOS DE PREGUNTAS (Extraídas de los PDFs y Transcripciones)
    const questions = [
        // --- TEMA 4: DDL ---
        {
            cat: "T4",
            q: "Si queremos almacenar un DNI (8 números + 1 letra), ¿qué tipo de dato es el más eficiente según los apuntes?",
            code: "",
            opts: ["VARCHAR(9)", "CHAR(9)", "TEXT", "NVARCHAR(9)"],
            ans: 1,
            exp: "Al ser longitud fija (siempre 9 caracteres), CHAR es más eficiente y rápido que VARCHAR."
        },
        {
            cat: "T4",
            q: "En la creación de tablas, ¿qué restricción permite valores NULL pero no permite valores repetidos?",
            code: "",
            opts: ["PRIMARY KEY", "FOREIGN KEY", "UNIQUE", "CHECK"],

            exp: "La restricción UNIQUE impide duplicados. A diferencia de la PK, suele permitir un valor nulo (dependiendo del SGBD, en SQL Server permite uno)."

        {
            cat: "T4",
            q: "¿Qué ocurre si intentamos crear la tabla 'Visitas' antes que la tabla 'Pacientes', teniendo Visitas una FK hacia Pacientes?",

        },
        {
            cat: "T4",

            code: "",
            opts: ["AUTO_INCREMENT", "IDENTITY(1,1)", "SEQUENCE", "SERIAL"],
            ans: 1,
            exp: "En los apuntes del Tema 4 (Clínica) se especifica IDENTITY(1,1)."
        },
        {
            cat: "T4",
            q: "Si queremos borrar la columna 'Edad' de la tabla 'Pacientes', usamos:",
            code: "",
            opts: ["DELETE COLUMN Edad FROM Pacientes", "ALTER TABLE Pacientes DROP COLUMN Edad", "DROP COLUMN Edad FROM Pacientes", "ALTER TABLE Pacientes DELETE Edad"],

        {
            cat: "T4",

            exp: "FLOAT y REAL son aproximados. DECIMAL y MONEY son exactos para dinero."

        {
            cat: "T4",
            q: "La restricción `CHECK (Importe > 0)` sirve para:",
            code: "",
            opts: ["Comprobar que la tabla existe", "Asegurar que no se introduzcan importes negativos o cero", "Verificar la integridad referencial", "Indexar el campo Importe"],
            ans: 1,
            exp: "CHECK valida una condición lógica en cada fila."
        },
        {
            cat: "T4",
            q: "¿Qué efecto tiene `ON DELETE CASCADE` en una Foreign Key?",
            code: "",
            opts: ["Si borras al hijo, se borra al padre", "Si borras al padre, se borran automáticamente los hijos asociados", "Impide borrar al padre si tiene hijos", "Pone a NULL la clave ajena de los hijos"],
            ans: 1,
            exp: "Propaga el borrado de la tabla principal a la relacionada."
        },
        {
            cat: "T4",
            q: "¿Cuál es la diferencia principal entre `VARCHAR` y `NVARCHAR`?",
            code: "",
            opts: ["NVARCHAR almacena números", "NVARCHAR permite caracteres Unicode (2 bytes/carácter)", "VARCHAR es para textos largos y NVARCHAR para cortos", "No hay diferencia"],
            ans: 1,
            exp: "La 'N' inicial indica soporte para Unicode (National Language Support)."
        },
        {
            cat: "T4",
            q: "¿Qué comando elimina TOTALMENTE una tabla (datos y estructura) de la base de datos?",
            code: "",
            opts: ["DELETE TABLE", "TRUNCATE TABLE", "DROP TABLE", "REMOVE TABLE"],
            ans: 2,
            exp: "DROP destruye el objeto. TRUNCATE solo vacía los datos."
        },
        {
            cat: "T4",
            q: "Si definimos un campo `bit`, ¿qué valores puede almacenar?",
            code: "",
            opts: ["0 y 1 (y NULL)", "Cualquier número entero pequeño", "Un carácter", "Verdadero/Falso como texto"],
            ans: 0,
            exp: "BIT es el tipo para valores lógicos (0, 1) en SQL Server."
        },
        {
            cat: "T4",
            q: "¿Puede una tabla tener más de una Clave Primaria (PRIMARY KEY)?",
            code: "",
            opts: ["Sí, tantas como quiera", "No, solo una (aunque puede ser compuesta)", "Sí, si son de tipos diferentes", "Depende del SGBD"],
            ans: 1,
            exp: "Solo una PK por tabla. Si se forma por varios campos, es una única PK compuesta."
        },
        {
            cat: "T4",
            q: "Para añadir una nueva columna 'Email' a una tabla existente:",
            code: "",
            opts: ["ADD COLUMN Email VARCHAR(50)", "ALTER TABLE Pacientes ADD Email VARCHAR(50)", "INSERT COLUMN Email", "UPDATE Pacientes SET Email"],
            ans: 1,
            exp: "Sintaxis DDL: ALTER TABLE + ADD."
        },
        {
            cat: "T4",
            q: "¿Qué implica definir una columna como `NOT NULL`?",
            code: "",
            opts: ["Que es Clave Primaria", "Que es Única", "Que es obligatorio introducir un valor", "Que se rellena automáticamente"],
            ans: 2,
            exp: "Restricción de obligatoriedad."
        },
        {
            cat: "T4",
            q: "El tipo de dato `smalldatetime` almacena:",
            code: "",
            opts: ["Fecha y hora con precisión de segundos", "Solo fecha", "Fecha y hora con precisión de minutos", "Hora solamente"],
            ans: 2,
            exp: "A diferencia de DATETIME, smalldatetime no guarda segundos/milisegundos."
        },

        // --- TEMA 5: CONSULTAS (SELECT) ---
        {
            cat: "T5",
            q: "¿Cuál es el orden LÓGICO de procesamiento de una consulta SQL (no el de escritura)?",
            code: "",
            opts: ["SELECT > FROM > WHERE", "FROM > WHERE > GROUP BY > SELECT", "WHERE > SELECT > ORDER BY", "SELECT > GROUP BY > HAVING"],
            ans: 1,
            exp: "Primero se elige la tabla (FROM), se filtran filas (WHERE), se agrupan (GROUP BY), se filtran grupos (HAVING) y finalmente se proyectan columnas (SELECT)."
        },
        {
            cat: "T5",
            q: "Si queremos filtrar grupos después de hacer un `GROUP BY`, ¿qué cláusula usamos?",
            code: "",
            opts: ["WHERE", "HAVING", "ORDER BY", "FILTER"],
            ans: 1,
            exp: "WHERE filtra filas antes de agrupar. HAVING filtra el resultado de la agrupación (ej: COUNT > 5)."
        },
        {
            cat: "T5",
            q: "¿Qué hace la consulta `SELECT * INTO CopiaPacientes FROM Pacientes`?",
            code: "",
            opts: ["Copia los datos a una tabla que ya existe", "Crea una tabla nueva 'CopiaPacientes' y vuelca los datos", "Solo copia la estructura, no los datos", "Da error de sintaxis"],
            ans: 1,
            exp: "SELECT INTO crea la tabla destino al vuelo. Es ideal para copias de seguridad rápidas."
        },
        {
            cat: "T5",
            q: "¿Cuál de las siguientes condiciones `WHERE` es INVÁLIDA?",
            code: "",
            opts: ["WHERE Ciudad = 'Madrid'", "WHERE Precio BETWEEN 10 AND 20", "WHERE SUM(Importe) > 100", "WHERE Nombre LIKE 'A%'"],
            ans: 2,
            exp: "¡Trampa clásica! No se pueden usar funciones agregadas (SUM, COUNT, AVG) en el WHERE."
        },
        {
            cat: "T5",
            q: "¿Qué devuelve la función `LEN('Hola')` en SQL Server?",
            code: "",
            opts: ["4", "5", "Hola", "Error"],
            ans: 0,
            exp: "Devuelve la longitud de la cadena. Ojo: en Oracle/MySQL suele ser LENGTH, pero en SQL Server es LEN."
        },
        {
            cat: "T5",
            q: "Si ejecutamos `SELECT DISTINCT Ciudad FROM Pacientes`:",
            code: "",
            opts: ["Nos muestra todas las ciudades, incluyendo repetidas", "Nos muestra las ciudades sin repetir duplicados", "Nos cuenta cuántas ciudades hay", "Nos muestra las ciudades ordenadas alfabéticamente"],
            ans: 1,
            exp: "DISTINCT elimina las filas duplicadas del resultado."
        },
        {
            cat: "T5",
            q: "Para buscar pacientes cuyo nombre empiece por 'J', usamos:",
            code: "",
            opts: ["WHERE Nombre = 'J*'", "WHERE Nombre LIKE 'J%'", "WHERE Nombre IS 'J%'", "WHERE Nombre CONTAINS 'J'"],
            ans: 1,
            exp: "El operador LIKE usa % como comodín de varios caracteres."
        },
        {
            cat: "T5",
            q: "¿Qué devuelve un `LEFT JOIN` si no encuentra coincidencia en la tabla de la derecha?",
            code: "",
            opts: ["No devuelve la fila", "Devuelve la fila con NULL en las columnas de la derecha", "Da un error", "Devuelve ceros"],
            ans: 1,
            exp: "Preserva todas las filas de la tabla izquierda. Si no hay match, rellena con NULL."
        },
        {
            cat: "T5",
            q: "La función `GETDATE()` devuelve:",
            code: "",
            opts: ["Solo la fecha actual", "La fecha y hora actual del sistema", "Solo la hora actual", "El timestamp de Unix"],
            ans: 1,
            exp: "En SQL Server devuelve fecha y hora."
        },
        {
            cat: "T5",
            q: "Si queremos calcular la edad de un paciente en años, ¿qué función es la más adecuada?",
            code: "",
            opts: ["YEAR(GETDATE()) - FechaNac", "DATEDIFF(YEAR, FechaNac, GETDATE())", "DATEADD(YEAR, FechaNac, GETDATE())", "AGE(FechaNac)"],
            ans: 1,
            exp: "DATEDIFF calcula la diferencia entre dos fechas en la unidad especificada."
        },
        {
            cat: "T5",
            q: "¿Qué hace el operador `IN`?",
            code: "WHERE Ciudad IN ('Madrid', 'Barcelona')",
            opts: ["Busca ciudades que contengan Madrid o Barcelona", "Busca ciudades que sean exactamente Madrid o Barcelona", "Busca un rango entre Madrid y Barcelona", "Es inválido"],
            ans: 1,
            exp: "Es una forma abreviada de múltiples OR (= 'Madrid' OR = 'Barcelona')."
        },
        {
            cat: "T5",
            q: "¿Cuál es el comodín para UN solo carácter en `LIKE`?",
            code: "",
            opts: ["%", "_", "?", "*"],
            ans: 1,
            exp: "El guion bajo (_) sustituye a un único carácter."
        },
        {
            cat: "T5",
            q: "Si tenemos `SELECT TOP 10 PERCENT * FROM Visitas`, ¿qué obtenemos?",
            code: "",
            opts: ["Las 10 primeras filas", "El 10% del total de las filas", "Las filas con ID hasta 10", "Error de sintaxis"],
            ans: 1,
            exp: "SQL Server permite TOP N PERCENT."
        },
        {
            cat: "T5",
            q: "¿Qué hace la operación `UNION`?",
            code: "",
            opts: ["Une columnas de dos tablas", "Une filas de dos consultas y elimina duplicados", "Une filas de dos consultas manteniendo duplicados", "Realiza un producto cartesiano"],
            ans: 1,
            exp: "UNION estándar combina resultados y elimina filas repetidas. (UNION ALL las mantiene)."
        },
        {
            cat: "T5",
            q: "Para obtener el nombre del mes de una fecha (ej: 'Enero'), usamos:",
            code: "",
            opts: ["MONTH(Fecha)", "DATENAME(MONTH, Fecha)", "DATEPART(MONTH, Fecha)", "GETMONTH(Fecha)"],
            ans: 1,
            exp: "MONTH y DATEPART devuelven el número (1). DATENAME devuelve el texto."
        },
        {
            cat: "T5",
            q: "Si usamos `COUNT(Telefono)` y hay pacientes con el teléfono a NULL:",
            code: "",
            opts: ["Cuenta todos los pacientes", "Solo cuenta los que tienen teléfono (no nulos)", "Da error", "Cuenta los nulos como 0"],
            ans: 1,
            exp: "Las funciones de agregación (salvo COUNT(*)) ignoran los valores NULL."
        },
        {
            cat: "T5",
            q: "¿Qué prioridad tienen los operadores lógicos si no hay paréntesis?",
            code: "",
            opts: ["OR > AND > NOT", "NOT > AND > OR", "Son iguales, de izquierda a derecha", "AND > OR > NOT"],
            ans: 1,
            exp: "El NOT es el más fuerte, luego AND, y el OR es el más débil."
        },
        {
            cat: "T5",
            q: "El resultado de sumar `100 + NULL` es:",
            code: "",
            opts: ["100", "0", "NULL", "Error"],
            ans: 2,
            exp: "Cualquier operación aritmética con NULL da como resultado NULL."
        },
        {
            cat: "T5",
            q: "Para ordenar de mayor a menor (descendente) usamos:",

            opts: ["ORDER BY ... ASC", "ORDER BY ... DESC", "ORDER BY ... DOWN", "ORDER BY ... TOP"],
            ans: 1,
            exp: "DESC es la palabra reservada."
        },
        {
            cat: "T5",
            q: "¿Qué función devuelve los 3 caracteres de la izquierda de un texto?",
            code: "",
            opts: ["LEFT(Texto, 3)", "SUBSTRING(Texto, 0, 3)", "START(Texto, 3)", "LOWER(Texto, 3)"],
            ans: 0,
            exp: "LEFT(cadena, n)."
        },
        {
            cat: "T5",
            q: "La operación `EXCEPT` devuelve:",

        {

            opts: ["Es válido siempre", "Debes incluir las columnas normales en el GROUP BY", "Debes incluir el COUNT en el GROUP BY", "Da error siempre"],

        {
            cat: "T5",

            code: "",
            opts: ["WHERE Observaciones = NULL", "WHERE Observaciones IS NULL", "WHERE Observaciones == NULL", "WHERE Observaciones LIKE NULL"],

            exp: "NULL no es un valor, es un estado. No se puede usar '='. Se usa 'IS'."

        {
            cat: "T5",
            q: "El operador `<>` significa:",
            code: "",
            opts: ["Menor o mayor", "Distinto", "Igual", "Asignación"],

            exp: "Es el estándar SQL para 'No igual' (también !=)."
        },
        {
            cat: "T5",
            q: "Si hacemos `SELECT * FROM T1, T2` (sin WHERE ni JOIN), obtenemos:",
            code: "",
            opts: ["Un error", "Un Inner Join", "Un Producto Cartesiano", "Una Unión"],
            ans: 2,
            exp: "Combina todas las filas de T1 con todas las de T2."
        },

        // --- TEMA 6: DML (MANIPULACIÓN) ---
        {
            cat: "T6",
            q: "¿Qué diferencia crítica hay entre `DELETE` y `TRUNCATE` respecto a la identidad?",
            code: "",
            opts: ["Ninguna", "DELETE reinicia el contador Identity, TRUNCATE no", "TRUNCATE reinicia el contador Identity, DELETE no", "Ambos lo reinician"],

            exp: "TRUNCATE resetea el contador autoincremental a su valor inicial. DELETE continúa por donde iba."

        {
            cat: "T6",
            q: "Si ejecutas `UPDATE Visitas SET Importe = 0` sin cláusula WHERE...",

            opts: ["Da error de seguridad", "Pone a 0 el importe de la primera visita", "Pone a 0 el importe de TODAS las visitas", "No hace nada"],

            exp: "El UPDATE sin filtro afecta a toda la tabla. Es un error muy peligroso."

            cat: "T6",

            exp: "Los cambios son físicos. Si ejecutas de nuevo, operas sobre el valor ya modificado."
        },
        {
            cat: "T6",
            q: "Si intentas borrar un 'Medico' que tiene 'Visitas' asignadas (con FK activa):",
            code: "",
            opts: ["Se borra el médico y las visitas", "Da error de Integridad Referencial", "Se borra el médico y las visitas quedan huérfanas", "SQL te pide confirmación"],

            exp: "La FK protege la integridad. No puedes dejar hijos sin padre (salvo que esté configurado CASCADE)."

            cat: "T6",
            q: "Para insertar filas copiándolas de otra tabla, usamos:",
            code: "",
            opts: ["INSERT INTO T1 VALUES (SELECT ...)", "INSERT INTO T1 SELECT ... FROM T2", "SELECT INTO T1 FROM T2", "COPY T1 FROM T2"],

            exp: "La sintaxis es INSERT INTO ... SELECT. (SELECT INTO es para crear tabla nueva)."
        },
        {
            cat: "T6",
            q: "¿Qué sucede si en un `INSERT` no especificamos valor para una columna que admite NULL?",

            opts: ["Da error", "Se inserta un 0", "Se inserta NULL automáticamente", "Pide el valor por pantalla"],
            ans: 2,
            exp: "Si no se indica y admite nulos (y no tiene Default), se guarda NULL."
        },
        {
            cat: "T6",
            q: "¿Cuál de estos comandos NO es DML?",
            code: "",
            opts: ["INSERT", "UPDATE", "TRUNCATE", "DROP"],
            ans: 3,
            exp: "DROP es DDL (Definición/Estructura). TRUNCATE es un caso especial (funciona como DML pero internamente es DDL, pero DROP es 100% DDL)."
        },
        {
            cat: "T6",
            q: "Si queremos borrar todas las visitas del año 2022:",
            code: "",
            opts: ["TRUNCATE TABLE Visitas WHERE Year=2022", "DELETE FROM Visitas WHERE YEAR(Fecha)=2022", "DROP TABLE Visitas", "REMOVE FROM Visitas WHERE Year=2022"],
            ans: 1,
            exp: "TRUNCATE no admite WHERE. Se debe usar DELETE."
        },
        {
            cat: "T6",
            q: "¿Cómo se inserta un valor explícito en una columna IDENTITY?",
            code: "",
            opts: ["No se puede nunca", "Simplemente escribiendo el valor", "Activando SET IDENTITY_INSERT Tabla ON", "Usando FORCE"],
            ans: 2,
            exp: "Por defecto está bloqueado. Hay que permitirlo explícitamente con ese comando."
        },
        {
            cat: "T6",

    // Lógica del Examen
    function initExam() {
        const container = document.getElementById('questionsContainer');
        document.getElementById('qTotal').innerText = questions.length;

        // Barajar preguntas (Fisher-Yates) - Descomentar para orden aleatorio
        // for (let i = questions.length - 1; i > 0; i--) {
        //     const j = Math.floor(Math.random() * (i + 1));
        //     [questions[i], questions[j]] = [questions[j], questions[i]];
        // }

        questions.forEach((item, index) => {
            let html = `
            <div class="question-card" id="card_${index}">
                <div style="font-size:0.8em; color:#7f8c8d; text-transform:uppercase; margin-bottom:5px;">${item.cat}</div>
                <div class="question-text">${index + 1}. ${item.q}</div>
                ${item.code ? `<div class="code-block">${item.code}</div>` : ''}
                
                <div class="options-grid">`;
            
            item.opts.forEach((opt, optIndex) => {
                html += `
                <label class="option-label" id="lbl_${index}_${optIndex}">
                    <input type="radio" name="q_${index}" value="${optIndex}">
                    ${opt}
                </label>`;
            });

            // Opción en blanco
            html += `
                <label class="option-label blank-option" id="lbl_${index}_blank">
                    <input type="radio" name="q_${index}" value="blank">
                    ⚪ Dejar en blanco (No resta)
                </label>
                </div>
                <div class="explanation" id="exp_${index}">💡 <b>Explicación:</b> ${item.exp}</div>
            </div>`;
            
            container.insertAdjacentHTML('beforeend', html);
        });
    }

    function finishExam() {
        if(!confirm("¿Estás seguro de entregar el examen? No podrás cambiar las respuestas.")) return;

        let score = 0;
        let correct = 0;
        let wrong = 0;
        let blank = 0;

        questions.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q_${index}"]:checked`);
            const expDiv = document.getElementById(`exp_${index}`);
            expDiv.style.display = 'block';

            // Deshabilitar inputs
            document.querySelectorAll(`input[name="q_${index}"]`).forEach(i => i.disabled = true);

            if (!selected || selected.value === 'blank') {
                blank++;
                // Marcar la correcta en azul discreto
                document.getElementById(`lbl_${index}_${item.ans}`).style.border = "2px dashed #3498db";
            } else {
                const val = parseInt(selected.value);
                if (val === item.ans) {
                    correct++;
                    score += 0.33;
                    document.getElementById(`lbl_${index}_val`).classList.add('correct-answer'); // Bug fix: this line will fail, needs fix below
                    // FIX:
                    document.getElementById(`lbl_${index}_${val}`).classList.add('correct-answer');
                } else {
                    wrong++;
                    score -= 0.11;
                    document.getElementById(`lbl_${index}_${val}`).classList.add('wrong-answer');
                    document.getElementById(`lbl_${index}_${item.ans}`).classList.add('correct-answer');
                }
            }
        });

        // Cálculos finales
        if (score < 0) score = 0;
        const maxScore = questions.length * 0.33;
        const finalGrade = (score / maxScore) * 10;

        const resultsDiv = document.getElementById('results');
        resultsDiv.style.display = 'block';
        
        let color = finalGrade >= 5 ? '#27ae60' : '#c0392b';
        let msg = finalGrade >= 5 ? '¡APROBADO!' : 'SUSPENSO';

        resultsDiv.innerHTML = `
            <div class="score-circle" style="color: ${color}; border-color: ${color}">
                ${finalGrade.toFixed(2)}
            </div>
            <h2 style="color: ${color}">${msg}</h2>
            <p>✅ Aciertos: ${correct} | ❌ Fallos: ${wrong} | ⚪ Blancos: ${blank}</p>
            <p style="font-size:0.9em; color:#aaa">Puntos brutos: ${score.toFixed(2)} / ${maxScore.toFixed(2)}</p>
        `;

        document.getElementById('submitBtn').style.display = 'none';
        window.scrollTo(0, document.body.scrollHeight);
    }

    // Cronómetro
    let timeLeft = 50 * 60; // 50 minutos
    const timerDisplay = document.getElementById('timer');
    
    const timerInterval = setInterval(() => {
        const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
        const s = (timeLeft % 60).toString().padStart(2, '0');
        timerDisplay.textContent = `${m}:${s}`;
        
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("¡TIEMPO AGOTADO!");
            finishExam();
        }
        timeLeft--;
    }, 1000);

    // Iniciar
    initExam();

</script>
