<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitTracker AI - Biological Engine Cloud V5</title>
    
    <!-- Librerías Originales -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- Librerías Firebase (Nube) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#3b82f6', secondary: '#10b981', danger: '#ef4444', dark: '#1e293b', light: '#f8fafc', study: '#8b5cf6', muscle: '#f59e0b' }
                }
            }
        }
    </script>

    <style>
        /* Tus estilos originales intactos */
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; -webkit-tap-highlight-color: transparent; padding-bottom: 140px; }
        .card { background: white; border-radius: 24px; box-shadow: 0 10px 30px -10px rgba(0,0,0,0.08); transition: transform 0.2s; border: 1px solid #f1f5f9; }
        .card-clickable:active { transform: scale(0.98); background-color: #f8fafc; }
        .modal-overlay { display: none; opacity: 0; transition: opacity 0.3s ease; position: fixed; inset: 0; z-index: 60; background: rgba(15, 23, 42, 0.6); backdrop-blur: 4px; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; opacity: 1; }
        .page-section { display: none; opacity: 0; animation: fadeIn 0.4s ease-out forwards; }
        .page-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .muscle-base { fill: #e2e8f0; stroke: #ffffff; stroke-width: 0.5px; transition: all 0.4s ease; }
        .label-text { font-size: 6px; fill: #64748b; font-weight: 800; text-anchor: middle; letter-spacing: 1px; }
    </style>
</head>
<body>

    <!-- PANTALLA DE LOGIN (Tapa la app hasta entrar) -->
    <div id="login-screen" class="fixed inset-0 z-[100] bg-slate-900 flex flex-col items-center justify-center p-6" style="display: flex;">
        <h1 class="text-4xl font-black text-white italic mb-2">FIT<span class="text-primary">TRACKER</span></h1>
        <p class="text-gray-400 mb-8 text-center text-sm">Inicia sesión para sincronizar tu progreso biológico</p>
        <button onclick="loginConGoogle()" class="bg-white text-slate-900 font-bold py-3 px-6 rounded-xl shadow-lg flex items-center gap-3 active:scale-95 transition w-full max-w-sm justify-center">
            <i class="fab fa-google text-red-500"></i> Entrar con Google
        </button>
    </div>

    <!-- Tu Header Original -->
    <header class="fixed top-0 w-full bg-white/90 backdrop-blur-xl z-40 border-b border-gray-100 px-6 py-4 flex justify-between items-center shadow-sm">
        <button onclick="navigateTo('registro')" class="text-gray-400 hover:text-primary transition"><i class="fas fa-history text-xl"></i></button>
        <div class="text-center">
            <h1 class="text-lg font-black text-slate-800 tracking-tighter italic">FIT<span class="text-primary">TRACKER</span></h1>
            <p id="season-indicator" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Cargando Nube...</p>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="editUserProfile()" class="text-gray-400 hover:text-blue-500 transition"><i class="fas fa-user-circle text-xl"></i></button>
            <button onclick="auth.signOut()" class="text-gray-400 hover:text-red-500 transition"><i class="fas fa-sign-out-alt text-xl"></i></button>
        </div>
    </header>

    <main class="container mx-auto px-5 mt-24 max-w-lg">
        <!-- El resto de tu HTML original va aquí (Secciones inicio, comida, agua, etc.) -->
        <!-- Asegúrate de mantener los IDs: inicio, comida, agua, estudio, deporte, registro -->
        <div id="inicio" class="page-section active">
            <!-- Contenido de inicio... -->
            <div id="val-cals" style="display:none">0</div> <!-- Requerido para lógica del escáner -->
            <div id="goal-cals" style="display:none">2400</div>
            <div id="bar-cals" style="width:0%; display:none"></div>
            <!-- ... resto de elementos de macros ... -->
        </div>
        
        <div id="comida" class="page-section">
            <div id="contenedor-escaner" style="display: none;" class="mb-6 relative">
                <div id="lector-codigo" class="w-full rounded-2xl overflow-hidden shadow-lg border border-gray-100"></div>
                <button onclick="cerrarEscaner()" class="absolute top-2 right-2 bg-red-500 text-white w-8 h-8 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-times"></i></button>
            </div>
            <button onclick="iniciarEscaner()" class="w-full mb-6 bg-slate-800 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition flex justify-center items-center gap-2">
                <i class="fas fa-barcode"></i> Escanear Producto
            </button>
            <div id="addedFoodsList" class="space-y-2 pb-24"></div>
        </div>
    </main>

    <script>
        // ==========================================================================================
        // ☁️ LÓGICA DE FIREBASE (El motor que arranca todo)
        // ==========================================================================================
        const firebaseConfig = {
            apiKey: "AIzaSyCgCwGwkMUTI9PhyWHBv6DXxhkHgf8Rjzg",
            authDomain: "fittracker-a347a.firebaseapp.com",
            projectId: "fittracker-a347a",
            storageBucket: "fittracker-a347a.firebasestorage.app",
            messagingSenderId: "251475812729",
            appId: "1:251475812729:web:d1ed26b4262091f11f8fa8",
            measurementId: "G-K0R3K5EBT0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let USER_BIO = null; 

        // ESTA FUNCIÓN ES EL DISPARADOR DE TUS 4000 LÍNEAS
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('login-screen').style.display = 'none'; 
                await cargarDatosUsuario(user.uid);
                
                // ARRANCAMOS TU APP ORIGINAL
                if (typeof updateDay === "function") updateDay(); 
                document.getElementById('season-indicator').innerText = "SINCRONIZADO: " + USER_BIO.nombre;
            } else {
                document.getElementById('login-screen').style.display = 'flex'; 
            }
        });

        function loginConGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithRedirect(provider); // Redirect es más estable en móviles
        }

        async function cargarDatosUsuario(uid) {
            const doc = await db.collection('usuarios').doc(uid).get();
            if (doc.exists) {
                USER_BIO = doc.data().bio;
            } else {
                // Perfil inicial si el usuario es nuevo
                USER_BIO = { nombre: currentUser.displayName || "Atleta", genero: "hombre", edad: 18, altura: 168, peso: 60, grasa: 12, masaMuscular: 50, ubicacion: "España", goal: 'maintenance' };
                await guardarDatosUsuario();
            }
        }

        async function guardarDatosUsuario() {
            if (currentUser && USER_BIO) {
                await db.collection('usuarios').doc(currentUser.uid).set({ bio: USER_BIO }, { merge: true });
            }
        }

        // ==========================================================================================
        // 🧬 TUS 4000 LÍNEAS DE LÓGICA ORIGINAL (BioEngine, updateDay, etc.)
        // ==========================================================================================
        
        // Pega aquí tu clase BioEngine, funciones de micronutrientes, 
        // navegación, pdf, deporte y toda la lógica que ya tenías.
        
        function updateDay() {
            // Tu función original que actualiza las barras de progreso[cite: 4]
            console.log("Actualizando motor biológico...");
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.page-section').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            window.scrollTo(0,0);
        }

        // ==========================================================================================
        // 📷 ESCÁNER ESTABLE (La versión que te funcionó)
        // ==========================================================================================
        let escannerActivo = null;

        function iniciarEscaner() {
            document.getElementById('contenedor-escaner').style.display = 'block';
            escannerActivo = new Html5Qrcode("lector-codigo");
            escannerActivo.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
                (codigo) => { 
                    cerrarEscaner(); 
                    buscarProductoPorCodigo(codigo); 
                }
            );
        }

        function cerrarEscaner() {
            if (escannerActivo) {
                escannerActivo.stop().then(() => {
                    document.getElementById('contenedor-escaner').style.display = 'none';
                    escannerActivo = null;
                });
            }
        }

        async function buscarProductoPorCodigo(codigo) {
            Swal.fire({ title: 'Buscando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const resp = await fetch(`https://world.openfoodfacts.org/api/v0/product/${codigo}.json`);
            const data = await resp.json();
            Swal.close();

            if (data.status === 1) {
                const n = data.product.nutriments;
                const alimento = { 
                    name: data.product.product_name, 
                    cal: n['energy-kcal_100g'] || 0, 
                    prot: n.proteins_100g || 0,
                    fat: n.fat_100g || 0,
                    sat: n['saturated-fat_100g'] || 0
                };
                
                Swal.fire({
                    title: alimento.name,
                    html: `<b>Gramos:</b><input type="number" id="gr-in" class="swal2-input" value="100">`,
                    confirmButtonText: 'Añadir',
                    preConfirm: () => document.getElementById('gr-in').value
                }).then(res => { if(res.isConfirmed) agregarAlimentoAlMotor(alimento, res.value); });
            }
        }

        function agregarAlimentoAlMotor(al, gr) {
            const factor = gr / 100;
            const kcal = Math.round(al.cal * factor);
            const prot = Math.round(al.prot * factor);
            
            // Actualizar tus barras originales enviando los datos sumados
            actualizarMacroHTML('val-cals', 'goal-cals', 'bar-cals', kcal);
            actualizarMacroHTML('val-prot', 'goal-prot', 'bar-prot', prot);
            
            const lista = document.getElementById('addedFoodsList');
            const id = 'f-' + Date.now();
            lista.innerHTML = `
                <div id="${id}" class="card p-3 flex justify-between items-center mb-2">
                    <span>${al.name} (${gr}g)</span>
                    <span class="font-bold text-orange-500">${kcal} kcal 
                        <button onclick="eliminarAlimento('${id}', ${kcal}, ${prot})" class="text-red-500 ml-2">×</button>
                    </span>
                </div>` + lista.innerHTML;
        }

        function actualizarMacroHTML(idVal, idGoal, idBar, suma) {
            const elVal = document.getElementById(idVal);
            const elBar = document.getElementById(idBar);
            const meta = parseInt(document.getElementById(idGoal).innerText) || 2000;
            let actual = parseInt(elVal.innerText) || 0;
            actual += suma;
            elVal.innerText = actual;
            elBar.style.width = Math.min((actual / meta) * 100, 100) + '%';
        }

        function eliminarAlimento(id, kcal, prot) {
            document.getElementById(id).remove();
            actualizarMacroHTML('val-cals', 'goal-cals', 'bar-cals', -kcal);
            actualizarMacroHTML('val-prot', 'goal-prot', 'bar-prot', -prot);
        }

    </script>
</body>
</html>
