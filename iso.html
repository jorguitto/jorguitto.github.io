<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Test ISO interactivo</title>
    <style>
        body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f6fbfc;margin:0;color:#123}
        .wrap{max-width:980px;margin:auto;padding:24px}
        .hero{background:linear-gradient(135deg,#dff6f7,#fff);border:1px solid #bde7e9;border-radius:18px;padding:22px;margin-bottom:18px}
        h1{margin:0 0 8px;color:#0b5661}
        .q{background:#e8f8f9;border:1px solid #bee8ea;border-radius:14px;padding:18px;margin:14px 0;box-shadow:0 1px 4px #0001}
        .q h3{margin:0 0 12px;font-size:1.05rem}
        .opt{display:block;background:white;margin:8px 0;padding:10px 12px;border-radius:10px;border:1px solid #d8e8ea;cursor:pointer;transition: background 0.2s, border-color 0.2s;}
        .opt:hover{border-color:#49a6a8}
        .ok{background:#ddf7e8!important;border-color:#27ae60!important}
        .bad{background:#ffe2e2!important;border-color:#d64545!important}
        .explain{display:none;margin-top:10px;font-weight:700}
        .btns{position:sticky;bottom:0;background:#ffffffd9;backdrop-filter:blur(8px);padding:12px;border-top:1px solid #ddd;display:flex;gap:10px;flex-wrap:wrap}
        button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer;background:#0b7285;color:white}
        button.secondary{background:#64748b}
        .score{font-size:1.15rem;font-weight:800}
        .small{color:#53636a;font-size:.9rem}
    </style>
</head>
<body>
<div class="wrap">
    <section class="hero">
        <h1>Test ISO interactivo</h1>
        <p>Selecciona una opción por pregunta. La respuesta se comprobará automáticamente al momento de marcarla.</p>
        <p class="small">Transcrito del PDF aportado. En las dos últimas preguntas solo se incluyen las opciones visibles en el documento.</p>
    </section>
    <div id="quiz"></div>
    <div class="btns">
        <button onclick="checkAll()">Ver puntuación total</button>
        <button class="secondary" onclick="resetQuiz()">Reiniciar</button>
        <span class="score" id="score"></span>
    </div>
</div>

<script>
const questions = [
    {t:'T9',q:'Indica el puerto de escucha por defecto del servicio SSH.',o:['80.','22.','24.','23.'],a:1},
    {t:'T9',q:'De las siguientes afirmaciones, indica la que se ajusta a la definición de túnel SSH.',o:['Procedimiento de configuración de los servicios.','Mecanismo que asegura conexiones realizadas con servicios no seguros.','Mecanismo de monitorización de la red.','Procedimiento de resolución de puertos.'],a:1},
    {t:'T9',q:'Indica cuál es el protocolo utilizado para acceder en modo terminal a un servidor GNU/Linux.',o:['SSH.','DHCP.','DNS.','NAT.'],a:0},
    {t:'T9',q:'Indica cuál de las siguientes herramientas no es de acceso remoto en GNU/Linux.',o:['RealVNC.','Tightvnc.','UltraVNC.','Putty.'],a:3},
    {t:'T9',q:'Elige la frase que define la monitorización del sistema.',o:['Uso de la pantalla del sistema.','Uso de una máquina virtual en el propio sistema.','Uso de herramientas de configuración de la RAM.','Uso de herramientas para vigilar y evaluar su funcionamiento.'],a:3},
    {t:'T9',q:'Indica el protocolo utilizado para acceder al escritorio remoto en GNU/Linux.',o:['SSH.','RDP.','Telnet.','VNC.'],a:3},
    {t:'T9',q:'SSH es un protocolo que se suele utilizar para:',o:['Acceder a un servidor GNU/Linux desde cualquier tipo de equipo cliente.','Acceder desde un equipo GNU/Linux a un servidor Windows.','Todas las opciones son correctas.','Establecer conexiones entre equipos Windows y GNU/Linux.'],a:0},
    {t:'T9',q:'Indica cuál de las siguientes afirmaciones es la verdadera.',o:['Las conexiones realizadas a través de los servicios ssh son cifradas.','Cuando se instala Ubuntu Server, el servicio NoMachine queda activado.','La administración remota puede utilizar un número indeterminado de sesiones virtuales.','Los servicios de control remoto no permiten la administración remota gráficamente.'],a:0},
    {t:'T9',q:'Indica de los siguientes elementos del sistema cuál no se monitoriza.',o:['La conexión de red.','La RAM.','El procesador.','El teclado.'],a:3},
    {t:'T9',q:'El protocolo SSH utiliza:',o:['El cifrado asimétrico para el proceso de validación del usuario.','El cifrado simétrico para todo el intercambio de información entre el cliente SSH y el servidor SSH.','El cifrado asimétrico para todo el intercambio de información entre el cliente SSH y el servidor SSH.','El cifrado simétrico para el proceso de validación del usuario.'],a:1},
    {t:'T10',q:'Indica cuál de los siguientes no es un mecanismo de instalación de software en Ubuntu.',o:['Mediante archivos con extensión .run.','Mediante archivos con extensión .md.','Mediante archivos con extensión .tar.','Mediante archivos con extensión .bin.'],a:1},
    {t:'T10',q:'Una evidencia digital:',o:['Almacena información en formato electrónico de forma física o lógica.','No almacena ninguna información.','No almacena información en formato electrónico de forma física o lógica.','Ninguna de las anteriores es correcta.'],a:0},
    {t:'T10',q:'De las siguientes afirmaciones, indica cuál de ellas no forma parte del proceso de gestión de un incidente.',o:['Diagnóstico.','Solución.','Auditoría.','Detección.'],a:2},
    {t:'T10',q:'Cuando se ejecuta la orden: $ tar archivo.tar, indica cuál de las siguientes opciones es la verdadera.',o:['El archivo desaparece.','Falta indicar el archivo de salida.','No se ha incluido la opción -f.','La orden no es correcta.'],a:0},
    {t:'T10',q:'En relación con los paquetes snap, indica cuál de las siguientes afirmaciones es correcta.',o:['Es un tipo de formato de paquete con dependencias.','Su eliminación puede afectar al resto del sistema.','Su actualización altera el sistema operativo.','Es un tipo de formato de paquete universal.'],a:3},
    {t:'T10',q:'Indica cuál de las siguientes no es una función de tar.',o:['Extraer.','Crear.','Listar.','Copiar.'],a:3},
    {t:'T10',q:'Indica cómo se llama el tipo de copia de seguridad que incluye toda la información que ha cambiado desde que se hizo la última copia de seguridad completa.',o:['Incremental.','Diferencial.','Parcial.','Completa.'],a:1},
    {t:'T10',q:'El archivo /etc/apt/sources.list contiene necesariamente:',o:['Los repositorios de los códigos fuente del sistema.','Los repositorios de los paquetes del sistema operativo.','Los repositorios de los PPA.','Las claves de los usuarios del sistema.'],a:1},
    {t:'T10',q:'Respecto a las auditorías, indica la opción correcta.',o:['No sirven para nada.','No requieren planificación, se realizan sobre la marcha.','Lo ideal es que las realice la propia empresa.','Sirven para comprobar la eficacia de las políticas de seguridad.'],a:3},
    {t:'T10',q:'En relación con los repositorios PPA, indica cuál de las siguientes afirmaciones es correcta.',o:['Contienen paquetes personales.','Los paquetes contenidos se instalan directamente.','Están ubicados en los servidores de Ubuntu.','Contienen paquetes para administración.'],a:0},
    {t:'T11',q:'Indica la opción verdadera.',o:['El almacenamiento de objetos replica virtualmente la exacta estructura y comportamiento de un disco físico.','El almacenamiento de bloques permite compartir discos entre instancias mediante protocolos NFS o SMB.','El almacenamiento de objetos es equivalente a los discos SAN conectados por red de un centro de datos.','El almacenamiento de archivos se comparte entre instancias conectado por red de forma equivalente a un NAS.'],a:0},
    {t:'T11',q:'Señala la opción incorrecta respecto a las AMI.',o:['Se pueden obtener del inicio rápido, del MarketPlace o de la comunidad de usuarios.','Se puede importar una máquina virtual local utilizando user-data.','Una AMI solo se puede usar en una región y para un tipo de virtualización (HVM o PV).','El ciclo de vida de una AMI se puede automatizar con EC2-Builder, incluyendo test de endurecimiento.'],a:1},
    {t:'T11',q:'Indica la opción correcta respecto a la optimización de costes en despliegue de instancias.',o:['Los planes de ahorro implican un compromiso de tener un número de instancias funcionando de manera continua durante meses o años.','Las instancias reservadas tienen un precio mucho más económico que se fija como una subasta bursátil.','Normalmente se usan instancias reservadas o planes de ahorro en combinación con instancias en spot para procesos interrumpibles u opcionales.','Las instancias en spot están indicadas para funcionar como una base continuada durante meses o años.'],a:3},
    {t:'T11',q:'Señala la opción correcta respecto al servicio EC2.',o:['Se utiliza sobre todo para virtualización por su elevado rendimiento.','En el caso de instancias Windows se establecerá una contraseña por defecto al lanzarla.','Se pueden importar máquinas físicas locales.','Se utiliza virtualización nativa (HVM) y como evolución el sistema Nitro.'],a:2},
    {t:'T11',q:'Los servicios de computación de AWS ordenados desde los más administrados hasta los que lo son menos se enumerarían así:',o:['Fargate, Lambda, Beanstalk, ECS/EKS, Lightsail, EC2.','EC2, Lightsail, ECS/EKS, Beanstalk, Lambda, Fargate.','Fargate, Lambda, ECS/EKS, Lightsail, EC2, Beanstalk.','ECS/EKS, Lambda, EC2, Beanstalk, Fargate, Lightsail.'],a:1},
    {t:'T11',q:'Señala la opción incorrecta.',o:['El servicio Lambda permite ejecutar funciones sueltas en entorno serverless.','La escalabilidad del servicio AppService de Azure en serverless es inferior a la del servicio Lambda en AWS.','El servicio ECS de contenedores soporta Docker y es más sencillo que EKS.','El servicio Fargate implementa VPS al estilo de los antiguos proveedores de hosting.'],a:3},
    {t:'T11',q:'Señala la opción correcta sobre las equivalencias de almacenamiento entre AWS y Azure.',o:['Azure Disk Storage equivale a AWS EBS y Azure Blob equivale a AWS S3.','Azure Files equivale a AWS EBS y Azure Blob equivale a AWS S3.','Azure Disk Storage equivale a AWS EBS y Azure Files equivale a AWS S3.','Todas son falsas.'],a:1},
    {t:'T11',q:'Selecciona la opción correcta. A la hora de lanzar una instancia en EC2:',o:['Se define un grupo de seguridad con los puertos que son accesibles desde el exterior.','El acceso se realiza mediante una pareja de claves, la pública en la instancia y la privada en nuestro equipo local.','Se le da una IP pública diferente cada vez que se reinicia, salvo que se use una IP elástica.','Todas son correctas.'],a:2},
    {t:'T11',q:'Respecto al servicio Cloudwatch, indica cuál es la incorrecta.',o:['Las acciones complejas tales como funciones Lambda no están soportadas, habría que utilizar eventos de EventBridge.'],a:0},
    {t:'T11',q:'Indica la opción incorrecta.',o:['Las clases de almacenamiento en S3 son SSD (propósito general provisionado) y HDD (optimizado o frío).','Un volumen EFS es más caro que uno EFS pero permite estar montado a la vez en varias instancias.'],a:0}
];

function render(){
    quiz.innerHTML = questions.map((x, i) => `
        <div class="q" id="q${i}">
            <h3>${i+1}. <small>${x.t}</small> ${x.q}</h3>
            ${x.o.map((op, j) => `
                <label class="opt">
                    <input type="radio" name="q${i}" value="${j}" onchange="checkQuestion(${i}, ${j})"> 
                    <b>${String.fromCharCode(97+j)}.</b> ${op}
                </label>
            `).join('')}
            <div class="explain"></div>
        </div>
    `).join('');
}

// Comprueba la pregunta de forma individual al hacer clic
function checkQuestion(qIdx, selectedOpt) {
    const box = document.getElementById('q' + qIdx);
    const correctOpt = questions[qIdx].a;
    const e = box.querySelector('.explain');
    
    // Limpiar estilos previos de esta pregunta
    box.querySelectorAll('.opt').forEach(el => el.classList.remove('ok', 'bad'));
    
    // Resaltar la respuesta correcta siempre en verde
    box.querySelectorAll('.opt')[correctOpt].classList.add('ok');
    
    if (selectedOpt === correctOpt) {
        e.textContent = '¡Correcto!';
        e.style.color = '#16803c';
    } else {
        // Si falló, marcar la elegida en rojo
        box.querySelectorAll('.opt')[selectedOpt].classList.add('bad');
        e.textContent = 'Incorrecto. Respuesta correcta: ' + String.fromCharCode(97 + correctOpt) + '. ' + questions[qIdx].o[correctOpt];
        e.style.color = '#b42318';
    }
    e.style.display = 'block';
    
    // Actualizar dinámicamente el contador global en tiempo real si el usuario lo desea
    updateLiveScore();
}

function updateLiveScore() {
    let checkedCount = 0;
    let scoreCount = 0;
    
    questions.forEach((x, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if (sel) {
            checkedCount++;
            if (+sel.value === x.a) {
                scoreCount++;
            }
        }
    });
    
    if (checkedCount > 0) {
        score.textContent = `Progreso: Resucidas ${checkedCount}/${questions.length} | Aciertos: ${scoreCount} (${Math.round(scoreCount/checkedCount*100)}% de las respondidas)`;
    }
}

// Muestra la puntuación definitiva basándose en el total de preguntas globales
function checkAll(){
    let s = 0;
    questions.forEach((x, i) => {
        const sel = document.querySelector(`input[name="q${i}"]:checked`);
        if (sel && +sel.value === x.a) s++;
        
        // Forzar a que se muestren las soluciones de todas las preguntas que se hayan dejado en blanco
        checkQuestion(i, sel ? +sel.value : -1);
    });
    score.textContent = `Puntuación Final: ${s}/${questions.length} (${Math.round(s/questions.length*100)}%)`;
    window.scrollTo({top:0,behavior:'smooth'});
}

function resetQuiz(){
    document.querySelectorAll('input').forEach(i => i.checked = false);
    document.querySelectorAll('.opt').forEach(o => o.classList.remove('ok', 'bad'));
    document.querySelectorAll('.explain').forEach(e => e.style.display = 'none');
    score.textContent = '';
}

render();
</script>
</body>
</html>
