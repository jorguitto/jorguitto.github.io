<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tracker Pro - Rendimiento Personal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- VARIABLES --- */
        :root {
            --bg-color: #f3f4f6;
            --surface-color: #ffffff;
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --text-main: #2c3e50;
            --text-light: #7f8c8d;
            --border-color: #e2e8f0;
            --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07);
            --radius-md: 8px;
            --radius-lg: 15px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-main); padding-bottom: 50px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 15px; }

        /* --- CABECERA --- */
        header { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; padding: 20px; background: var(--surface-color); border-radius: var(--radius-lg); box-shadow: var(--shadow-md); }
        @media (min-width: 768px) { header { flex-direction: row; justify-content: space-between; align-items: center; } }
        
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary-color); display: flex; align-items: center; gap: 10px; }
        .nav-tabs { display: flex; gap: 10px; width: 100%; overflow-x: auto; }
        @media (min-width: 768px) { .nav-tabs { width: auto; } }
        
        .tab-btn { flex: 1; padding: 12px 20px; border: none; background: #edf2f7; color: var(--text-light); font-weight: 600; cursor: pointer; border-radius: var(--radius-md); transition: 0.2s; font-size: 0.95rem; white-space: nowrap; }
        .tab-btn.active { background: var(--primary-color); color: white; box-shadow: var(--shadow-md); }

        /* --- VISTAS --- */
        .view-section { display: none; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- TARJETAS --- */
        .card { background: var(--surface-color); border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow-md); margin-bottom: 20px; }
        .card-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid var(--bg-color); padding-bottom: 15px; }

        /* --- TABLA CON SCROLL PARA MÓVILES (ESTILO BOTONES CUADRADOS) --- */
        .table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 10px; border-radius: var(--radius-md); }
        
        .habit-table { width: 100%; min-width: 700px; border-collapse: separate; border-spacing: 0; }
        
        .habit-table th { background: #f8fafc; color: var(--text-main); font-weight: 600; padding: 12px 5px; text-align: center; border-bottom: 2px solid var(--border-color); font-size: 0.9rem; }
        .day-percent { display: block; font-size: 0.75rem; color: var(--primary-color); margin-top: 3px; font-weight: 700; }
        
        .habit-table td { padding: 12px 8px; text-align: center; border-bottom: 1px solid var(--border-color); vertical-align: middle; background: var(--surface-color); }
        
        /* Columna fija en móvil */
        .habit-table th:first-child, .habit-table td:first-child { 
            position: sticky; 
            left: 0; 
            z-index: 2; 
            text-align: left; 
            padding-left: 15px;
            box-shadow: 4px 0 6px -2px rgba(0,0,0,0.05);
        }
        
        .habit-name-cell { font-weight: 600; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; }

        /* Los Botones Cuadrados que te gustaban */
        .check-btn { 
            width: 45px; 
            height: 45px; 
            border-radius: 12px; 
            border: none;
            background: #edf2f7; 
            cursor: pointer; 
            display: inline-flex; 
            justify-content: center; 
            align-items: center; 
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: transparent; 
            font-size: 1.2rem; 
        }
        .check-btn:hover { background: #e2e8f0; transform: scale(1.05); }
        .check-btn.completed { 
            background: var(--success-color); 
            color: white; 
            transform: scale(1.1); 
            box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); 
        }

        /* --- DASHBOARD Y GRÁFICOS --- */
        .stats-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: linear-gradient(135deg, var(--primary-color), #3498db); color: white; border-radius: var(--radius-lg); padding: 20px; text-align: center; box-shadow: var(--shadow-md); }
        .stat-value { font-size: 2.2rem; font-weight: 800; display: block; }
        .stat-label { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media (min-width: 800px) { .dashboard-grid { grid-template-columns: 1fr 1fr; } }
        .chart-wrapper { position: relative; height: 280px; width: 100%; padding: 10px; }

        /* --- HISTORIAL --- */
        .history-list { display: flex; flex-direction: column; gap: 15px; }
        .history-item { display: flex; flex-direction: column; gap: 10px; padding: 15px; background: var(--bg-color); border-radius: var(--radius-md); border-left: 5px solid var(--primary-color); }
        @media (min-width: 768px) { .history-item { flex-direction: row; justify-content: space-between; align-items: center; } }
        .score-badge { display: inline-block; background: var(--primary-color); color: white; padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.9rem; }

        /* --- BOTONES DE ACCIÓN --- */
        .btn { padding: 12px 20px; border: none; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; font-size: 0.95rem; width: 100%; }
        @media (min-width: 768px) { .btn { width: auto; } }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-success { background: var(--success-color); color: white; }
        .btn-danger { background: transparent; color: var(--text-light); border: 1px solid var(--border-color); }
        .btn-danger:hover { color: var(--danger-color); border-color: var(--danger-color); }
        
        .action-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        @media (min-width: 768px) { .action-group { flex-direction: row; justify-content: flex-end; } }

        /* --- PDF EXPORT --- */
        .pdf-mode { background: white; padding: 20px; }
        .pdf-mode .no-export { display: none !important; }
        .pdf-mode .table-responsive { overflow: visible; }
        .export-title { display: none; text-align: center; color: var(--primary-color); margin-bottom: 20px; font-size: 1.8rem; }
        .pdf-mode .export-title { display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo"><i class="fas fa-chart-pie"></i> Mi Tracker</div>
        <div class="nav-tabs">
            <button class="tab-btn active" onclick="switchTab('current')"><i class="fas fa-calendar-check"></i> Esta Semana</button>
            <button class="tab-btn" onclick="switchTab('history')"><i class="fas fa-folder-open"></i> Mis PDFs</button>
        </div>
    </header>

    <div id="view-current" class="view-section active">
        
        <div id="pdf-export-zone">
            <h1 class="export-title">Resumen de Hábitos</h1>

            <div class="stats-summary">
                <div class="stat-box">
                    <span class="stat-value" id="score-display">0%</span>
                    <span class="stat-label">Éxito Total</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value" id="completed-display">0</span>
                    <span class="stat-label">Hábitos Marcados</span>
                </div>
            </div>

            <div class="card">
                <div class="card-header no-export">
                    <h2 style="font-size: 1.2rem; color: var(--text-main);">Pizarra Diaria</h2>
                    <button class="btn btn-danger" onclick="resetCurrentWeek()"><i class="fas fa-undo"></i> Borrar Todo</button>
                </div>
                
                <div class="table-responsive">
                    <table class="habit-table" id="habit-table">
                        </table>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2 style="font-size: 1.2rem; color: var(--text-main);">Mis Gráficas</h2>
                </div>
                <div class="dashboard-grid">
                    <div>
                        <h3 style="text-align: center; color: var(--text-light); font-size: 1rem; margin-bottom: 10px;">Progreso por Hábito (La clásica)</h3>
                        <div class="chart-wrapper"><canvas id="barChart"></canvas></div>
                    </div>
                    <div>
                        <h3 style="text-align: center; color: var(--text-light); font-size: 1rem; margin-bottom: 10px;">Tendencia de la Semana</h3>
                        <div class="chart-wrapper"><canvas id="lineChart"></canvas></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-group no-export">
            <button class="btn btn-primary" onclick="exportCurrentToPDF()"><i class="fas fa-file-pdf"></i> Guardar en PDF</button>
            <button class="btn btn-success" onclick="saveWeekToHistory()"><i class="fas fa-flag-checkered"></i> Terminar Semana</button>
        </div>
    </div>

    <div id="view-history" class="view-section">
        <div class="card">
            <div class="card-header">
                <h2 style="font-size: 1.2rem;">Semanas Guardadas</h2>
            </div>
            <div id="history-container" class="history-list">
                </div>
        </div>
    </div>

</div>

<script>
    // --- CONFIGURACIÓN BASE ---
    const habitsConfig = [
        { id: 'comidas', name: 'Comidas Sanas', icon: 'fa-apple-alt', color: '#2ecc71' },
        { id: 'agua', name: 'Beber Agua', icon: 'fa-tint', color: '#3498db' },
        { id: 'ejercicio', name: 'Ejercicio', icon: 'fa-running', color: '#e67e22' },
        { id: 'estudio', name: 'Estudio Efic.', icon: 'fa-book', color: '#9b59b6' },
        { id: 'proyecto', name: 'Proyecto X', icon: 'fa-star', color: '#f1c40f' },
        { id: 'suplementos', name: 'Suplementos', icon: 'fa-capsules', color: '#95a5a6' }
    ];
    
    const days = ['Lunes', 'Martes', 'Miércoles', 'Jueves', 'Viernes', 'Sábado', 'Domingo'];
    
    let currentData = {};
    let charts = { bar: null, line: null };

    // --- INICIALIZACIÓN ---
    function init() {
        loadData();
        renderTable();
        updateDashboard();
        renderHistory();
    }

    function loadData() {
        const saved = localStorage.getItem('trackerPro_current');
        if (saved) {
            currentData = JSON.parse(saved);
        } else {
            habitsConfig.forEach(h => {
                currentData[h.id] = [false, false, false, false, false, false, false];
            });
        }
    }

    // --- RENDERIZAR TABLA CLÁSICA CON BOTONES CUADRADOS ---
    function renderTable() {
        const table = document.getElementById('habit-table');
        
        // Calcular porcentajes diarios para la cabecera
        let dailyPercents = [0,0,0,0,0,0,0];
        for(let d=0; d<7; d++) {
            let dayTotal = 0;
            habitsConfig.forEach(h => { if(currentData[h.id][d]) dayTotal++; });
            dailyPercents[d] = Math.round((dayTotal / habitsConfig.length) * 100);
        }

        // Generar Cabecera
        let html = `<thead><tr><th style="text-align: left; padding-left: 15px;">Hábitos</th>`;
        days.forEach((day, i) => {
            html += `<th id="th-day-${i}">${day} <span class="day-percent" id="perc-day-${i}">${dailyPercents[i]}%</span></th>`;
        });
        html += `</tr></thead><tbody>`;

        // Generar Filas y Botones Cuadrados
        habitsConfig.forEach((habit) => {
            html += `<tr>`;
            html += `<td class="habit-name-cell"><i class="fas ${habit.icon}" style="color: ${habit.color}; font-size: 1.2rem; width: 25px; text-align: center;"></i> <span>${habit.name}</span></td>`;
            
            for (let dayIdx = 0; dayIdx < 7; dayIdx++) {
                const isCompleted = currentData[habit.id][dayIdx];
                const activeClass = isCompleted ? 'completed' : '';
                html += `
                    <td>
                        <button class="check-btn ${activeClass}" onclick="toggleHabit('${habit.id}', ${dayIdx}, this)">
                            <i class="fas fa-check"></i>
                        </button>
                    </td>`;
            }
            html += `</tr>`;
        });
        
        html += '</tbody>';
        table.innerHTML = html;
    }

    // --- CAMBIAR PESTAÑAS ---
    function switchTab(tab) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        if(tab === 'current') {
            document.getElementById('view-current').classList.add('active');
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
        } else {
            document.getElementById('view-history').classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            renderHistory();
        }
    }

    // --- LÓGICA DE CLICS ---
    function toggleHabit(habitId, dayIndex, btnElement) {
        // Cambiar estado en los datos
        currentData[habitId][dayIndex] = !currentData[habitId][dayIndex];
        
        // Animación del botón cuadrado
        btnElement.classList.toggle('completed');
        
        // Actualizar el porcentaje de ESE día arriba en la cabecera
        let dayTotal = 0;
        habitsConfig.forEach(h => { if(currentData[h.id][dayIndex]) dayTotal++; });
        let newPercent = Math.round((dayTotal / habitsConfig.length) * 100);
        document.getElementById(`perc-day-${dayIndex}`).innerText = `${newPercent}%`;

        // Guardar y actualizar gráficos
        localStorage.setItem('trackerPro_current', JSON.stringify(currentData));
        updateDashboard();
    }

    // --- CÁLCULOS PARA GRÁFICOS ---
    function calculateStats() {
        let totalChecks = 0;
        let possibleChecks = habitsConfig.length * 7;
        
        let barData = []; // Para la gráfica de barras
        habitsConfig.forEach(h => {
            let habitChecks = currentData[h.id].filter(Boolean).length;
            totalChecks += habitChecks;
            barData.push(Math.round((habitChecks / 7) * 100)); // Porcentaje de éxito de ese hábito en la semana
        });

        let lineData = [0, 0, 0, 0, 0, 0, 0];
        for(let d = 0; d < 7; d++) {
            habitsConfig.forEach(h => { if(currentData[h.id][d]) lineData[d]++; });
        }

        let globalScore = Math.round((totalChecks / possibleChecks) * 100);
        return { totalChecks, globalScore, barData, lineData };
    }

    // --- DIBUJAR GRÁFICOS ---
    function updateDashboard() {
        const stats = calculateStats();
        
        // Actualizar números gigantes
        document.getElementById('score-display').innerText = `${stats.globalScore}%`;
        document.getElementById('completed-display').innerText = stats.totalChecks;

        Chart.defaults.font.family = 'Segoe UI';

        // 1. Vuelve la Gráfica de Barras Clásica
        const ctxBar = document.getElementById('barChart').getContext('2d');
        if (charts.bar) charts.bar.destroy();
        charts.bar = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: habitsConfig.map(h => h.name),
                datasets: [{
                    label: '% Completado',
                    data: stats.barData,
                    backgroundColor: habitsConfig.map(h => h.color + '99'), // Color con transparencia
                    borderColor: habitsConfig.map(h => h.color),
                    borderWidth: 2,
                    borderRadius: 5
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { beginAtZero: true, max: 100 } },
                plugins: { legend: { display: false } }
            }
        });

        // 2. Gráfica de Línea de la semana
        const ctxLine = document.getElementById('lineChart').getContext('2d');
        if (charts.line) charts.line.destroy();
        
        let gradient = ctxLine.createLinearGradient(0, 0, 0, 280);
        gradient.addColorStop(0, 'rgba(74, 144, 226, 0.5)');
        gradient.addColorStop(1, 'rgba(74, 144, 226, 0.0)');

        charts.line = new Chart(ctxLine, {
            type: 'line',
            data: {
                labels: days.map(d => d.substring(0,3)), // Lun, Mar, Mié...
                datasets: [{
                    label: 'Hábitos por día',
                    data: stats.lineData,
                    borderColor: 'var(--primary-color)',
                    backgroundColor: gradient,
                    borderWidth: 3, fill: true, tension: 0.3, pointRadius: 5, pointBackgroundColor: 'white'
                }]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: { y: { min: 0, max: habitsConfig.length, ticks: { stepSize: 1 } }, x: { grid: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    // --- ACCIONES Y GUARDADO ---
    function resetCurrentWeek() {
        if(confirm("¿Seguro que quieres borrar todas las marcas de esta semana?")) {
            localStorage.removeItem('trackerPro_current');
            loadData(); renderTable(); updateDashboard();
        }
    }

    function saveWeekToHistory() {
        const stats = calculateStats();
        if(stats.totalChecks === 0) { alert("¡Aún no has marcado nada!"); return; }

        if(confirm("¿Cerrar semana y archivarla? La tabla se quedará en blanco para el lunes.")) {
            let history = JSON.parse(localStorage.getItem('trackerPro_history')) || [];
            
            history.unshift({
                id: Date.now(),
                date: new Date().toLocaleDateString('es-ES', {day: '2-digit', month: 'short', year: 'numeric'}),
                score: stats.globalScore,
                checks: stats.totalChecks,
                data: JSON.parse(JSON.stringify(currentData))
            });
            
            localStorage.setItem('trackerPro_history', JSON.stringify(history));
            localStorage.removeItem('trackerPro_current');
            loadData(); renderTable(); updateDashboard(); switchTab('history');
        }
    }

    function renderHistory() {
        const container = document.getElementById('history-container');
        let history = JSON.parse(localStorage.getItem('trackerPro_history')) || [];
        
        if (history.length === 0) {
            container.innerHTML = '<p style="text-align:center; padding: 20px; color: var(--text-light);">Aún no hay semanas guardadas.</p>';
            return;
        }

        let html = '';
        history.forEach(record => {
            let color = record.score >= 80 ? 'var(--success-color)' : (record.score >= 50 ? '#f39c12' : 'var(--danger-color)');
            
            html += `
                <div class="history-item">
                    <div>
                        <h4 style="margin-bottom: 5px; color: var(--text-main);">Semana del ${record.date}</h4>
                        <p style="font-size: 0.85rem; color: var(--text-light);"><i class="fas fa-check-double"></i> ${record.checks} completados</p>
                    </div>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <span class="score-badge" style="background-color: ${color}">Nota: ${record.score}%</span>
                        <button class="btn btn-primary" onclick="exportHistoryRecord(${record.id})" style="padding: 8px 12px;"><i class="fas fa-file-pdf"></i></button>
                        <button class="btn btn-danger" onclick="deleteHistoryRecord(${record.id})" style="padding: 8px 12px; border: none; background: #fdf2f2;"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `;
        });
        container.innerHTML = html;
    }

    function deleteHistoryRecord(id) {
        if(confirm("¿Borrar este PDF/registro para siempre?")) {
            let history = JSON.parse(localStorage.getItem('trackerPro_history')) || [];
            history = history.filter(r => r.id !== id);
            localStorage.setItem('trackerPro_history', JSON.stringify(history));
            renderHistory();
        }
    }

    // --- MOTOR PDF ---
    function generatePDF(element, filename) {
        element.classList.add('pdf-mode');
        
        const opt = {
            margin:       10,
            filename:     filename,
            image:        { type: 'jpeg', quality: 1 },
            html2canvas:  { scale: 2, useCORS: true },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'landscape' }
        };
        
        html2pdf().set(opt).from(element).save().then(() => {
            element.classList.remove('pdf-mode');
        });
    }

    function exportCurrentToPDF() {
        const element = document.getElementById('pdf-export-zone');
        generatePDF(element, `Mi_Tracker_Semanal.pdf`);
    }

    function exportHistoryRecord(id) {
        let history = JSON.parse(localStorage.getItem('trackerPro_history')) || [];
        const record = history.find(r => r.id === id);
        
        if(record) {
            const tempCurrent = JSON.stringify(currentData);
            currentData = record.data;
            renderTable(); updateDashboard();
            
            document.querySelector('.export-title').innerText = `Reporte Histórico - ${record.date}`;
            switchTab('current');
            
            setTimeout(() => {
                const element = document.getElementById('pdf-export-zone');
                generatePDF(element, `Tracker_Semana_${record.date.replace(/ /g, '_')}.pdf`);
                
                setTimeout(() => {
                    currentData = JSON.parse(tempCurrent);
                    renderTable(); updateDashboard();
                    document.querySelector('.export-title').innerText = `Resumen de Hábitos`;
                    switchTab('history');
                }, 1000);
            }, 500);
        }
    }

    window.onload = init;
</script>
</body>
</html>
